worker_processes auto;
pid /run/tracegate-nginx-transit.pid;

events {
  worker_connections 2048;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;
  limit_req_zone $binary_remote_addr zone=tracegate_auth:10m rate=10r/m;

  server {
    listen 80;
    server_name _;

    root /var/www/decoy;
    index index.html;

    location = /auth {
      return 301 https://$host/auth/;
    }

    location ^~ /auth/ {
      return 301 https://$host$request_uri;
    }

    location = /vault/mtproto {
      return 301 https://$hostREPLACE_TRANSIT_SECRET_PATH;
    }

    location ^~ /vault/ {
      return 301 https://$host$request_uri;
    }

    location ^~ /v1/decoy/ {
      return 301 https://$host$request_uri;
    }

    location = /grafana {
      return 301 https://$host/grafana/;
    }

    location ^~ /grafana/ {
      return 301 https://$host$request_uri;
    }

    location / {
      try_files $uri $uri/ /index.html;
    }
  }

  server {
    listen 127.0.0.1:4443 ssl http2;
    server_name REPLACE_TLS_SERVER_NAME;

    ssl_certificate     /etc/tracegate/tls/ws.crt;
    ssl_certificate_key /etc/tracegate/tls/ws.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:TracegateTransitTLS:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /var/www/decoy;
    index index.html;

    location = /auth {
      return 302 /auth/;
    }

    location = /auth/mtproto {
      return 302 REPLACE_TRANSIT_SECRET_PATH;
    }

    location = /vault/mtproto {
      return 302 REPLACE_TRANSIT_SECRET_PATH;
    }

    location ^~ /v1/decoy/ {
      limit_req zone=tracegate_auth burst=12 nodelay;
      add_header Cache-Control "no-store" always;
      proxy_pass REPLACE_TRANSIT_DECOY_UPSTREAM;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    location = /grafana {
      return 302 /grafana/;
    }

    location ^~ /grafana/ {
      proxy_pass http://127.0.0.1:18080;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    location /ws {
      proxy_pass http://127.0.0.1:10000;
      proxy_http_version 1.1;
      proxy_connect_timeout 5s;
      proxy_read_timeout 5m;
      proxy_send_timeout 5m;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    location /tracegate.v1.Edge/ {
      grpc_read_timeout 5m;
      grpc_send_timeout 5m;
      grpc_set_header Host $host;
      grpc_pass grpc://127.0.0.1:10001;
    }

    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
