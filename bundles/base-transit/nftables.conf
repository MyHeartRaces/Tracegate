#!/usr/sbin/nft -f

flush ruleset

table inet filter {
  chain input {
    type filter hook input priority 0;
    policy drop;

    iif "lo" accept
    ct state established,related accept

    # Keep management access available.
    tcp dport 22 accept

    # Public port split guard: Hysteria2 owns only UDP/8443, TCP fronting owns only TCP/443.
    udp dport 443 drop
    tcp dport 8443 drop

    # Public data-plane.
    tcp dport { 80, 443 } accept
    udp dport 8443 accept

    ip protocol icmp accept
    meta l4proto ipv6-icmp accept
  }

  chain forward {
    type filter hook forward priority 0;
    policy drop;
    ct state established,related accept
  }

  chain output {
    type filter hook output priority 0;
    policy accept;
  }
}
