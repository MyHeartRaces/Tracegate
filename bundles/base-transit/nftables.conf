#!/usr/sbin/nft -f

flush ruleset

table inet filter {
  chain input {
    type filter hook input priority 0;
    policy drop;

    iif "lo" accept
    ct state established,related accept

    # Keep management access available.
    tcp dport 22 accept

    # Public port split guard: Hysteria2 Gecko owns public UDP/443, Salamander
    # owns UDP/8444, and UDP/4443 is the Entry<->Endpoint interconnect backhaul.
    # TCP/4443 and TCP+UDP/8443 stay closed.
    udp dport 8443 drop
    tcp dport { 4443, 8443 } drop

    # Public data-plane.
    tcp dport { 80, 443 } accept
    udp dport { 443, 4443, 8444 } accept

    # Entry<->Endpoint TCP backhaul pool (all source-gated to Entry only, opened by
    # the private overlay; never exposed to Internet probing):
    #   tcp/9443 = SS2022 + ShadowTLS v3, leg 1 (primary ShadowTLS front)
    #   tcp/9444 = SS2022 + ShadowTLS v3, leg 2 (second ShadowTLS front)
    #   tcp/9446 = VLESS/REALITY-RAW, leg 3 (heterogeneous fallback)
    #   tcp/9445 = dedicated Telemt link (relayed MTProto FakeTLS, entry-endpoint-tunnel)
    # BEGIN tracegate-managed-entry-link-firewall
    # Materialization replaces this placeholder, including after private overlays.
    ip saddr 192.0.2.1 tcp dport { 9443, 9444, 9445, 9446 } accept
    tcp dport { 9443, 9444, 9445, 9446 } drop
    # END tracegate-managed-entry-link-firewall

    ip protocol icmp accept
    meta l4proto ipv6-icmp accept
  }

  chain forward {
    type filter hook forward priority 0;
    policy drop;
    ct state established,related accept
    # WGWS peers are authenticated by WireGuard and require host forwarding.
    iifname "wg" ip saddr 10.70.0.0/16 accept
  }

  chain output {
    type filter hook output priority 0;
    policy accept;
  }
}

table ip tracegate_wg_nat {
  chain postrouting {
    type nat hook postrouting priority srcnat;
    policy accept;
    ip saddr 10.70.0.0/16 oifname "eth0" masquerade
  }
}
