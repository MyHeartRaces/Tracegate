#!/usr/sbin/nft -f

flush ruleset

table inet filter {
  chain input {
    type filter hook input priority 0;
    policy drop;

    iif "lo" accept
    ct state established,related accept

    # Keep management access available.
    tcp dport 22 accept

    # Public port split guard: Hysteria2 Gecko owns public UDP/443, Salamander
    # owns UDP/8444, and UDP/4443 is the Entry<->Endpoint interconnect backhaul.
    # TCP/4443 and TCP+UDP/8443 stay closed.
    udp dport 8443 drop
    tcp dport { 4443, 8443 } drop

    # Public data-plane.
    tcp dport { 80, 443 } accept
    udp dport { 443, 4443, 8444 } accept

    # Entry<->Endpoint TCP backhaul pool: tcp/9443 (SS2022 + ShadowTLS v3) and
    # tcp/9444 (VLESS/REALITY RAW). These stay closed to the public here and are
    # opened only from the Entry source address by the private overlay, so the
    # backhaul terminators are never exposed to Internet probing.

    ip protocol icmp accept
    meta l4proto ipv6-icmp accept
  }

  chain forward {
    type filter hook forward priority 0;
    policy drop;
    ct state established,related accept
    # WGWS peers are authenticated by WireGuard and require host forwarding.
    iifname "wg" ip saddr 10.70.0.0/16 accept
  }

  chain output {
    type filter hook output priority 0;
    policy accept;
  }
}

table ip tracegate_wg_nat {
  chain postrouting {
    type nat hook postrouting priority srcnat;
    policy accept;
    ip saddr 10.70.0.0/16 oifname "eth0" masquerade
  }
}
