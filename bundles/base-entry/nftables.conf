#!/usr/sbin/nft -f

flush ruleset

table inet filter {
  chain input {
    type filter hook input priority 0;
    policy drop;

    iif "lo" accept
    ct state established,related accept

    # Keep management access available.
    tcp dport 22 accept

    # Inter-node control-plane: dispatcher and observability scrape the Entry agent here.
    tcp dport 8070 accept

    # Public port split guard: Hysteria2 owns public UDP/443; UDP/4443 is the
    # Entry<->Endpoint interconnect backhaul. TCP/4443 and TCP+UDP/8443 stay closed.
    udp dport 8443 drop
    tcp dport { 4443, 8443 } drop

    # Public data-plane.
    tcp dport 443 accept
    udp dport { 443, 4443 } accept

    # tcp/10444 = the Entry cover site that the Endpoint Telemt mask proxies to for
    # probe traffic (entry-endpoint-tunnel). Closed to the public here; opened only
    # from the Endpoint source address by the private overlay.
    # BEGIN tracegate-managed-mtproto-mask-firewall
    # Materialization replaces this placeholder, including after private overlays.
    ip saddr 192.0.2.2 tcp dport 10444 accept
    tcp dport 10444 drop
    # END tracegate-managed-mtproto-mask-firewall

    ip protocol icmp accept
    meta l4proto ipv6-icmp accept
  }

  chain forward {
    type filter hook forward priority 0;
    policy drop;
    ct state established,related accept
  }

  chain output {
    type filter hook output priority 0;
    policy accept;
  }
}
