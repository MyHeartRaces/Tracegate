#!/usr/sbin/nft -f

flush ruleset

table inet filter {
  chain input {
    type filter hook input priority 0;
    policy drop;

    iif "lo" accept
    ct state established,related accept

    # Keep management access available.
    tcp dport 22 accept

    # Inter-node control-plane: dispatcher and observability scrape the Entry agent here.
    tcp dport 8070 accept

    # Public port split guard: Hysteria2 owns UDP/4443; 8443 stays closed.
    udp dport 8443 drop
    tcp dport { 4443, 8443 } drop

    # Public data-plane.
    tcp dport 443 accept
    udp dport { 443, 4443 } accept

    ip protocol icmp accept
    meta l4proto ipv6-icmp accept
  }

  chain forward {
    type filter hook forward priority 0;
    policy drop;
    ct state established,related accept
  }

  chain output {
    type filter hook output priority 0;
    policy accept;
  }
}
