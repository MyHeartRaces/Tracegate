name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]' -c requirements.lock

      - name: Verify tag and build release
        id: release
        run: |
          VERSION=$(python -c 'import pathlib,tomllib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')
          test "${GITHUB_REF_NAME}" = "v${VERSION}"
          test "$(git rev-list -n1 "${GITHUB_REF_NAME}")" = "${GITHUB_SHA}"
          make release-check
          scripts/build_release_artifacts.sh "${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Publish immutable GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ steps.release.outputs.version }}
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "release v${VERSION} already exists" >&2
            exit 1
          fi
          gh release create "v${VERSION}" \
            --verify-tag \
            --title "Tracegate ${VERSION}" \
            --generate-notes \
            dist/release-v${VERSION}/*
