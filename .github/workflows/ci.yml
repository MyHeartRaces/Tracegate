name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]' -c requirements.lock

      - name: Full release checks
        run: make release-check

      - name: Build and inspect release artifacts
        run: |
          VERSION=$(python -c 'import pathlib,tomllib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')
          scripts/build_release_artifacts.sh "$VERSION"

      - name: Clean-room native host install
        run: |
          VERSION=$(python -c 'import pathlib,tomllib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')
          ROOT=$(mktemp -d)
          tar -xzf "dist/release-v${VERSION}/tracegate-host-runtime-${VERSION}.tar.gz" -C "$ROOT"
          sudo env \
            TRACEGATE_INSTALL_ROOT="$ROOT/opt/tracegate" \
            TRACEGATE_SYSTEMD_DIR="$ROOT/etc/systemd" \
            TRACEGATE_SYSCTL_DIR="$ROOT/etc/sysctl.d" \
            TRACEGATE_LOCAL_SBIN_DIR="$ROOT/usr/local/sbin" \
            TRACEGATE_SYSTEMCTL=/bin/true \
            TRACEGATE_SYSCTL=/bin/true \
            "$ROOT/tracegate-host-runtime-${VERSION}/deploy/host/tracegate-host-install" "$VERSION"
          sudo "$ROOT/opt/tracegate/releases/${VERSION}/venv/bin/tracegate-host-private-preflight" --help >/dev/null

      - name: Upload inspected artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tracegate-release-${{ github.sha }}
          path: dist/release-v*/
          if-no-files-found: error
          retention-days: 7
