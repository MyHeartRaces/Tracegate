name: transit-node-replacement

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy on the Transit node
        required: true
        default: main
        type: string
      install_components:
        description: Runtime components for install-runtime.sh
        required: true
        default: xray,mtproto
        type: string
      render_private_overlays:
        description: Run render-xray-centric-overlays.sh before validation
        required: true
        default: false
        type: boolean

jobs:
  replace-transit-node:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: transit-node-replacement
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]' -c requirements.lock

      - name: Verify deploy surface
        run: python -m pytest -q tests/test_systemd_deploy.py tests/test_materialized_bundles.py tests/test_dispatch_bundles.py tests/test_github_workflows.py

      - name: Create deployment bundle
        run: |
          tar \
            --exclude=.git \
            --exclude=.venv \
            --exclude=.pytest_cache \
            --exclude=.ruff_cache \
            --exclude='__pycache__' \
            -czf tracegate-systemd-bundle.tar.gz .

      - name: Write transit single env
        env:
          TRACEGATE_TRANSIT_SINGLE_ENV: ${{ secrets.TRACEGATE_TRANSIT_SINGLE_ENV }}
        run: |
          umask 077
          printf '%s\n' "${TRACEGATE_TRANSIT_SINGLE_ENV}" > tracegate.env

      - name: Load deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.TRACEGATE_TRANSIT_SSH_KEY }}

      - name: Upload bundle and env
        env:
          TRACEGATE_TRANSIT_HOST: ${{ secrets.TRACEGATE_TRANSIT_HOST }}
          TRACEGATE_TRANSIT_SSH_PORT: ${{ secrets.TRACEGATE_TRANSIT_SSH_PORT }}
          TRACEGATE_TRANSIT_SSH_USER: ${{ secrets.TRACEGATE_TRANSIT_SSH_USER }}
        run: |
          set -euo pipefail
          port="${TRACEGATE_TRANSIT_SSH_PORT:-22}"
          user="${TRACEGATE_TRANSIT_SSH_USER:-root}"
          scp -P "${port}" -o StrictHostKeyChecking=accept-new \
            tracegate-systemd-bundle.tar.gz tracegate.env \
            "${user}@${TRACEGATE_TRANSIT_HOST}:/tmp/"

      - name: Replace Transit node
        env:
          TRACEGATE_TRANSIT_HOST: ${{ secrets.TRACEGATE_TRANSIT_HOST }}
          TRACEGATE_TRANSIT_SSH_PORT: ${{ secrets.TRACEGATE_TRANSIT_SSH_PORT }}
          TRACEGATE_TRANSIT_SSH_USER: ${{ secrets.TRACEGATE_TRANSIT_SSH_USER }}
        run: |
          set -euo pipefail
          port="${TRACEGATE_TRANSIT_SSH_PORT:-22}"
          user="${TRACEGATE_TRANSIT_SSH_USER:-root}"
          ssh -p "${port}" -o StrictHostKeyChecking=accept-new "${user}@${TRACEGATE_TRANSIT_HOST}" <<EOF
          set -euo pipefail
          tmp="\$(mktemp -d /tmp/tracegate-replace.XXXXXX)"
          trap 'rm -rf "\${tmp}" /tmp/tracegate-systemd-bundle.tar.gz /tmp/tracegate.env' EXIT
          tar -xzf /tmp/tracegate-systemd-bundle.tar.gz -C "\${tmp}"
          install -d -m 0750 /etc/tracegate
          install -m 0640 /tmp/tracegate.env /etc/tracegate/tracegate.env
          TRACEGATE_ENV_FILE=/etc/tracegate/tracegate.env \
          INSTALL_COMPONENTS='${{ inputs.install_components }}' \
          TRACEGATE_REPLACE_RENDER_PRIVATE_OVERLAYS='${{ inputs.render_private_overlays }}' \
          bash "\${tmp}/deploy/systemd/replace-transit-node.sh"
          EOF
