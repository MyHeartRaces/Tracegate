# Hysteria 2 uses userspace QUIC and needs substantially larger UDP buffers
# than the Linux defaults. Apply the values to both newly created server and
# backhaul client sockets.
net.core.rmem_default = 16777216
net.core.rmem_max = 16777216
net.core.wmem_default = 16777216
net.core.wmem_max = 16777216
