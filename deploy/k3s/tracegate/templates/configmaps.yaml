{{- if $vpsTProbeTlsName }}{{- $_ := set $path "probe_tls_server_name" $vpsTProbeTlsName -}}{{- end -}}
{{- $selectorWsPaths = append $selectorWsPaths $path -}}
{{- end -}}
{{- if and $selectorEnabled (ne $wsPort 443) (.Values.gateway.interconnect.selector.candidates.proxyFqdn.enabled | default true) .Values.gateway.vpsT.proxyFqdn }}
{{- $_ := set $selectorWsPathNames "proxy_fqdn" true -}}
{{- $path := dict "name" "proxy_fqdn" "host" .Values.gateway.vpsT.proxyFqdn "port" $wsPort "priority" (int (.Values.gateway.interconnect.selector.candidates.proxyFqdn.priority | default 0)) -}}
{{- if $vpsTProbeTlsName }}{{- $_ := set $path "probe_tls_server_name" $vpsTProbeTlsName -}}{{- end -}}
{{- $selectorWsPaths = append $selectorWsPaths $path -}}
{{- end -}}
{{- if and $selectorEnabled (ne $wsPort 443) $hyBackplaneEnabled (.Values.gateway.interconnect.selector.candidates.hysteriaBackplane.enabled | default true) }}
{{- $_ := set $selectorWsPathNames "hysteria_backplane" true -}}
{{- $path := dict "name" "hysteria_backplane" "host" $hyBackplaneBindHost "port" $hyBackplaneWsPort "priority" (int (.Values.gateway.interconnect.selector.candidates.hysteriaBackplane.priority | default 9)) "probe_host" $hyBackplaneBindHost "probe_port" $hyBackplaneWsPort -}}
{{- if $vpsTProbeTlsName }}{{- $_ := set $path "probe_tls_server_name" $vpsTProbeTlsName -}}{{- end -}}
{{- $selectorWsPaths = append $selectorWsPaths $path -}}
{{- end -}}
{{- if and $selectorEnabled (ne $wsPort 443) $wgBackplaneEnabled (.Values.gateway.interconnect.selector.candidates.wireguardBackplane.enabled | default true) $wgBackplaneHost }}
{{- $_ := set $selectorWsPathNames "wireguard_backplane" true -}}
{{- $path := dict "name" "wireguard_backplane" "host" $wgBackplaneHost "port" $wsPort "priority" (int (.Values.gateway.interconnect.selector.candidates.wireguardBackplane.priority | default 10)) -}}
{{- if $vpsTProbeTlsName }}{{- $_ := set $path "probe_tls_server_name" $vpsTProbeTlsName -}}{{- end -}}
{{- $selectorWsPaths = append $selectorWsPaths $path -}}
