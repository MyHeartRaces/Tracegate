{{- $selectorWsPaths := list -}}
{{- $selectorWsPathNames := dict -}}
{{- if and $selectorEnabled (ne $wsPort 443) (.Values.gateway.interconnect.selector.candidates.configuredTcpForwardHost.enabled | default true) $vpsETcpForwardHost }}
{{- $_ := set $selectorWsPathNames "configured_tcp_forward_host" true -}}
{{- $path := dict "name" "configured_tcp_forward_host" "host" $vpsETcpForwardHost "port" $wsPort "priority" (int (.Values.gateway.interconnect.selector.candidates.configuredTcpForwardHost.priority | default 5)) -}}
{{- if $vpsTProbeTlsName }}{{- $_ := set $path "probe_tls_server_name" $vpsTProbeTlsName -}}{{- end -}}
{{- $selectorWsPaths = append $selectorWsPaths $path -}}
{{- end -}}
{{- if and $selectorEnabled (ne $wsPort 443) (.Values.gateway.interconnect.selector.candidates.publicIPv4.enabled | default true) .Values.gateway.vpsT.publicIPv4 }}
{{- $_ := set $selectorWsPathNames "public_ipv4" true -}}
{{- $path := dict "name" "public_ipv4" "host" .Values.gateway.vpsT.publicIPv4 "port" $wsPort "priority" (int (.Values.gateway.interconnect.selector.candidates.publicIPv4.priority | default 0)) -}}
{{- if $vpsTProbeTlsName }}{{- $_ := set $path "probe_tls_server_name" $vpsTProbeTlsName -}}{{- end -}}
