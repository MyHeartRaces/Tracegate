{{- $probeHost := (toString ($path.probe_host | default "")) | trim -}}
{{- if ne $probeHost "" }}{{- $_ := set $extraPath "probe_host" $probeHost -}}{{- end -}}
{{- $probePort := int ($path.probe_port | default 0) -}}
{{- if gt $probePort 0 }}{{- $_ := set $extraPath "probe_port" $probePort -}}{{- end -}}
{{- $probeTlsServerName := (toString ($path.probe_tls_server_name | default "")) | trim -}}
{{- if ne $probeTlsServerName "" }}{{- $_ := set $extraPath "probe_tls_server_name" $probeTlsServerName -}}{{- end -}}
{{- $selectorTransitPaths = append $selectorTransitPaths $extraPath -}}
