{{- $host := (toString ($path.host | default "")) | trim -}}
{{- $port := int ($path.port | default 0) -}}
{{- if eq $name "" }}{{- fail (printf "gateway.interconnect.selector.extraWsPaths[%d].name is required" $idx) }}{{- end -}}
{{- if hasKey $selectorWsPathNames $name }}{{- fail (printf "gateway.interconnect.selector.extraWsPaths[%d].name duplicates selector path %q" $idx $name) }}{{- end -}}
{{- if eq $host "" }}{{- fail (printf "gateway.interconnect.selector.extraWsPaths[%d].host is required" $idx) }}{{- end -}}
{{- if lt $port 1 }}{{- fail (printf "gateway.interconnect.selector.extraWsPaths[%d].port must be > 0" $idx) }}{{- end -}}
{{- $_ := set $selectorWsPathNames $name true -}}
{{- $extraPath := dict "name" $name "host" $host "port" $port "priority" (int ($path.priority | default 0)) -}}
{{- $probeHost := (toString ($path.probe_host | default "")) | trim -}}
{{- if ne $probeHost "" }}{{- $_ := set $extraPath "probe_host" $probeHost -}}{{- end -}}
{{- $probePort := int ($path.probe_port | default 0) -}}
{{- if gt $probePort 0 }}{{- $_ := set $extraPath "probe_port" $probePort -}}{{- end -}}
{{- $probeTlsServerName := (toString ($path.probe_tls_server_name | default "")) | trim -}}
{{- if ne $probeTlsServerName "" }}{{- $_ := set $extraPath "probe_tls_server_name" $probeTlsServerName -}}{{- end -}}
{{- $selectorWsPaths = append $selectorWsPaths $extraPath -}}
