{{- $requiredClientProfiles := list "v1-direct-reality-vless" "v1-chain-reality-vless" "v2-direct-quic-hysteria" "v2-chain-quic-hysteria" "v3-direct-shadowtls-shadowsocks" "v3-chain-shadowtls-shadowsocks" "v0-ws-vless" "v0-grpc-vless" "v0-wgws-wireguard" "MTProto-FakeTLS-Direct" }}
