{{- if and .Values.interconnect.entryTransit.enabled (eq $linkOuterCarrierServerName $transitTlsServerName) }}
{{- fail "interconnect.entryTransit.outerCarrier.serverName must be separate from gateway.roles.transit.tls.serverName" }}
