{{- $architectureMode := toString (.Values.architecture.mode | default "legacy-three-node") }}
{{- if not (or (eq $architectureMode "legacy-three-node") (eq $architectureMode "entry-endpoint")) }}
{{- fail "architecture.mode must be legacy-three-node or entry-endpoint" }}
{{- end }}
{{- $deploymentPhase := toString (.Values.architecture.deploymentPhase | default "full") }}
{{- if not (has $deploymentPhase (list "endpoint-first" "full")) }}
{{- fail "architecture.deploymentPhase must be endpoint-first or full" }}
{{- end }}
{{- if and (eq $deploymentPhase "endpoint-first") (ne $architectureMode "entry-endpoint") }}
{{- fail "architecture.deploymentPhase=endpoint-first requires architecture.mode=entry-endpoint" }}
{{- end }}
{{- $ingressRotation := .Values.architecture.ingressRotation }}
{{- if ne (toString $ingressRotation.strategy) "revision-sticky" }}
{{- fail "architecture.ingressRotation.strategy must stay revision-sticky" }}
{{- end }}
{{- if $ingressRotation.rotateEndpointEgress }}
{{- fail "architecture.ingressRotation.rotateEndpointEgress=true is forbidden" }}
{{- end }}
{{- if and $ingressRotation.enabled (ne $architectureMode "entry-endpoint") }}
{{- fail "architecture.ingressRotation.enabled=true requires architecture.mode=entry-endpoint" }}
{{- end }}
{{- if and $ingressRotation.enabled (lt (max (len $ingressRotation.entryHosts) (len $ingressRotation.endpointHosts)) (int $ingressRotation.minimumPoolSize)) }}
{{- if not .Values.architecture.entryIngress.enabled }}
{{- fail "architecture.ingressRotation requires at least one hostname pool meeting minimumPoolSize" }}
{{- end }}
{{- end }}
{{- $entryIngress := .Values.architecture.entryIngress }}
{{- $endpointIngress := .Values.architecture.endpointIngress }}
{{- $universalEntry := .Values.architecture.universalEntry | default dict }}
{{- $endpointBackhaul := .Values.interconnect.endpointBackhaul | default dict }}
{{- $endpointBackhaulHysteria := dig "hysteria2" (dict) $endpointBackhaul }}
{{- $chainBridge := .Values.interconnect.emergencyXrayChain | default dict }}
{{- $chainBridgeShards := $chainBridge.shards | default (list) }}
{{- $chainBridgeXhttp := $chainBridge.xhttp | default dict }}
{{- $chainBridgeXmux := dig "xmux" (dict) $chainBridgeXhttp }}
{{- if $universalEntry.enabled }}
{{- if ne $architectureMode "entry-endpoint" }}
{{- fail "architecture.universalEntry.enabled=true requires architecture.mode=entry-endpoint" }}
{{- end }}
{{- if $entryIngress.enabled }}
{{- fail "architecture.universalEntry.enabled=true forbids architecture.entryIngress.enabled=true" }}
{{- end }}
{{- if $ingressRotation.enabled }}
{{- fail "architecture.universalEntry.enabled=true forbids architecture.ingressRotation.enabled=true" }}
{{- end }}
{{- if not (trim (toString ($universalEntry.publicHost | default ""))) }}
{{- fail "architecture.universalEntry.publicHost is required" }}
{{- end }}
{{- if ne (toString ($universalEntry.provider | default "")) "cloudflare" }}
{{- fail "architecture.universalEntry.provider must stay cloudflare" }}
{{- end }}
{{- if ne (toString ($universalEntry.transport | default "")) "grpc-tls-h2" }}
{{- fail "architecture.universalEntry.transport must stay grpc-tls-h2" }}
{{- end }}
{{- if not (dig "originFirewall" "required" false $universalEntry) }}
{{- fail "architecture.universalEntry.originFirewall.required=false is forbidden" }}
{{- end }}
{{- if not (dig "originFirewall" "denyDirectAccess" false $universalEntry) }}
{{- fail "architecture.universalEntry.originFirewall.denyDirectAccess=false is forbidden" }}
{{- end }}
{{- if not (dig "originFirewall" "allowedSourceCidrs" (list) $universalEntry) }}
{{- fail "architecture.universalEntry.originFirewall.allowedSourceCidrs is required" }}
{{- end }}
{{- if not (dig "clientPolicy" "multiplexSingleTls" false $universalEntry) }}
{{- fail "architecture.universalEntry.clientPolicy.multiplexSingleTls=false is forbidden" }}
{{- end }}
{{- if ne (int (dig "clientPolicy" "maxParallelHandshakes" 0 $universalEntry)) 1 }}
{{- fail "architecture.universalEntry.clientPolicy.maxParallelHandshakes must stay 1" }}
{{- end }}
{{- if not (dig "backhaul" "requireMultiTransportPool" false $universalEntry) }}
{{- fail "architecture.universalEntry.backhaul.requireMultiTransportPool=false is forbidden" }}
{{- end }}
{{- if not (dig "backhaul" "failClosed" false $universalEntry) }}
{{- fail "architecture.universalEntry.backhaul.failClosed=false is forbidden" }}
{{- end }}
{{- if not (dig "backhaul" "endpointEgressOnly" false $universalEntry) }}
{{- fail "architecture.universalEntry.backhaul.endpointEgressOnly=false is forbidden" }}
{{- end }}
{{- if not .Values.interconnect.emergencyXrayChain.enabled }}
{{- fail "architecture.universalEntry.enabled=true requires interconnect.emergencyXrayChain.enabled=true" }}
{{- end }}
{{- if not ($endpointBackhaul.enabled | default false) }}
{{- fail "architecture.universalEntry.enabled=true requires interconnect.endpointBackhaul.enabled=true" }}
{{- end }}
{{- if ne (toString ($endpointBackhaul.primary | default "")) "vless-reality-xhttp" }}
{{- fail "interconnect.endpointBackhaul.primary must stay vless-reality-xhttp" }}
{{- end }}
{{- if ne (toString ($endpointBackhaul.secondary | default "")) "hysteria2-salamander" }}
{{- fail "interconnect.endpointBackhaul.secondary must stay hysteria2-salamander" }}
{{- end }}
{{- if ne (toString (dig "selection" "strategy" "" $endpointBackhaul)) "roundRobin" }}
{{- fail "interconnect.endpointBackhaul.selection.strategy must stay roundRobin" }}
{{- end }}
{{- if ne (toString (dig "selection" "stickyScope" "" $endpointBackhaul)) "connection" }}
{{- fail "interconnect.endpointBackhaul.selection.stickyScope must stay connection" }}
{{- end }}
{{- if ne (int (dig "selection" "maxParallelDials" 0 $endpointBackhaul)) 1 }}
{{- fail "interconnect.endpointBackhaul.selection.maxParallelDials must stay 1" }}
{{- end }}
{{- if not (dig "health" "payloadProbeRequired" false $endpointBackhaul) }}
{{- fail "interconnect.endpointBackhaul.health.payloadProbeRequired=false is forbidden" }}
{{- end }}
{{- if not (dig "enabled" false $endpointBackhaulHysteria) }}
{{- fail "architecture.universalEntry.enabled=true requires interconnect.endpointBackhaul.hysteria2.enabled=true" }}
{{- end }}
{{- if empty .Values.privateProfiles.secretKeys.hysteriaEndpointBackhaulAuth }}
{{- fail "privateProfiles.secretKeys.hysteriaEndpointBackhaulAuth is required" }}
{{- end }}
{{- if not (dig "allowedSources" (list) $endpointBackhaulHysteria) }}
{{- fail "interconnect.endpointBackhaul.hysteria2.allowedSources is required" }}
{{- end }}
{{- if ne (int (dig "endpointPort" 0 $endpointBackhaulHysteria)) (int .Values.gateway.roles.transit.ports.publicUdp) }}
{{- fail "interconnect.endpointBackhaul.hysteria2.endpointPort must match Endpoint publicUdp" }}
{{- end }}
{{- if dig "fastOpen" true $endpointBackhaulHysteria }}
{{- fail "interconnect.endpointBackhaul.hysteria2.fastOpen=true is forbidden" }}
{{- end }}
{{- if dig "lazy" true $endpointBackhaulHysteria }}
{{- fail "interconnect.endpointBackhaul.hysteria2.lazy=true is forbidden" }}
{{- end }}
{{- if dig "quic" "disablePathMTUDiscovery" true $endpointBackhaulHysteria }}
{{- fail "interconnect.endpointBackhaul.hysteria2.quic.disablePathMTUDiscovery=true is forbidden" }}
{{- end }}
{{- if ne (toString (dig "congestion" "type" "" $endpointBackhaulHysteria)) "bbr" }}
{{- fail "interconnect.endpointBackhaul.hysteria2.congestion.type must stay bbr" }}
{{- end }}
{{- if ne (toString (dig "congestion" "profile" "" $endpointBackhaulHysteria)) "conservative" }}
{{- fail "interconnect.endpointBackhaul.hysteria2.congestion.profile must stay conservative" }}
{{- end }}
{{- if or (lt (len $chainBridgeShards) 2) (gt (len $chainBridgeShards) 8) }}
{{- fail "Universal Entry XHTTP backhaul requires 2 to 8 connect/SNI shards" }}
{{- end }}
{{- if ne (toString (dig "clientMode" "" $chainBridgeXhttp)) "stream-one" }}
{{- fail "interconnect.emergencyXrayChain.xhttp.clientMode must stay stream-one" }}
{{- end }}
{{- if ne (toString (dig "serverMode" "" $chainBridgeXhttp)) "auto" }}
{{- fail "interconnect.emergencyXrayChain.xhttp.serverMode must stay auto" }}
{{- end }}
{{- if ne (int (dig "maxConnections" 0 $chainBridgeXmux)) 1 }}
{{- fail "interconnect.emergencyXrayChain.xhttp.xmux.maxConnections must stay 1" }}
{{- end }}
{{- if and (gt (int (dig "maxConnections" 0 $chainBridgeXmux)) 0) (not (empty (dig "maxConcurrency" "" $chainBridgeXmux))) (ne (toString (dig "maxConcurrency" "" $chainBridgeXmux)) "0") }}
{{- fail "interconnect.emergencyXrayChain.xhttp.xmux.maxConnections and maxConcurrency cannot be set together" }}
{{- end }}
{{- $bridgeShardIds := list }}
{{- $bridgeShardSnis := list }}
{{- $bridgeShardPorts := list }}
{{- $bridgeShardPaths := list }}
{{- range $shard := $chainBridgeShards }}
{{- if not (trim (toString ($shard.id | default ""))) }}
{{- fail "interconnect.emergencyXrayChain.shards[].id is required" }}
{{- end }}
{{- if not (trim (toString ($shard.serverName | default ""))) }}
{{- fail "interconnect.emergencyXrayChain.shards[].serverName is required" }}
{{- end }}
{{- if not (trim (toString ($shard.dest | default ""))) }}
{{- fail "interconnect.emergencyXrayChain.shards[].dest is required" }}
{{- end }}
{{- if or (lt (int ($shard.endpointListenPort | default 0)) 1024) (gt (int ($shard.endpointListenPort | default 0)) 65535) }}
{{- fail "interconnect.emergencyXrayChain.shards[].endpointListenPort must be an unprivileged TCP port" }}
{{- end }}
{{- if or (not (hasPrefix "/" (toString ($shard.path | default "")))) (contains "://" (toString ($shard.path | default ""))) }}
{{- fail "interconnect.emergencyXrayChain.shards[].path must be a clean absolute path" }}
{{- end }}
{{- $bridgeShardIds = append $bridgeShardIds $shard.id }}
{{- $bridgeShardSnis = append $bridgeShardSnis $shard.serverName }}
{{- $bridgeShardPorts = append $bridgeShardPorts $shard.endpointListenPort }}
{{- $bridgeShardPaths = append $bridgeShardPaths $shard.path }}
{{- end }}
{{- if ne (len $bridgeShardIds) (len (uniq $bridgeShardIds)) }}
{{- fail "interconnect.emergencyXrayChain.shards[].id values must be unique" }}
{{- end }}
{{- if ne (len $bridgeShardSnis) (len (uniq $bridgeShardSnis)) }}
{{- fail "interconnect.emergencyXrayChain.shards[].serverName values must be unique" }}
{{- end }}
{{- if ne (len $bridgeShardPorts) (len (uniq $bridgeShardPorts)) }}
{{- fail "interconnect.emergencyXrayChain.shards[].endpointListenPort values must be unique" }}
{{- end }}
{{- if ne (len $bridgeShardPaths) (len (uniq $bridgeShardPaths)) }}
{{- fail "interconnect.emergencyXrayChain.shards[].path values must be unique" }}
{{- end }}
{{- if not .Values.interconnect.emergencyXrayChain.allowedSources }}
{{- fail "architecture.universalEntry.enabled=true requires interconnect.emergencyXrayChain.allowedSources" }}
{{- end }}
{{- if ne (toString $universalEntry.publicHost) (toString .Values.controlPlane.env.defaultEntryHost) }}
{{- fail "architecture.universalEntry.publicHost must match controlPlane.env.defaultEntryHost" }}
{{- end }}
{{- if ne (toString $universalEntry.publicHost) (toString .Values.gateway.roles.entry.tls.serverName) }}
{{- fail "architecture.universalEntry.publicHost must match gateway.roles.entry.tls.serverName" }}
{{- end }}
{{- end }}
{{- if $entryIngress.enabled }}
{{- if ne $architectureMode "entry-endpoint" }}
{{- fail "architecture.entryIngress.enabled=true requires architecture.mode=entry-endpoint" }}
{{- end }}
{{- if not $ingressRotation.enabled }}
{{- fail "architecture.entryIngress.enabled=true requires architecture.ingressRotation.enabled=true" }}
{{- end }}
{{- if ne (len $entryIngress.shards) 3 }}
{{- fail "architecture.entryIngress.shards must contain exactly three shards" }}
{{- end }}
{{- if not $entryIngress.serviceFacing.publicIp }}
{{- fail "architecture.entryIngress.serviceFacing.publicIp is required" }}
{{- end }}
{{- if not $entryIngress.firewall.required }}
{{- fail "architecture.entryIngress.firewall.required=false is forbidden" }}
{{- end }}
{{- if not $entryIngress.channel.tcp.bindShardIpsOnly }}
{{- fail "architecture.entryIngress.channel.tcp.bindShardIpsOnly=false is forbidden" }}
{{- end }}
{{- if not $entryIngress.channel.udp.serviceIpRejectRequired }}
{{- fail "architecture.entryIngress.channel.udp.serviceIpRejectRequired=false is forbidden" }}
{{- end }}
{{- $entryShardIds := list }}
{{- $entryShardIps := list }}
{{- range $shard := $entryIngress.shards }}
{{- if not (has (toString ($shard.state | default "active")) (list "active" "draining" "disabled")) }}
{{- fail "architecture.entryIngress shard state must be active, draining or disabled" }}
{{- end }}
{{- if not $shard.publicIp }}
{{- fail "architecture.entryIngress.shards[].publicIp is required" }}
{{- end }}
{{- if not (contains "{token}" (toString $shard.hostnameTemplate)) }}
{{- fail "architecture.entryIngress.shards[].hostnameTemplate must contain {token}" }}
{{- end }}
{{- if not $shard.mtprotoHost }}
{{- fail "architecture.entryIngress.shards[].mtprotoHost is required" }}
{{- end }}
{{- $entryShardIds = append $entryShardIds $shard.id }}
{{- $entryShardIps = append $entryShardIps $shard.publicIp }}
{{- end }}
{{- if ne (len $entryShardIds) (len (uniq $entryShardIds)) }}
{{- fail "architecture.entryIngress.shards[].id values must be unique" }}
{{- end }}
{{- if ne (len $entryShardIps) (len (uniq $entryShardIps)) }}
{{- fail "architecture.entryIngress.shards[].publicIp values must be unique" }}
{{- end }}
{{- if has $entryIngress.serviceFacing.publicIp $entryShardIps }}
{{- fail "architecture.entryIngress.serviceFacing.publicIp must not match a shard publicIp" }}
{{- end }}
{{- $exclusiveSniPairs := $entryIngress.exclusiveSniPairs | default dict }}
{{- if $exclusiveSniPairs.enabled }}
{{- $sniPool := $exclusiveSniPairs.pool | default (list) }}
{{- if or (lt (len $sniPool) 10) (gt (len $sniPool) 15) }}
{{- fail "architecture.entryIngress.exclusiveSniPairs.pool must contain 10 to 15 domains" }}
{{- end }}
{{- if ne (len $sniPool) (len (uniq $sniPool)) }}
{{- fail "architecture.entryIngress.exclusiveSniPairs.pool must contain unique domains" }}
{{- end }}
{{- $groups := $.Values.gateway.realityMultiInboundGroups | default (list) }}
{{- if ne (len $groups) (len $sniPool) }}
{{- fail "exclusive Entry SNI pairs require exactly one realityMultiInboundGroups row per pool domain" }}
{{- end }}
{{- $groupSnis := list }}
{{- range $group := $groups }}
{{- if ne (len ($group.snis | default (list))) 1 }}
{{- fail "exclusive Entry SNI pairs require one SNI per realityMultiInboundGroups row" }}
{{- end }}
{{- $groupSnis = append $groupSnis (index $group.snis 0) }}
{{- end }}
{{- if ne (len $groupSnis) (len (uniq $groupSnis)) }}
{{- fail "exclusive Entry SNI pair realityMultiInboundGroups rows must not reuse SNI" }}
{{- end }}
{{- range $sni := $sniPool }}
{{- if not (has $sni $groupSnis) }}
{{- fail "exclusive Entry SNI pair pool must exactly match realityMultiInboundGroups SNI values" }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- if $endpointIngress.enabled }}
{{- if ne $architectureMode "entry-endpoint" }}
{{- fail "architecture.endpointIngress.enabled=true requires architecture.mode=entry-endpoint" }}
{{- end }}
{{- if ne (len $endpointIngress.shards) 3 }}
{{- fail "architecture.endpointIngress.shards must contain exactly three shards" }}
{{- end }}
{{- if not $endpointIngress.serviceFacing.publicIp }}
{{- fail "architecture.endpointIngress.serviceFacing.publicIp is required" }}
{{- end }}
{{- if not $endpointIngress.firewall.required }}
{{- fail "architecture.endpointIngress.firewall.required=false is forbidden" }}
{{- end }}
{{- if not $endpointIngress.channel.tcp.bindShardIpsOnly }}
{{- fail "architecture.endpointIngress.channel.tcp.bindShardIpsOnly=false is forbidden" }}
{{- end }}
{{- if not $endpointIngress.channel.udp.serviceIpRejectRequired }}
{{- fail "architecture.endpointIngress.channel.udp.serviceIpRejectRequired=false is forbidden" }}
{{- end }}
{{- $endpointShardIds := list }}
{{- $endpointShardIps := list }}
{{- range $shard := $endpointIngress.shards }}
{{- if not (has (toString ($shard.state | default "active")) (list "active" "draining" "disabled")) }}
{{- fail "architecture.endpointIngress shard state must be active, draining or disabled" }}
{{- end }}
{{- if not $shard.publicIp }}
{{- fail "architecture.endpointIngress.shards[].publicIp is required" }}
{{- end }}
{{- if not (contains "{token}" (toString $shard.hostnameTemplate)) }}
{{- fail "architecture.endpointIngress.shards[].hostnameTemplate must contain {token}" }}
{{- end }}
{{- $endpointShardIds = append $endpointShardIds $shard.id }}
{{- $endpointShardIps = append $endpointShardIps $shard.publicIp }}
{{- end }}
{{- if ne (len $endpointShardIds) (len (uniq $endpointShardIds)) }}
{{- fail "architecture.endpointIngress.shards[].id values must be unique" }}
{{- end }}
{{- if ne (len $endpointShardIps) (len (uniq $endpointShardIps)) }}
{{- fail "architecture.endpointIngress.shards[].publicIp values must be unique" }}
{{- end }}
{{- if has $endpointIngress.serviceFacing.publicIp $endpointShardIps }}
{{- fail "architecture.endpointIngress.serviceFacing.publicIp must not match a shard publicIp" }}
{{- end }}
{{- $endpointExclusiveSniPairs := $endpointIngress.exclusiveSniPairs | default dict }}
{{- if $endpointExclusiveSniPairs.enabled }}
{{- $endpointSniPool := $endpointExclusiveSniPairs.pool | default (list) }}
{{- if or (lt (len $endpointSniPool) 10) (gt (len $endpointSniPool) 15) }}
{{- fail "architecture.endpointIngress.exclusiveSniPairs.pool must contain 10 to 15 domains" }}
{{- end }}
{{- if ne (len $endpointSniPool) (len (uniq $endpointSniPool)) }}
{{- fail "architecture.endpointIngress.exclusiveSniPairs.pool must contain unique domains" }}
{{- end }}
{{- $endpointGroups := $.Values.gateway.realityMultiInboundGroups | default (list) }}
{{- if ne (len $endpointGroups) (len $endpointSniPool) }}
{{- fail "exclusive Endpoint SNI pairs require exactly one realityMultiInboundGroups row per pool domain" }}
{{- end }}
{{- $endpointGroupSnis := list }}
{{- range $group := $endpointGroups }}
{{- if ne (len ($group.snis | default (list))) 1 }}
{{- fail "exclusive Endpoint SNI pairs require one SNI per realityMultiInboundGroups row" }}
{{- end }}
{{- $endpointGroupSnis = append $endpointGroupSnis (index $group.snis 0) }}
{{- end }}
{{- range $sni := $endpointSniPool }}
{{- if not (has $sni $endpointGroupSnis) }}
{{- fail "exclusive Endpoint SNI pair pool must exactly match realityMultiInboundGroups SNI values" }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- if and (eq $architectureMode "entry-endpoint") .Values.transitRouter.enabled }}
{{- fail "architecture.mode=entry-endpoint forbids transitRouter.enabled=true" }}
{{- end }}
{{- if and (eq $architectureMode "entry-endpoint") (or .Values.interconnect.entryTransit.enabled .Values.interconnect.entryTransit.routerEntry.enabled .Values.interconnect.entryTransit.routerTransit.enabled) }}
{{- fail "architecture.mode=entry-endpoint forbids the legacy interconnect.entryTransit path" }}
{{- end }}
{{- if and (eq $architectureMode "entry-endpoint") (or .Values.topology.servers.transit.publicIp .Values.topology.servers.transit.kubernetesNodeName) }}
{{- fail "architecture.mode=entry-endpoint forbids a configured topology.servers.transit node" }}
{{- end }}
{{- if and (eq $architectureMode "entry-endpoint") (ne (toString .Values.mtproto.route.mode) "entry-endpoint-tunnel") }}
{{- fail "architecture.mode=entry-endpoint requires mtproto.route.mode=entry-endpoint-tunnel" }}
{{- end }}
{{- if eq $architectureMode "entry-endpoint" }}
{{- if not .Values.gateway.roles.transit.enabled }}
{{- fail "architecture.mode=entry-endpoint requires the Endpoint gateway role" }}
{{- end }}
{{- if and (eq $deploymentPhase "endpoint-first") .Values.gateway.roles.entry.enabled }}
{{- fail "architecture.deploymentPhase=endpoint-first requires gateway.roles.entry.enabled=false" }}
{{- end }}
{{- if and (eq $deploymentPhase "endpoint-first") .Values.architecture.universalEntry.enabled }}
{{- fail "architecture.deploymentPhase=endpoint-first forbids architecture.universalEntry.enabled=true" }}
{{- end }}
{{- if and (eq $deploymentPhase "full") (not .Values.gateway.roles.entry.enabled) }}
{{- fail "architecture.deploymentPhase=full requires gateway.roles.entry.enabled=true" }}
{{- end }}
{{- end }}
{{- if .Values.architecture.podRuntimeOnly }}
{{- if ne $architectureMode "entry-endpoint" }}
{{- fail "architecture.podRuntimeOnly=true requires architecture.mode=entry-endpoint" }}
{{- end }}
{{- if not .Values.architecture.endpointIngress.enabled }}
{{- fail "architecture.podRuntimeOnly=true requires architecture.endpointIngress.enabled=true" }}
{{- end }}
{{- if ne (toString .Values.gateway.stateStorage.mode) "pvc" }}
{{- fail "architecture.podRuntimeOnly=true requires gateway.stateStorage.mode=pvc" }}
{{- end }}
{{- if .Values.decoy.hostPath }}
{{- fail "architecture.podRuntimeOnly=true forbids decoy.hostPath" }}
{{- end }}
{{- range $roleName, $role := .Values.gateway.roles }}
{{- if and $role.enabled (empty (index $.Values.gateway.stateStorage.existingClaims $roleName)) }}
{{- fail (printf "architecture.podRuntimeOnly=true requires gateway.stateStorage.existingClaims.%s" $roleName) }}
{{- end }}
{{- end }}
{{- if or .Values.transitRouter.enabled .Values.naiveproxy.enabled .Values.interconnect.entryTransit.enabled .Values.interconnect.entryTransit.routerEntry.enabled .Values.interconnect.entryTransit.routerTransit.enabled .Values.interconnect.mieru.enabled .Values.interconnect.zapret2.enabled .Values.experimentalProfiles.enabled }}
{{- fail "architecture.podRuntimeOnly=true forbids legacy routers, NaiveProxy, Mieru, Zapret2 and experimental runtimes" }}
{{- end }}
{{- if not (and .Values.wireguard.enabled .Values.wireguard.wstunnel.enabled) }}
{{- fail "architecture.podRuntimeOnly=true requires WireGuard-over-WebSocket pod runtime" }}
{{- end }}
{{- if not .Values.shadowsocks2022.enabled }}
{{- fail "architecture.podRuntimeOnly=true requires the Backup ShadowTLS pod runtime" }}
{{- end }}
{{- end }}
{{- if and .Values.controlPlane.enabled (not .Values.controlPlane.auth.existingSecretName) }}
{{- if not .Values.controlPlane.auth.apiInternalToken }}
{{- fail "controlPlane.auth.apiInternalToken is required when controlPlane.auth.existingSecretName is not set" }}
{{- end }}
{{- if not .Values.controlPlane.auth.agentAuthToken }}
{{- fail "controlPlane.auth.agentAuthToken is required when controlPlane.auth.existingSecretName is not set" }}
{{- end }}
{{- if and (gt (int .Values.controlPlane.replicas.bot) 0) (not .Values.controlPlane.auth.botToken) }}
{{- fail "controlPlane.auth.botToken is required when bot replicas are enabled and controlPlane.auth.existingSecretName is not set" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tracegate.controlPlaneSecretName" . }}
  namespace: {{ include "tracegate.namespace" . }}
  labels:
    {{- include "tracegate.labels" . | nindent 4 }}
type: Opaque
stringData:
  api-internal-token: {{ .Values.controlPlane.auth.apiInternalToken | quote }}
  agent-auth-token: {{ .Values.controlPlane.auth.agentAuthToken | quote }}
  bot-token: {{ .Values.controlPlane.auth.botToken | quote }}
  grafana-alerts-webhook-token: {{ .Values.controlPlane.auth.grafanaAlertsWebhookToken | quote }}
{{- end }}
{{- if and .Values.controlPlane.enabled (gt (int .Values.controlPlane.replicas.bot) 0) .Values.controlPlane.env.botWelcomeRequired (not .Values.controlPlane.env.botWelcomeMessageSecret.name) }}
{{- fail "controlPlane.env.botWelcomeMessageSecret.name is required when bot welcome is required; keep the real warning text outside Git" }}
{{- end }}
{{- if and .Values.controlPlane.enabled (gt (int .Values.controlPlane.replicas.bot) 0) .Values.controlPlane.env.botWelcomeRequired (not .Values.controlPlane.env.botWelcomeMessageSecret.key) }}
{{- fail "controlPlane.env.botWelcomeMessageSecret.key is required when bot welcome is required" }}
{{- end }}
{{- if and .Values.controlPlane.enabled (gt (int .Values.controlPlane.replicas.bot) 0) (not .Values.controlPlane.env.botGuideMessageSecret.name) }}
{{- fail "controlPlane.env.botGuideMessageSecret.name is required when bot replicas are enabled; keep the real /guide text outside Git" }}
{{- end }}
{{- if and .Values.controlPlane.enabled (gt (int .Values.controlPlane.replicas.bot) 0) (not .Values.controlPlane.env.botGuideMessageSecret.key) }}
{{- fail "controlPlane.env.botGuideMessageSecret.key is required when bot replicas are enabled" }}
{{- end }}
{{- if and .Values.controlPlane.enabled .Values.controlPlane.database.embedded.enabled }}
{{- if not .Values.controlPlane.database.embedded.password }}
{{- fail "controlPlane.database.embedded.password is required when embedded PostgreSQL is enabled" }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tracegate.postgresSecretName" . }}
  namespace: {{ include "tracegate.namespace" . }}
  labels:
    {{- include "tracegate.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.controlPlane.database.embedded.password | quote }}
{{- end }}
{{- if and .Values.controlPlane.enabled (not .Values.controlPlane.database.embedded.enabled) (not .Values.controlPlane.database.externalUrl) (not .Values.controlPlane.database.externalUrlSecret.name) }}
{{- fail "controlPlane.database requires externalUrl, externalUrlSecret.name, or embedded.enabled=true" }}
{{- end }}
{{- if not .Values.privateProfiles.required }}
{{- fail "privateProfiles.required=false is forbidden in Tracegate 3 production defaults" }}
{{- end }}
{{- if and .Values.privateProfiles.required (not .Values.privateProfiles.existingSecretName) }}
{{- fail "privateProfiles.required=true requires privateProfiles.existingSecretName; private transport profiles must not be committed to Git" }}
{{- end }}
{{- if .Values.privateProfiles.inlineProfiles }}
{{- fail "privateProfiles.inlineProfiles=true is forbidden; use an external Secret created outside Git" }}
{{- end }}
{{- $privateProfilesDefaultMode := int .Values.privateProfiles.defaultMode }}
{{- if not (or (eq $privateProfilesDefaultMode 256) (eq $privateProfilesDefaultMode 288) (eq $privateProfilesDefaultMode 384) (eq $privateProfilesDefaultMode 416)) }}
{{- fail "privateProfiles.defaultMode must be one of 0400, 0440, 0600 or 0640; private Secret files must not grant execute or world permissions" }}
{{- end }}
{{- if not (or (eq .Values.gateway.strategy "RollingUpdate") (eq .Values.gateway.strategy "Recreate")) }}
{{- fail "gateway.strategy must be RollingUpdate or Recreate" }}
{{- end }}
{{- if and (eq .Values.gateway.strategy "Recreate") (not .Values.gateway.allowRecreateStrategy) }}
{{- fail "gateway.strategy=Recreate is forbidden by default in Tracegate 3; use RollingUpdate maxUnavailable=0 or explicitly set gateway.allowRecreateStrategy=true for lab-only maintenance" }}
{{- end }}
{{- $gatewayMaxUnavailable := toString .Values.gateway.rollingUpdate.maxUnavailable }}
{{- $gatewayMaxSurge := toString .Values.gateway.rollingUpdate.maxSurge }}
{{- $gatewayZeroUnavailable := and (eq $gatewayMaxUnavailable "0") (not (or (eq $gatewayMaxSurge "0") (eq $gatewayMaxSurge "0%"))) }}
{{- $gatewaySingleHostNetwork := and (eq $gatewayMaxUnavailable "1") (or (eq $gatewayMaxSurge "0") (eq $gatewayMaxSurge "0%")) }}
{{- if and (eq .Values.gateway.strategy "RollingUpdate") (not (or $gatewayZeroUnavailable $gatewaySingleHostNetwork)) }}
{{- fail "gateway.rollingUpdate must be either maxUnavailable=0/maxSurge>0 or single-hostNetwork maxUnavailable=1/maxSurge=0" }}
{{- end }}
{{- if lt (int .Values.gateway.progressDeadlineSeconds) 300 }}
{{- fail "gateway.progressDeadlineSeconds must be at least 300 seconds so safe hostNetwork upgrades can stall instead of failing early" }}
{{- end }}
{{- if not .Values.gateway.pdb.enabled }}
{{- fail "gateway.pdb.enabled=false is forbidden in Tracegate 3 production defaults" }}
{{- end }}
{{- if ne (toString .Values.gateway.pdb.minAvailable) "1" }}
{{- fail "gateway.pdb.minAvailable must stay 1 for one-pod Entry/Transit gateway roles" }}
{{- end }}
{{- if not .Values.gateway.probes.enabled }}
{{- fail "gateway.probes.enabled=false is forbidden in Tracegate 3 production defaults" }}
{{- end }}
{{- if not .Values.gateway.privatePreflight.enabled }}
{{- fail "gateway.privatePreflight.enabled=false is forbidden in Tracegate 3 production defaults" }}
{{- end }}
{{- if not .Values.gateway.privatePreflight.forbidPlaceholders }}
{{- fail "gateway.privatePreflight.forbidPlaceholders=false is forbidden in Tracegate 3 production defaults" }}
{{- end }}
{{- if not .Values.gateway.trafficShaping.entry.enabled }}
{{- fail "gateway.trafficShaping.entry.enabled=false is forbidden; Entry must enforce a host-level traffic cap" }}
{{- end }}
{{- if not .Values.gateway.hostNetwork }}
{{- fail "gateway.trafficShaping.entry requires gateway.hostNetwork=true so tc can protect the Entry host interface" }}
{{- end }}
{{- if empty .Values.gateway.trafficShaping.entry.interface }}
{{- fail "gateway.trafficShaping.entry.interface must name the Entry public network interface" }}
{{- end }}
{{- $entryTrafficMaxMbit := int .Values.gateway.trafficShaping.entry.maxMbit }}
{{- if ne $entryTrafficMaxMbit 65 }}
{{- fail "gateway.trafficShaping.entry.maxMbit must stay at the Tracegate 3 global Entry cap of 65 Mbit/s" }}
{{- end }}
{{- if lt (int .Values.gateway.trafficShaping.entry.burstKbit) 64 }}
{{- fail "gateway.trafficShaping.entry.burstKbit must be at least 64" }}
{{- end }}
{{- if not .Values.gateway.trafficShaping.entry.applyEgress }}
{{- fail "gateway.trafficShaping.entry.applyEgress=false is forbidden; Entry egress must be shaped" }}
{{- end }}
{{- if not .Values.gateway.trafficShaping.entry.applyIngressPolicing }}
{{- fail "gateway.trafficShaping.entry.applyIngressPolicing=false is forbidden; Entry ingress must be policed" }}
{{- end }}
{{- if not .Values.gateway.trafficShaping.entry.failClosed }}
{{- fail "gateway.trafficShaping.entry.failClosed=false is forbidden; Entry must fail closed if traffic shaping cannot apply" }}
{{- end }}
{{- if not .Values.gateway.trafficShaping.chainClient.enabled }}
{{- fail "gateway.trafficShaping.chainClient.enabled=false is forbidden; chain clients must carry a bounded rate policy" }}
{{- end }}
{{- $chainClientMaxMbit := int .Values.gateway.trafficShaping.chainClient.maxMbit }}
{{- if or (lt $chainClientMaxMbit 1) (gt $chainClientMaxMbit 10) }}
{{- fail "gateway.trafficShaping.chainClient.maxMbit must be in 1..10" }}
{{- end }}
{{- if not .Values.gateway.trafficShaping.chainClient.requireDeclaredHysteriaTx }}
{{- fail "gateway.trafficShaping.chainClient.requireDeclaredHysteriaTx=false is forbidden; Entry Hysteria auth must reject undeclared bandwidth" }}
{{- end }}
{{- if not .Values.gateway.trafficShaping.hysteria.ignoreClientBandwidth }}
{{- fail "gateway.trafficShaping.hysteria.ignoreClientBandwidth=false is forbidden for non-Entry Hysteria surfaces" }}
{{- end }}
{{- if .Values.gateway.trafficShaping.hysteria.entryChainIgnoreClientBandwidth }}
{{- fail "gateway.trafficShaping.hysteria.entryChainIgnoreClientBandwidth=true is forbidden; Entry chain Hysteria must honor the 10 Mbit/s bandwidth cap" }}
{{- end }}
{{- if and (eq $architectureMode "legacy-three-node") (not .Values.gateway.nodeEncryption.enabled) }}
{{- fail "gateway.nodeEncryption.enabled=false is forbidden; Entry/Transit runtime state must require encrypted host storage" }}
{{- end }}
{{- if and (eq $architectureMode "legacy-three-node") (not .Values.gateway.nodeEncryption.required) }}
{{- fail "gateway.nodeEncryption.required=false is forbidden; Entry/Transit runtime state must require encrypted host storage" }}
{{- end }}
{{- if and (eq $architectureMode "legacy-three-node") (empty .Values.gateway.nodeEncryption.markerFile) }}
{{- fail "gateway.nodeEncryption.markerFile must be set" }}
{{- end }}
{{- if and (eq $architectureMode "legacy-three-node") (empty .Values.gateway.nodeEncryption.markerValue) }}
{{- fail "gateway.nodeEncryption.markerValue must be set" }}
{{- end }}
{{- if and (eq $architectureMode "legacy-three-node") (not .Values.gateway.nodeEncryption.nodeAnnotations.enabled) }}
{{- fail "gateway.nodeEncryption.nodeAnnotations.enabled=false is forbidden; Entry/Transit nodes must advertise encrypted runtime storage" }}
{{- end }}
{{- if and (eq $architectureMode "legacy-three-node") (empty .Values.gateway.nodeEncryption.nodeAnnotations.encryptedRuntime) }}
{{- fail "gateway.nodeEncryption.nodeAnnotations.encryptedRuntime must be set" }}
{{- end }}
{{- if and (eq $architectureMode "legacy-three-node") (empty .Values.gateway.nodeEncryption.nodeAnnotations.expectedValue) }}
{{- fail "gateway.nodeEncryption.nodeAnnotations.expectedValue must be set" }}
{{- end }}
{{- if and (eq $architectureMode "entry-endpoint") (or .Values.gateway.nodeEncryption.enabled .Values.gateway.nodeEncryption.required .Values.gateway.nodeEncryption.runtimeInitValidation .Values.gateway.nodeEncryption.requireDeviceMapperSource .Values.gateway.nodeEncryption.nodeAnnotations.enabled) }}
{{- fail "architecture.mode=entry-endpoint forbids gateway.nodeEncryption host-level encryption guards" }}
{{- end }}
{{- if .Values.gateway.entrySmall.enabled }}
{{- if not .Values.gateway.roles.entry.enabled }}
{{- fail "gateway.entrySmall.enabled=true requires gateway.roles.entry.enabled=true" }}
{{- end }}
{{- if not .Values.gateway.entrySmall.forbidWireGuard }}
{{- fail "gateway.entrySmall.forbidWireGuard=false is forbidden; 1g/1vcpu Entry must not carry WGWS" }}
{{- end }}
{{- if not .Values.gateway.entrySmall.forbidExperimental }}
{{- fail "gateway.entrySmall.forbidExperimental=false is forbidden; 1g/1vcpu Entry must not carry lab surfaces" }}
{{- end }}
{{- if .Values.wireguard.enabled }}
{{- fail "wireguard.enabled=true is forbidden when gateway.entrySmall.enabled=true" }}
{{- end }}
{{- if not .Values.shadowsocks2022.enabled }}
{{- fail "shadowsocks2022.enabled=false is forbidden when gateway.entrySmall.enabled=true; Entry-small must carry V1/V2/V3" }}
{{- end }}
{{- $entrySmallDirectLabRequested := or .Values.experimentalProfiles.directTransitObfuscation.enabled .Values.experimentalProfiles.directTransitObfuscation.mieru.enabled .Values.experimentalProfiles.directTransitObfuscation.restls.enabled }}
{{- $entrySmallTuicLabRequested := or .Values.experimentalProfiles.tuicV5.enabled .Values.experimentalProfiles.tuicV5.directEnabled .Values.experimentalProfiles.tuicV5.chainEnabled }}
{{- if or .Values.experimentalProfiles.enabled $entrySmallDirectLabRequested $entrySmallTuicLabRequested }}
{{- fail "experimentalProfiles are forbidden when gateway.entrySmall.enabled=true" }}
{{- end }}
{{- if ne (toString .Values.gateway.entrySmall.rollout.strategy) "Recreate" }}
{{- fail "gateway.entrySmall.rollout.strategy must be Recreate for 1g/1vcpu Entry nodes" }}
{{- end }}
{{- if not .Values.gateway.entrySmall.rollout.allowRecreateStrategy }}
{{- fail "gateway.entrySmall.rollout.allowRecreateStrategy=true is required for 1g/1vcpu Entry nodes" }}
{{- end }}
{{- if ne (toString .Values.gateway.entrySmall.rollout.maxSurge) "0" }}
{{- fail "gateway.entrySmall.rollout.maxSurge must stay 0 for 1g/1vcpu Entry nodes" }}
{{- end }}
{{- $entrySmallContainers := list "agent" "haproxy" "nginx" "xray" "hysteria" }}
{{- if and .Values.interconnect.mieru.enabled (or .Values.interconnect.entryTransit.enabled .Values.interconnect.entryTransit.routerEntry.enabled) }}
{{- $entrySmallContainers = append $entrySmallContainers "mieru" }}
{{- end }}
{{- if and .Values.interconnect.mieru.enabled .Values.interconnect.entryTransit.enabled .Values.interconnect.entryTransit.outerCarrier.enabled (eq (toString .Values.interconnect.entryTransit.outerCarrier.mode) "wss") }}
{{- $entrySmallContainers = append $entrySmallContainers "wstunnel" }}
{{- end }}
{{- if .Values.interconnect.zapret2.enabled }}
{{- $entrySmallContainers = append $entrySmallContainers "zapret2" }}
{{- end }}
{{- if .Values.shadowsocks2022.enabled }}
{{- $entrySmallContainers = append $entrySmallContainers "shadowtls" }}
{{- end }}
{{- if .Values.gateway.trafficShaping.entry.enabled }}
{{- $entrySmallContainers = append $entrySmallContainers "entryTrafficShaper" }}
{{- end }}
{{- $entrySmallMemoryTotalMi := 0 }}
{{- $entrySmallCpuTotalMillis := 0 }}
{{- range $containerName := $entrySmallContainers }}
{{- $resources := index $.Values.gateway.entrySmall.containerResources $containerName }}
{{- if not $resources }}
{{- fail (printf "gateway.entrySmall.containerResources.%s is required while gateway.entrySmall.enabled=true" $containerName) }}
{{- end }}
{{- $limits := $resources.limits }}
{{- if not $limits }}
{{- fail (printf "gateway.entrySmall.containerResources.%s.limits is required while gateway.entrySmall.enabled=true" $containerName) }}
{{- end }}
{{- $memoryRaw := toString $limits.memory }}
{{- $memoryMi := 0 }}
{{- if hasSuffix "Mi" $memoryRaw }}
{{- $memoryMi = int (trimSuffix "Mi" $memoryRaw) }}
{{- else if hasSuffix "Gi" $memoryRaw }}
{{- $memoryMi = mul (int (trimSuffix "Gi" $memoryRaw)) 1024 }}
{{- else }}
{{- fail (printf "gateway.entrySmall.containerResources.%s.limits.memory must use Mi or Gi" $containerName) }}
{{- end }}
{{- $cpuRaw := toString $limits.cpu }}
{{- $cpuMillis := 0 }}
{{- if hasSuffix "m" $cpuRaw }}
{{- $cpuMillis = int (trimSuffix "m" $cpuRaw) }}
{{- else if contains "." $cpuRaw }}
{{- fail (printf "gateway.entrySmall.containerResources.%s.limits.cpu must use millicores or whole cores" $containerName) }}
{{- else }}
{{- $cpuMillis = mul (int $cpuRaw) 1000 }}
{{- end }}
{{- if lt $memoryMi 1 }}
{{- fail (printf "gateway.entrySmall.containerResources.%s.limits.memory must be positive" $containerName) }}
{{- end }}
{{- if lt $cpuMillis 1 }}
{{- fail (printf "gateway.entrySmall.containerResources.%s.limits.cpu must be positive" $containerName) }}
{{- end }}
{{- $entrySmallMemoryTotalMi = add $entrySmallMemoryTotalMi $memoryMi }}
{{- $entrySmallCpuTotalMillis = add $entrySmallCpuTotalMillis $cpuMillis }}
{{- end }}
{{- if gt $entrySmallMemoryTotalMi (int .Values.gateway.entrySmall.memoryBudgetMi) }}
{{- fail (printf "gateway.entrySmall container memory limits total %dMi exceed memoryBudgetMi=%d" $entrySmallMemoryTotalMi (int .Values.gateway.entrySmall.memoryBudgetMi)) }}
{{- end }}
{{- if gt $entrySmallCpuTotalMillis (int .Values.gateway.entrySmall.cpuLimitBudgetMillis) }}
{{- fail (printf "gateway.entrySmall container CPU limits total %dm exceed cpuLimitBudgetMillis=%d" $entrySmallCpuTotalMillis (int .Values.gateway.entrySmall.cpuLimitBudgetMillis)) }}
{{- end }}
{{- end }}
{{- $entryGatewayEnabled := .Values.gateway.roles.entry.enabled }}
{{- $transitGatewayEnabled := .Values.gateway.roles.transit.enabled }}
{{- if and .Values.gateway.hostNetwork $entryGatewayEnabled $transitGatewayEnabled (or (empty .Values.gateway.roles.entry.nodeSelector) (empty .Values.gateway.roles.transit.nodeSelector)) }}
{{- fail "gateway.hostNetwork=true with both Entry and Transit enabled requires non-empty per-role nodeSelector values to prevent port collisions" }}
{{- end }}
{{- if and .Values.gateway.hostNetwork $entryGatewayEnabled $transitGatewayEnabled (eq (toJson .Values.gateway.roles.entry.nodeSelector) (toJson .Values.gateway.roles.transit.nodeSelector)) }}
{{- fail "gateway.hostNetwork=true with both Entry and Transit enabled requires distinct Entry and Transit nodeSelector values" }}
{{- end }}
{{- if not (or $entryGatewayEnabled $transitGatewayEnabled) }}
{{- fail "at least one gateway role must be enabled in Tracegate 3" }}
{{- end }}
{{- range $roleName, $role := .Values.gateway.roles }}
{{- if $role.enabled }}
{{- if ne (int $role.ports.publicTcp) 443 }}
{{- fail (printf "gateway.roles.%s.ports.publicTcp must stay 443; use mtproto.publicPort=8443 for the MTProto-only fallback" $roleName) }}
{{- end }}
{{- if ne (int $role.ports.publicUdp) 443 }}
{{- fail (printf "gateway.roles.%s.ports.publicUdp must stay 443 for Tracegate 3 Hysteria2" $roleName) }}
{{- end }}
{{- end }}
{{- end }}
{{- if and .Values.mtproto.enabled (not (has (int .Values.mtproto.publicPort) (list 443 8443))) }}
{{- fail "mtproto.publicPort must be 443 or the dedicated MTProto fallback port 8443" }}
{{- end }}
{{- if and .Values.mtproto.enabled (eq (int .Values.mtproto.publicPort) 8443) (not .Values.gateway.roles.transit.enabled) }}
{{- fail "mtproto.publicPort=8443 requires the transit gateway role" }}
{{- end }}
{{- $mtprotoRuntime := lower (toString (.Values.mtproto.runtime | default "mtg")) }}
{{- if and .Values.mtproto.enabled (not (has $mtprotoRuntime (list "mtg" "telemt"))) }}
{{- fail "mtproto.runtime must be mtg or telemt" }}
{{- end }}
{{- $mtprotoFallback := .Values.mtproto.fallback | default dict }}
{{- if and .Values.mtproto.enabled (dig "enabled" false $mtprotoFallback) }}
{{- if eq $mtprotoRuntime "mtg" }}
{{- fail "mtproto.fallback is not supported with the single-secret MTG runtime" }}
{{- end }}
{{- $mtprotoFallbackMode := lower (toString (dig "mode" "failover" $mtprotoFallback)) }}
{{- $mtprotoFallbackPrefer := lower (toString (dig "prefer" "telemt" $mtprotoFallback)) }}
{{- $mtprotoOfficialBackendPort := int (dig "officialBackendPort" 9444 $mtprotoFallback) }}
{{- $mtprotoOfficialStatsPort := int (dig "officialStatsPort" 2398 $mtprotoFallback) }}
{{- $mtprotoOfficialBindAddress := trim (toString (dig "officialBindAddress" "127.0.0.1" $mtprotoFallback)) }}
{{- if not (has $mtprotoFallbackMode (list "failover" "split-ports")) }}
{{- fail "mtproto.fallback.mode must be failover or split-ports" }}
{{- end }}
{{- if not (has $mtprotoFallbackPrefer (list "telemt" "official")) }}
{{- fail "mtproto.fallback.prefer must be telemt or official" }}
{{- end }}
{{- if and (eq $mtprotoFallbackMode "split-ports") (eq (int .Values.mtproto.publicPort) 443) }}
{{- fail "mtproto.fallback.mode=split-ports requires mtproto.publicPort to differ from gateway tcp/443" }}
{{- end }}
{{- if and $mtprotoOfficialBindAddress (not (has $mtprotoOfficialBindAddress (list "127.0.0.1" "localhost" "::1"))) }}
{{- fail "mtproto.fallback.officialBindAddress must stay loopback for gateway hostNetwork" }}
{{- end }}
{{- if or (lt $mtprotoOfficialBackendPort 1) (gt $mtprotoOfficialBackendPort 65535) }}
{{- fail "mtproto.fallback.officialBackendPort must be a valid TCP port" }}
{{- end }}
{{- if or (lt $mtprotoOfficialStatsPort 1) (gt $mtprotoOfficialStatsPort 65535) }}
{{- fail "mtproto.fallback.officialStatsPort must be a valid TCP port" }}
{{- end }}
{{- if eq $mtprotoOfficialBackendPort (int .Values.mtproto.backendPort) }}
{{- fail "mtproto.fallback.officialBackendPort must differ from mtproto.backendPort" }}
{{- end }}
{{- if eq $mtprotoOfficialBackendPort (int .Values.mtproto.publicPort) }}
{{- fail "mtproto.fallback.officialBackendPort must differ from mtproto.publicPort" }}
{{- end }}
{{- if eq $mtprotoOfficialBackendPort 443 }}
{{- fail "mtproto.fallback.officialBackendPort must not bind public tcp/443 in hostNetwork" }}
{{- end }}
{{- if eq $mtprotoOfficialStatsPort $mtprotoOfficialBackendPort }}
{{- fail "mtproto.fallback.officialStatsPort must differ from officialBackendPort" }}
{{- end }}
{{- if eq $mtprotoOfficialStatsPort (int .Values.mtproto.backendPort) }}
{{- fail "mtproto.fallback.officialStatsPort must differ from mtproto.backendPort" }}
{{- end }}
{{- if eq $mtprotoOfficialStatsPort (int .Values.mtproto.publicPort) }}
{{- fail "mtproto.fallback.officialStatsPort must differ from mtproto.publicPort" }}
{{- end }}
{{- if eq $mtprotoOfficialStatsPort 443 }}
{{- fail "mtproto.fallback.officialStatsPort must not bind public tcp/443 in hostNetwork" }}
{{- end }}
{{- end }}
{{- $mtprotoRoute := .Values.mtproto.route | default dict }}
{{- $mtprotoRouteMode := toString (dig "mode" "endpoint-direct" $mtprotoRoute) }}
{{- if and .Values.mtproto.enabled (not (has $mtprotoRouteMode (list "endpoint-direct" "entry-transit-endpoint" "entry-local-endpoint-egress" "entry-endpoint-tunnel"))) }}
{{- fail "mtproto.route.mode must be endpoint-direct, entry-transit-endpoint, entry-local-endpoint-egress, or entry-endpoint-tunnel" }}
{{- end }}
{{- $mtprotoTlsDomain := lower (trim (toString (.Values.mtproto.tlsDomain | default .Values.mtproto.domain))) }}
{{- $mtprotoStealth := .Values.mtproto.stealth | default dict }}
{{- $mtprotoForbiddenTlsDomains := dig "forbiddenTlsDomains" (list) $mtprotoStealth }}
{{- $mtprotoValidatedTlsDomains := dig "validatedTlsDomains" (list) $mtprotoStealth }}
{{- if and .Values.mtproto.enabled (has $mtprotoTlsDomain $mtprotoForbiddenTlsDomains) }}
{{- fail "mtproto.tlsDomain is forbidden by mtproto.stealth.forbiddenTlsDomains" }}
{{- end }}
{{- if and .Values.mtproto.enabled (eq $mtprotoTlsDomain (lower (trim (toString .Values.mtproto.domain)))) }}
{{- fail "mtproto.tlsDomain must differ from the public MTProto address hostname" }}
{{- end }}
{{- if and .Values.mtproto.enabled (dig "requireWhitelistedTlsDomain" true $mtprotoStealth) (not (has $mtprotoTlsDomain $mtprotoValidatedTlsDomains)) }}
{{- fail "mtproto.tlsDomain must be present in mtproto.stealth.validatedTlsDomains" }}
{{- end }}
{{- if and .Values.mtproto.enabled (eq $mtprotoRouteMode "entry-transit-endpoint") }}
{{- if not (and .Values.gateway.roles.entry.enabled .Values.gateway.roles.transit.enabled) }}
{{- fail "mtproto.route.mode=entry-transit-endpoint requires entry and endpoint gateway roles" }}
{{- end }}
{{- if not (trim (toString (dig "entry" "upstreamHost" "" $mtprotoRoute))) }}
{{- fail "mtproto.route.entry.upstreamHost is required when mtproto.route.mode=entry-transit-endpoint" }}
{{- end }}
{{- if empty (dig "endpoint" "allowedProxySources" (list) $mtprotoRoute) }}
{{- fail "mtproto.route.endpoint.allowedProxySources must list the transit source address when mtproto.route.mode=entry-transit-endpoint" }}
{{- end }}
{{- end }}
{{- if and .Values.mtproto.enabled (eq $mtprotoRouteMode "entry-endpoint-tunnel") }}
{{- if and (eq $deploymentPhase "full") (not (and .Values.gateway.roles.entry.enabled .Values.gateway.roles.transit.enabled)) }}
{{- fail "mtproto.route.mode=entry-endpoint-tunnel requires Entry and Endpoint gateway roles" }}
{{- end }}
{{- if and (eq $deploymentPhase "endpoint-first") (not .Values.gateway.roles.transit.enabled) }}
{{- fail "endpoint-first MTProto staging requires the Endpoint gateway role" }}
{{- end }}
{{- if ne $mtprotoRuntime "telemt" }}
{{- fail "mtproto.route.mode=entry-endpoint-tunnel requires mtproto.runtime=telemt" }}
{{- end }}
{{- if ne (int .Values.mtproto.publicPort) 443 }}
{{- fail "mtproto.route.mode=entry-endpoint-tunnel requires mtproto.publicPort=443" }}
{{- end }}
{{- if and (eq $deploymentPhase "full") (not .Values.interconnect.emergencyXrayChain.enabled) }}
{{- fail "mtproto.route.mode=entry-endpoint-tunnel requires interconnect.emergencyXrayChain.enabled=true" }}
{{- end }}
{{- if and (eq $deploymentPhase "full") (not .Values.interconnect.endpointBackhaul.enabled) }}
{{- fail "mtproto.route.mode=entry-endpoint-tunnel requires interconnect.endpointBackhaul.enabled=true" }}
{{- end }}
{{- if and (eq $deploymentPhase "full") (empty (.Values.interconnect.emergencyXrayChain.shards | default (list))) }}
{{- fail "mtproto.route.mode=entry-endpoint-tunnel requires at least one Reality/XHTTP backhaul shard" }}
{{- end }}
{{- $mtprotoTunnelPort := int (dig "entry" "tunnelPort" 11087 $mtprotoRoute) }}
{{- if or (lt $mtprotoTunnelPort 1024) (gt $mtprotoTunnelPort 65535) (has $mtprotoTunnelPort (list 443 4443 8443 (int .Values.mtproto.backendPort))) }}
{{- fail "mtproto.route.entry.tunnelPort must be an unreserved dedicated high TCP port" }}
{{- end }}
{{- if dig "enabled" false (.Values.mtproto.fallback | default dict) }}
{{- fail "mtproto.route.mode=entry-endpoint-tunnel forbids fallback runtimes" }}
{{- end }}
{{- end }}
{{- if and .Values.mtproto.enabled (eq $mtprotoRouteMode "entry-local-endpoint-egress") }}
{{- if not (and .Values.gateway.roles.entry.enabled .Values.gateway.roles.transit.enabled) }}
{{- fail "mtproto.route.mode=entry-local-endpoint-egress requires Entry and Endpoint gateway roles" }}
{{- end }}
{{- if not .Values.interconnect.emergencyXrayChain.enabled }}
{{- fail "mtproto.route.mode=entry-local-endpoint-egress requires interconnect.emergencyXrayChain.enabled=true" }}
{{- end }}
{{- if ne $mtprotoRuntime "mtg" }}
{{- fail "mtproto.route.mode=entry-local-endpoint-egress requires mtproto.runtime=mtg" }}
{{- end }}
{{- $mtprotoEgress := .Values.mtproto.egress | default dict }}
{{- if ne (toString (dig "mode" "" $mtprotoEgress)) "socks5-only" }}
{{- fail "mtproto.route.mode=entry-local-endpoint-egress requires mtproto.egress.mode=socks5-only" }}
{{- end }}
{{- $mtprotoEgressSocksPort := int (dig "socksPort" 0 $mtprotoEgress) }}
{{- if or (lt $mtprotoEgressSocksPort 1024) (gt $mtprotoEgressSocksPort 65535) (has $mtprotoEgressSocksPort (list 443 4443 8443 (int .Values.mtproto.backendPort) (int .Values.interconnect.emergencyXrayChain.socksPort))) }}
{{- fail "mtproto.egress.socksPort must be an unreserved dedicated high TCP port" }}
{{- end }}
