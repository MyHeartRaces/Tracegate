{{- fail (printf "vlessEncryption.realitySni must not reuse TLS demux SNI %s" $vlessEncRealitySni) }}
{{- end }}
{{- end }}
{{- range $group := (.Values.gateway.realityMultiInboundGroups | default (list)) }}
{{- range $sni := ($group.snis | default (list)) }}
{{- if eq (lower (toString $sni)) $vlessEncRealitySni }}
{{- fail (printf "vlessEncryption.realitySni must not reuse legacy REALITY demux SNI %s" $vlessEncRealitySni) }}
{{- end }}
{{- end }}
{{- end }}
{{- range $roleName, $role := .Values.gateway.roles }}
{{- $roleReality := (default dict $role.reality) }}
{{- range $sni := ($roleReality.serverNames | default (list)) }}
{{- if eq (lower (toString $sni)) $vlessEncRealitySni }}
{{- fail (printf "vlessEncryption.realitySni must not reuse legacy REALITY role SNI %s on role %s" $vlessEncRealitySni $roleName) }}
{{- end }}
{{- end }}
{{- end }}
{{- $emergencyXrayChain := .Values.interconnect.emergencyXrayChain | default dict }}
{{- if and $emergencyXrayChain.enabled $emergencyXrayChain.serverName (eq (lower (toString $emergencyXrayChain.serverName)) $vlessEncRealitySni) }}
{{- fail (printf "vlessEncryption.realitySni must not reuse emergency Xray chain SNI %s" $vlessEncRealitySni) }}
{{- end }}
{{- if and $emergencyXrayChain.enabled (dig "failover" "enabled" false $emergencyXrayChain) }}
{{- if not (trim (toString (dig "failover" "primaryHost" "" $emergencyXrayChain))) }}
{{- fail "interconnect.emergencyXrayChain.failover.primaryHost is required when failover is enabled" }}
{{- end }}
{{- if and (not (trim (toString (dig "failover" "fallbackHost" "" $emergencyXrayChain)))) (not (trim (toString ($emergencyXrayChain.endpointHost | default "")))) }}
{{- fail "interconnect.emergencyXrayChain.failover.fallbackHost or endpointHost is required when failover is enabled" }}
{{- end }}
{{- if not (dig "allowedSources" (list) $emergencyXrayChain) }}
{{- fail "interconnect.emergencyXrayChain.allowedSources is required when failover is enabled" }}
{{- end }}
{{- end }}
{{- $vlessEncWsPath := toString .Values.vlessEncryption.wsPath }}
{{- if or (not (hasPrefix "/" $vlessEncWsPath)) (hasPrefix "//" $vlessEncWsPath) (contains "://" $vlessEncWsPath) (contains " " $vlessEncWsPath) (contains "\t" $vlessEncWsPath) (contains "?" $vlessEncWsPath) (contains "#" $vlessEncWsPath) }}
{{- fail "vlessEncryption.wsPath must be a clean absolute HTTP path" }}
{{- end }}
{{- if eq $vlessEncWsPath $vlessWsPath }}
{{- fail "vlessEncryption.wsPath must differ from controlPlane.env.vlessWsPath" }}
{{- end }}
{{- $vlessEncGrpcPath := toString .Values.vlessEncryption.grpcPath }}
{{- if or (not (hasPrefix "/" $vlessEncGrpcPath)) (hasPrefix "//" $vlessEncGrpcPath) (contains "://" $vlessEncGrpcPath) (contains " " $vlessEncGrpcPath) (contains "\t" $vlessEncGrpcPath) (contains "?" $vlessEncGrpcPath) (contains "#" $vlessEncGrpcPath) }}
{{- fail "vlessEncryption.grpcPath must be a clean absolute HTTP path" }}
{{- end }}
{{- if eq $vlessEncGrpcPath $vlessGrpcPath }}
{{- fail "vlessEncryption.grpcPath must differ from controlPlane.env.vlessGrpcPath" }}
{{- end }}
{{- if empty .Values.privateProfiles.secretKeys.vlessEncryptionDecryptionEntry }}
{{- fail "privateProfiles.secretKeys.vlessEncryptionDecryptionEntry is required when vlessEncryption.enabled=true" }}
{{- end }}
{{- if empty .Values.privateProfiles.secretKeys.vlessEncryptionDecryptionTransit }}
{{- fail "privateProfiles.secretKeys.vlessEncryptionDecryptionTransit is required when vlessEncryption.enabled=true" }}
{{- end }}
{{- end }}
{{- $directLabRequested := or .Values.experimentalProfiles.directTransitObfuscation.enabled .Values.experimentalProfiles.directTransitObfuscation.mieru.enabled .Values.experimentalProfiles.directTransitObfuscation.restls.enabled }}
{{- $tuicLabRequested := or .Values.experimentalProfiles.tuicV5.enabled .Values.experimentalProfiles.tuicV5.directEnabled .Values.experimentalProfiles.tuicV5.chainEnabled }}
{{- if and (not .Values.experimentalProfiles.enabled) (or $directLabRequested $tuicLabRequested) }}
{{- fail "experimentalProfiles.enabled=false cannot enable V8/V9 lab surfaces; enable the top-level lab switch explicitly" }}
{{- end }}
{{- if and .Values.experimentalProfiles.enabled (not .Values.experimentalProfiles.directTransitObfuscation.enabled) (or .Values.experimentalProfiles.directTransitObfuscation.mieru.enabled .Values.experimentalProfiles.directTransitObfuscation.restls.enabled) }}
{{- fail "experimentalProfiles.directTransitObfuscation.enabled=false cannot enable V8 Mieru/RESTLS layers" }}
{{- end }}
{{- if and .Values.experimentalProfiles.enabled .Values.experimentalProfiles.directTransitObfuscation.enabled (not (or .Values.experimentalProfiles.directTransitObfuscation.mieru.enabled .Values.experimentalProfiles.directTransitObfuscation.restls.enabled)) }}
{{- fail "experimentalProfiles.directTransitObfuscation.enabled=true requires mieru.enabled or restls.enabled" }}
{{- end }}
{{- if and .Values.experimentalProfiles.enabled (not .Values.experimentalProfiles.tuicV5.enabled) (or .Values.experimentalProfiles.tuicV5.directEnabled .Values.experimentalProfiles.tuicV5.chainEnabled) }}
{{- fail "experimentalProfiles.tuicV5.enabled=false cannot enable TUIC v5 lab routes" }}
{{- end }}
{{- if and .Values.experimentalProfiles.enabled .Values.experimentalProfiles.tuicV5.enabled (not (or .Values.experimentalProfiles.tuicV5.directEnabled .Values.experimentalProfiles.tuicV5.chainEnabled)) }}
{{- fail "experimentalProfiles.tuicV5.enabled=true requires directEnabled or chainEnabled" }}
{{- end }}
{{- if .Values.experimentalProfiles.tuicV5.productionReplacementAllowed }}
{{- fail "experimentalProfiles.tuicV5.productionReplacementAllowed=true is forbidden for the Tracegate 2.2 production cut; TUIC v5 is lab-only" }}
{{- end }}
{{- if and .Values.shadowsocks2022.enabled (ne (toString .Values.shadowsocks2022.variants.direct) "V3") }}
{{- fail "shadowsocks2022.variants.direct must stay V3 for Tracegate 2.2" }}
{{- end }}
{{- if and .Values.shadowsocks2022.enabled (ne (toString .Values.shadowsocks2022.variants.chain) "V3") }}
{{- fail "shadowsocks2022.variants.chain must stay V3 for Tracegate 2.2" }}
{{- end }}
{{- if and .Values.shadowsocks2022.enabled (not .Values.shadowsocks2022.shadowtls.enabled) }}
{{- fail "shadowsocks2022.shadowtls.enabled=false is forbidden when V3 is enabled" }}
{{- end }}
{{- if and .Values.shadowsocks2022.enabled (ne (int .Values.shadowsocks2022.shadowtls.version) 3) }}
{{- fail "shadowsocks2022.shadowtls.version must stay 3 for ShadowTLS V3 profiles" }}
{{- end }}
{{- if and .Values.wireguard.enabled (ne (toString .Values.wireguard.variant) "V0") }}
{{- fail "wireguard.variant must stay V0 for WireGuard over WSTunnel" }}
{{- end }}
{{- if and .Values.wireguard.enabled (not .Values.wireguard.wstunnel.enabled) }}
{{- fail "wireguard.wstunnel.enabled=false is forbidden; V0 WGWS must be WireGuard over WSTunnel" }}
{{- end }}
{{- if and .Values.wireguard.enabled (ne (toString .Values.wireguard.wstunnel.mode) "wireguard-over-websocket") }}
{{- fail "wireguard.wstunnel.mode must stay wireguard-over-websocket" }}
{{- end }}
{{- $wireguardClientCidr := toString .Values.wireguard.clientCidr }}
{{- if and .Values.wireguard.enabled (not (regexMatch "^[0-9]{1,3}(\\.[0-9]{1,3}){3}/[0-9]{1,2}$" $wireguardClientCidr)) }}
{{- fail "wireguard.clientCidr must be an IPv4 CIDR for WGWS egress NAT" }}
{{- end }}
{{- $wireguardWSTunnelPath := toString .Values.wireguard.wstunnel.publicPath }}
{{- if and .Values.wireguard.enabled (not (hasPrefix "/" $wireguardWSTunnelPath)) }}
{{- fail "wireguard.wstunnel.publicPath must be an absolute HTTP path" }}
{{- end }}
{{- if and .Values.wireguard.enabled (or (hasPrefix "//" $wireguardWSTunnelPath) (contains "://" $wireguardWSTunnelPath) (contains " " $wireguardWSTunnelPath) (contains "\t" $wireguardWSTunnelPath) (contains "?" $wireguardWSTunnelPath) (contains "#" $wireguardWSTunnelPath)) }}
{{- fail "wireguard.wstunnel.publicPath must be a clean absolute HTTP path without URL syntax, whitespace, query or fragment" }}
{{- end }}
{{- if .Values.transitRouter.enabled }}
{{- if empty .Values.transitRouter.nodeSelector }}
{{- fail "transitRouter.nodeSelector is required when transitRouter.enabled=true" }}
{{- end }}
{{- if empty .Values.transitRouter.endpoint.host }}
{{- fail "transitRouter.endpoint.host is required when transitRouter.enabled=true" }}
{{- end }}
{{- if empty .Values.transitRouter.entry.allowedSources }}
{{- fail "transitRouter.entry.allowedSources must include Entry public IPs when transitRouter.enabled=true" }}
{{- end }}
{{- if empty .Values.transitRouter.tls.existingSecretName }}
{{- fail "transitRouter.tls.existingSecretName is required when transitRouter.enabled=true" }}
{{- end }}
{{- if empty .Values.transitRouter.xray.existingSecretName }}
{{- fail "transitRouter.xray.existingSecretName is required when transitRouter.enabled=true" }}
{{- end }}
{{- if empty .Values.transitRouter.sni.decoy }}
{{- fail "transitRouter.sni.decoy is required when transitRouter.enabled=true" }}
{{- end }}
{{- if ne (int .Values.transitRouter.ports.publicTcp) 443 }}
{{- fail "transitRouter.ports.publicTcp must stay 443" }}
{{- end }}
{{- if ne (int .Values.transitRouter.ports.mtproto) 8443 }}
{{- fail "transitRouter.ports.mtproto must stay 8443" }}
{{- end }}
{{- end }}
