{{- if and .Values.controlPlane.enabled (not .Values.controlPlane.auth.existingSecretName) }}
{{- if not .Values.controlPlane.auth.apiInternalToken }}
{{- fail "controlPlane.auth.apiInternalToken is required when controlPlane.auth.existingSecretName is not set" }}
{{- end }}
{{- if not .Values.controlPlane.auth.agentAuthToken }}
{{- fail "controlPlane.auth.agentAuthToken is required when controlPlane.auth.existingSecretName is not set" }}
{{- end }}
{{- if and (gt (int .Values.controlPlane.replicas.bot) 0) (not .Values.controlPlane.auth.botToken) }}
{{- fail "controlPlane.auth.botToken is required when bot replicas are enabled and controlPlane.auth.existingSecretName is not set" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tracegate.controlPlaneSecretName" . }}
  namespace: {{ include "tracegate.namespace" . }}
  labels:
    {{- include "tracegate.labels" . | nindent 4 }}
type: Opaque
stringData:
  api-internal-token: {{ .Values.controlPlane.auth.apiInternalToken | quote }}
  agent-auth-token: {{ .Values.controlPlane.auth.agentAuthToken | quote }}
  bot-token: {{ .Values.controlPlane.auth.botToken | quote }}
  grafana-alerts-webhook-token: {{ .Values.controlPlane.auth.grafanaAlertsWebhookToken | quote }}
{{- end }}
{{- if and .Values.controlPlane.enabled (gt (int .Values.controlPlane.replicas.bot) 0) .Values.controlPlane.env.botWelcomeRequired (not .Values.controlPlane.env.botWelcomeMessageSecret.name) }}
{{- fail "controlPlane.env.botWelcomeMessageSecret.name is required when bot welcome is required; keep the real warning text outside Git" }}
{{- end }}
{{- if and .Values.controlPlane.enabled (gt (int .Values.controlPlane.replicas.bot) 0) .Values.controlPlane.env.botWelcomeRequired (not .Values.controlPlane.env.botWelcomeMessageSecret.key) }}
{{- fail "controlPlane.env.botWelcomeMessageSecret.key is required when bot welcome is required" }}
{{- end }}
{{- if and .Values.controlPlane.enabled (gt (int .Values.controlPlane.replicas.bot) 0) (not .Values.controlPlane.env.botGuideMessageSecret.name) }}
{{- fail "controlPlane.env.botGuideMessageSecret.name is required when bot replicas are enabled; keep the real /guide text outside Git" }}
{{- end }}
{{- if and .Values.controlPlane.enabled (gt (int .Values.controlPlane.replicas.bot) 0) (not .Values.controlPlane.env.botGuideMessageSecret.key) }}
{{- fail "controlPlane.env.botGuideMessageSecret.key is required when bot replicas are enabled" }}
{{- end }}
{{- if and .Values.controlPlane.enabled .Values.controlPlane.database.embedded.enabled }}
{{- if not .Values.controlPlane.database.embedded.password }}
{{- fail "controlPlane.database.embedded.password is required when embedded PostgreSQL is enabled" }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tracegate.postgresSecretName" . }}
  namespace: {{ include "tracegate.namespace" . }}
  labels:
    {{- include "tracegate.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.controlPlane.database.embedded.password | quote }}
{{- end }}
{{- if and .Values.controlPlane.enabled (not .Values.controlPlane.database.embedded.enabled) (not .Values.controlPlane.database.externalUrl) (not .Values.controlPlane.database.externalUrlSecret.name) }}
{{- fail "controlPlane.database requires externalUrl, externalUrlSecret.name, or embedded.enabled=true" }}
{{- end }}
{{- if not .Values.privateProfiles.required }}
{{- fail "privateProfiles.required=false is forbidden in Tracegate 2.1 production defaults" }}
{{- end }}
{{- if and .Values.privateProfiles.required (not .Values.privateProfiles.existingSecretName) }}
{{- fail "privateProfiles.required=true requires privateProfiles.existingSecretName; private transport profiles must not be committed to Git" }}
{{- end }}
{{- if .Values.privateProfiles.inlineProfiles }}
{{- fail "privateProfiles.inlineProfiles=true is forbidden; use an external Secret created outside Git" }}
{{- end }}
{{- $privateProfilesDefaultMode := int .Values.privateProfiles.defaultMode }}
{{- if not (or (eq $privateProfilesDefaultMode 256) (eq $privateProfilesDefaultMode 288) (eq $privateProfilesDefaultMode 384) (eq $privateProfilesDefaultMode 416)) }}
{{- fail "privateProfiles.defaultMode must be one of 0400, 0440, 0600 or 0640; private Secret files must not grant execute or world permissions" }}
{{- end }}
{{- if not (or (eq .Values.gateway.strategy "RollingUpdate") (eq .Values.gateway.strategy "Recreate")) }}
{{- fail "gateway.strategy must be RollingUpdate or Recreate" }}
{{- end }}
{{- if and (eq .Values.gateway.strategy "Recreate") (not .Values.gateway.allowRecreateStrategy) }}
{{- fail "gateway.strategy=Recreate is forbidden by default in Tracegate 2.1; use RollingUpdate maxUnavailable=0 or explicitly set gateway.allowRecreateStrategy=true for lab-only maintenance" }}
{{- end }}
{{- if and (eq .Values.gateway.strategy "RollingUpdate") (ne (toString .Values.gateway.rollingUpdate.maxUnavailable) "0") }}
{{- fail "gateway.rollingUpdate.maxUnavailable must stay 0 for Tracegate 2.1 gateway pods" }}
{{- end }}
{{- if and (eq .Values.gateway.strategy "RollingUpdate") (or (eq (toString .Values.gateway.rollingUpdate.maxSurge) "0") (eq (toString .Values.gateway.rollingUpdate.maxSurge) "0%")) }}
{{- fail "gateway.rollingUpdate.maxSurge must be non-zero when maxUnavailable=0" }}
{{- end }}
{{- if lt (int .Values.gateway.progressDeadlineSeconds) 300 }}
{{- fail "gateway.progressDeadlineSeconds must be at least 300 seconds so safe hostNetwork upgrades can stall instead of failing early" }}
{{- end }}
{{- if not .Values.gateway.pdb.enabled }}
{{- fail "gateway.pdb.enabled=false is forbidden in Tracegate 2.1 production defaults" }}
{{- end }}
{{- if ne (toString .Values.gateway.pdb.minAvailable) "1" }}
{{- fail "gateway.pdb.minAvailable must stay 1 for one-pod Entry/Transit gateway roles" }}
{{- end }}
{{- if not .Values.gateway.probes.enabled }}
{{- fail "gateway.probes.enabled=false is forbidden in Tracegate 2.1 production defaults" }}
{{- end }}
{{- if not .Values.gateway.privatePreflight.enabled }}
{{- fail "gateway.privatePreflight.enabled=false is forbidden in Tracegate 2.1 production defaults" }}
{{- end }}
{{- if not .Values.gateway.privatePreflight.forbidPlaceholders }}
{{- fail "gateway.privatePreflight.forbidPlaceholders=false is forbidden in Tracegate 2.1 production defaults" }}
{{- end }}
{{- $entryGatewayEnabled := .Values.gateway.roles.entry.enabled }}
{{- $transitGatewayEnabled := .Values.gateway.roles.transit.enabled }}
{{- if and .Values.gateway.hostNetwork $entryGatewayEnabled $transitGatewayEnabled (or (empty .Values.gateway.roles.entry.nodeSelector) (empty .Values.gateway.roles.transit.nodeSelector)) }}
{{- fail "gateway.hostNetwork=true with both Entry and Transit enabled requires non-empty per-role nodeSelector values to prevent port collisions" }}
{{- end }}
{{- if and .Values.gateway.hostNetwork $entryGatewayEnabled $transitGatewayEnabled (eq (toJson .Values.gateway.roles.entry.nodeSelector) (toJson .Values.gateway.roles.transit.nodeSelector)) }}
{{- fail "gateway.hostNetwork=true with both Entry and Transit enabled requires distinct Entry and Transit nodeSelector values" }}
{{- end }}
{{- if not (or $entryGatewayEnabled $transitGatewayEnabled) }}
{{- fail "at least one gateway role must be enabled in Tracegate 2.1" }}
{{- end }}
{{- if and .Values.interconnect.entryTransit.enabled (not (and $entryGatewayEnabled $transitGatewayEnabled)) }}
{{- fail "interconnect.entryTransit.enabled=true requires both Entry and Transit gateway roles; disable the bridge for single-role Transit deployments" }}
{{- end }}
{{- if and .Values.wireguard.enabled (not $transitGatewayEnabled) }}
{{- fail "wireguard.enabled=true requires the Transit gateway role" }}
{{- end }}
{{- if and .Values.mtproto.enabled (not $transitGatewayEnabled) }}
{{- fail "mtproto.enabled=true requires the Transit gateway role" }}
{{- end }}
{{- if and .Values.shadowsocks2022.enabled (not (and $entryGatewayEnabled $transitGatewayEnabled .Values.interconnect.entryTransit.enabled)) }}
{{- fail "shadowsocks2022.enabled=true requires both Entry and Transit gateway roles with interconnect.entryTransit.enabled=true for V5/V6 production profiles" }}
{{- end }}
{{- if and .Values.interconnect.entryTransit.routerEntry.enabled (not $entryGatewayEnabled) }}
{{- fail "interconnect.entryTransit.routerEntry.enabled=true requires the Entry gateway role" }}
{{- end }}
{{- if and .Values.interconnect.entryTransit.routerTransit.enabled (not $transitGatewayEnabled) }}
{{- fail "interconnect.entryTransit.routerTransit.enabled=true requires the Transit gateway role" }}
{{- end }}
{{- if and (or .Values.interconnect.entryTransit.routerEntry.enabled .Values.interconnect.entryTransit.routerTransit.enabled) (not .Values.interconnect.mieru.enabled) }}
{{- fail "router link-crypto profiles require interconnect.mieru.enabled=true" }}
{{- end }}
{{- if not .Values.transportProfiles.socks5.required }}
{{- fail "transportProfiles.socks5.required=false is forbidden in Tracegate 2.1; SOCKS5 auth is required" }}
{{- end }}
{{- if .Values.transportProfiles.socks5.allowAnonymousLocalhost }}
{{- fail "transportProfiles.socks5.allowAnonymousLocalhost=true is forbidden in Tracegate 2.1" }}
{{- end }}
{{- $requiredClientProfiles := list "V1-VLESS-Reality-Direct" "V1-VLESS-gRPC-TLS-Direct" "V1-VLESS-WS-TLS-Direct" "V2-VLESS-Reality-Chain" "V3-Hysteria2-QUIC-Direct" "V4-Hysteria2-QUIC-Chain" "V5-Shadowsocks2022-ShadowTLS-Direct" "V6-Shadowsocks2022-ShadowTLS-Chain" "V7-WireGuard-WSTunnel-Direct" "MTProto-FakeTLS-Direct" }}
{{- range $profile := $requiredClientProfiles }}
{{- if not (has $profile $.Values.transportProfiles.clientNames) }}
{{- fail (printf "transportProfiles.clientNames must include %s" $profile) }}
{{- end }}
{{- end }}
{{- if has "MTProto-TCP443-Direct" .Values.transportProfiles.clientNames }}
{{- fail "transportProfiles.clientNames must use MTProto-FakeTLS-Direct; MTProto-TCP443-Direct is legacy" }}
{{- end }}
{{- $labOnlyClientProfiles := list "V8-Mieru-TCP-Direct" "V8-Mieru-RESTLS-Direct" "V9-TUICv5-QUIC-Direct" "V9-TUICv5-QUIC-Chain" }}
{{- range $profile := $labOnlyClientProfiles }}
{{- if has $profile $.Values.transportProfiles.clientNames }}
{{- fail (printf "transportProfiles.clientNames must not include lab-only profile %s; keep V8/V9 outside the production runtime contract" $profile) }}
{{- end }}
{{- end }}
{{- if .Values.interconnect.zapret2.hostWideInterception }}
{{- fail "interconnect.zapret2.hostWideInterception=true is forbidden in Tracegate 2.1 k3s chart" }}
{{- end }}
{{- if .Values.interconnect.zapret2.nfqueue }}
{{- fail "interconnect.zapret2.nfqueue=true is forbidden in Tracegate 2.1 k3s chart" }}
{{- end }}
{{- if .Values.interconnect.entryTransit.xrayBackhaul }}
{{- fail "interconnect.entryTransit.xrayBackhaul=true is forbidden in Tracegate 2.1 k3s; use link-crypto/Mieru outside Xray" }}
{{- end }}
{{- if ne (toString .Values.interconnect.entryTransit.chainBridgeOwner) "link-crypto" }}
{{- fail "interconnect.entryTransit.chainBridgeOwner must stay link-crypto in Tracegate 2.1" }}
{{- end }}
{{- if ne (toString .Values.interconnect.entryTransit.primary) "mieru" }}
{{- fail "interconnect.entryTransit.primary must stay mieru in Tracegate 2.1" }}
{{- end }}
{{- if ne (toString .Values.interconnect.entryTransit.fallback) "none" }}
{{- fail "interconnect.entryTransit.fallback must stay none in Tracegate 2.1; direct backhaul fallback is forbidden" }}
{{- end }}
{{- if and .Values.interconnect.entryTransit.enabled (not .Values.interconnect.mieru.enabled) }}
{{- fail "interconnect.mieru.enabled=false is forbidden while entryTransit is enabled" }}
{{- end }}
{{- if ne (int .Values.interconnect.entryTransit.remotePort) 443 }}
{{- fail "interconnect.entryTransit.remotePort must stay 443 for Tracegate 2.1" }}
{{- end }}
{{- if and .Values.decoy.existingConfigMap .Values.decoy.existingClaim }}
{{- fail "Only one decoy source is allowed: existingConfigMap, existingClaim or hostPath" }}
{{- end }}
{{- if and .Values.decoy.existingConfigMap .Values.decoy.hostPath }}
{{- fail "Only one decoy source is allowed: existingConfigMap, existingClaim or hostPath" }}
{{- end }}
{{- if and .Values.decoy.existingClaim .Values.decoy.hostPath }}
{{- fail "Only one decoy source is allowed: existingConfigMap, existingClaim or hostPath" }}
{{- end }}
{{- if .Values.decoy.files }}
{{- fail "decoy.files is forbidden in Tracegate 2.1; keep decoy HTML/CSS/JS outside Git and mount an external decoy source" }}
{{- end }}
{{- if and .Values.gateway.enabled (not (or .Values.decoy.existingConfigMap .Values.decoy.existingClaim .Values.decoy.hostPath)) }}
{{- fail "an external decoy source is required: set exactly one of decoy.hostPath, decoy.existingClaim or decoy.existingConfigMap" }}
{{- end }}
{{- if and .Values.decoy.hostPath (not (hasPrefix "/" (toString .Values.decoy.hostPath))) }}
{{- fail "decoy.hostPath must be an absolute host path" }}
{{- end }}
{{- if or (not (hasPrefix "/" (toString .Values.decoy.mountPath))) (contains " " (toString .Values.decoy.mountPath)) (contains "\t" (toString .Values.decoy.mountPath)) }}
{{- fail "decoy.mountPath must be a clean absolute container path" }}
{{- end }}
{{- $vlessWsPath := toString .Values.controlPlane.env.vlessWsPath }}
{{- if or (not (hasPrefix "/" $vlessWsPath)) (hasPrefix "//" $vlessWsPath) (contains "://" $vlessWsPath) (contains " " $vlessWsPath) (contains "\t" $vlessWsPath) (contains "?" $vlessWsPath) (contains "#" $vlessWsPath) }}
{{- fail "controlPlane.env.vlessWsPath must be a clean absolute HTTP path" }}
{{- end }}
{{- $vlessGrpcPath := toString .Values.controlPlane.env.vlessGrpcPath }}
{{- if or (not (hasPrefix "/" $vlessGrpcPath)) (hasPrefix "//" $vlessGrpcPath) (contains "://" $vlessGrpcPath) (contains " " $vlessGrpcPath) (contains "\t" $vlessGrpcPath) (contains "?" $vlessGrpcPath) (contains "#" $vlessGrpcPath) }}
{{- fail "controlPlane.env.vlessGrpcPath must be a clean absolute HTTP path" }}
{{- end }}
{{- $directLabRequested := or .Values.experimentalProfiles.directTransitObfuscation.enabled .Values.experimentalProfiles.directTransitObfuscation.mieru.enabled .Values.experimentalProfiles.directTransitObfuscation.restls.enabled }}
{{- $tuicLabRequested := or .Values.experimentalProfiles.tuicV5.enabled .Values.experimentalProfiles.tuicV5.directEnabled .Values.experimentalProfiles.tuicV5.chainEnabled }}
{{- if and (not .Values.experimentalProfiles.enabled) (or $directLabRequested $tuicLabRequested) }}
{{- fail "experimentalProfiles.enabled=false cannot enable V8/V9 lab surfaces; enable the top-level lab switch explicitly" }}
{{- end }}
{{- if and .Values.experimentalProfiles.enabled (not .Values.experimentalProfiles.directTransitObfuscation.enabled) (or .Values.experimentalProfiles.directTransitObfuscation.mieru.enabled .Values.experimentalProfiles.directTransitObfuscation.restls.enabled) }}
{{- fail "experimentalProfiles.directTransitObfuscation.enabled=false cannot enable V8 Mieru/RESTLS layers" }}
{{- end }}
{{- if and .Values.experimentalProfiles.enabled .Values.experimentalProfiles.directTransitObfuscation.enabled (not (or .Values.experimentalProfiles.directTransitObfuscation.mieru.enabled .Values.experimentalProfiles.directTransitObfuscation.restls.enabled)) }}
{{- fail "experimentalProfiles.directTransitObfuscation.enabled=true requires mieru.enabled or restls.enabled" }}
{{- end }}
{{- if and .Values.experimentalProfiles.enabled (not .Values.experimentalProfiles.tuicV5.enabled) (or .Values.experimentalProfiles.tuicV5.directEnabled .Values.experimentalProfiles.tuicV5.chainEnabled) }}
{{- fail "experimentalProfiles.tuicV5.enabled=false cannot enable TUIC v5 lab routes" }}
{{- end }}
{{- if and .Values.experimentalProfiles.enabled .Values.experimentalProfiles.tuicV5.enabled (not (or .Values.experimentalProfiles.tuicV5.directEnabled .Values.experimentalProfiles.tuicV5.chainEnabled)) }}
{{- fail "experimentalProfiles.tuicV5.enabled=true requires directEnabled or chainEnabled" }}
{{- end }}
{{- if .Values.experimentalProfiles.tuicV5.productionReplacementAllowed }}
{{- fail "experimentalProfiles.tuicV5.productionReplacementAllowed=true is forbidden for the Tracegate 2.1 production cut; TUIC v5 is lab-only" }}
{{- end }}
{{- if and .Values.shadowsocks2022.enabled (ne (toString .Values.shadowsocks2022.variants.direct) "V5") }}
{{- fail "shadowsocks2022.variants.direct must stay V5 for Tracegate 2.1" }}
{{- end }}
{{- if and .Values.shadowsocks2022.enabled (ne (toString .Values.shadowsocks2022.variants.chain) "V6") }}
{{- fail "shadowsocks2022.variants.chain must stay V6 for Tracegate 2.1" }}
{{- end }}
{{- if and .Values.shadowsocks2022.enabled (not .Values.shadowsocks2022.shadowtls.enabled) }}
{{- fail "shadowsocks2022.shadowtls.enabled=false is forbidden when V5/V6 are enabled" }}
{{- end }}
{{- if and .Values.shadowsocks2022.enabled (ne (int .Values.shadowsocks2022.shadowtls.version) 3) }}
{{- fail "shadowsocks2022.shadowtls.version must stay 3 for ShadowTLS V3 profiles" }}
{{- end }}
{{- if and .Values.wireguard.enabled (ne (toString .Values.wireguard.variant) "V7") }}
{{- fail "wireguard.variant must stay V7 for WireGuard over WSTunnel" }}
{{- end }}
{{- if and .Values.wireguard.enabled (not .Values.wireguard.wstunnel.enabled) }}
{{- fail "wireguard.wstunnel.enabled=false is forbidden; V7 must be WireGuard over WSTunnel" }}
{{- end }}
{{- if and .Values.wireguard.enabled (ne (toString .Values.wireguard.wstunnel.mode) "wireguard-over-websocket") }}
{{- fail "wireguard.wstunnel.mode must stay wireguard-over-websocket" }}
{{- end }}
{{- $wireguardWSTunnelPath := toString .Values.wireguard.wstunnel.publicPath }}
{{- if and .Values.wireguard.enabled (not (hasPrefix "/" $wireguardWSTunnelPath)) }}
{{- fail "wireguard.wstunnel.publicPath must be an absolute HTTP path" }}
{{- end }}
{{- if and .Values.wireguard.enabled (or (hasPrefix "//" $wireguardWSTunnelPath) (contains "://" $wireguardWSTunnelPath) (contains " " $wireguardWSTunnelPath) (contains "\t" $wireguardWSTunnelPath) (contains "?" $wireguardWSTunnelPath) (contains "#" $wireguardWSTunnelPath)) }}
{{- fail "wireguard.wstunnel.publicPath must be a clean absolute HTTP path without URL syntax, whitespace, query or fragment" }}
{{- end }}
