{{- if and .Values.interconnect.entryTransit.enabled (or (lt (int $linkOuterCarrier.clientLocalPort) 1) (gt (int $linkOuterCarrier.clientLocalPort) 65535)) }}
{{- fail "interconnect.entryTransit.outerCarrier.clientLocalPort must be a valid local TCP port" }}
{{- end }}
{{- if and .Values.interconnect.entryTransit.enabled (or (lt (int $linkOuterCarrier.serverLocalPort) 1) (gt (int $linkOuterCarrier.serverLocalPort) 65535)) }}
{{- fail "interconnect.entryTransit.outerCarrier.serverLocalPort must be a valid local TCP port" }}
{{- end }}
{{- if and .Values.interconnect.entryTransit.enabled (not $linkOuterCarrier.verifyTls) }}
{{- fail "interconnect.entryTransit.outerCarrier.verifyTls=false is forbidden for the bridge WSS carrier" }}
{{- end }}
{{- if and .Values.interconnect.entryTransit.enabled (not $linkOuterCarrier.spkiPinning.required) }}
{{- fail "interconnect.entryTransit.outerCarrier.spkiPinning.required=false is forbidden" }}
{{- end }}
{{- if and .Values.interconnect.entryTransit.enabled (not $linkOuterCarrier.spkiPinning.profileFile) }}
{{- fail "interconnect.entryTransit.outerCarrier.spkiPinning.profileFile must point to a private file" }}
{{- end }}
{{- if and .Values.interconnect.entryTransit.enabled (not $linkOuterCarrier.admission.required) }}
{{- fail "interconnect.entryTransit.outerCarrier.admission.required=false is forbidden" }}
{{- end }}
{{- if and .Values.interconnect.entryTransit.enabled (ne (toString $linkOuterCarrier.admission.mode) "hmac-sha256-generation-bound") }}
