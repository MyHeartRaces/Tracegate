{{- if and .Values.interconnect.entryTransit.enabled (or (eq $linkOuterCarrierPath (toString .Values.controlPlane.env.vlessWsPath)) (eq $linkOuterCarrierPath (toString .Values.controlPlane.env.vlessGrpcPath))) }}
{{- fail "interconnect.entryTransit.outerCarrier.publicPath must be separate from VLESS public paths" }}
