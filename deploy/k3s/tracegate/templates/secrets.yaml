{{- if .Values.controlPlane.enabled }}
{{- $ns := include "tracegate.namespace" . -}}
{{- $authName := printf "%s-control-plane-auth" (include "tracegate.fullname" .) -}}
{{- $authExisting := lookup "v1" "Secret" $ns $authName -}}
{{- $whEnabled := and (gt (int .Values.controlPlane.replicas.bot) 0) .Values.controlPlane.botWebhook.enabled -}}
{{- $botEnabled := gt (int .Values.controlPlane.replicas.bot) 0 -}}
{{- $whPath := .Values.controlPlane.botWebhook.path -}}
{{- $whSecret := .Values.controlPlane.botWebhook.secretToken -}}
{{- $grafanaAlertsWebhookToken := .Values.controlPlane.auth.grafanaAlertsWebhookToken -}}
{{- $grafanaName := printf "%s-grafana-auth" (include "tracegate.fullname" .) -}}
{{- $grafanaExisting := lookup "v1" "Secret" $ns $grafanaName -}}
{{- $grafanaAdmin := .Values.observability.grafana.adminPassword -}}
{{- $grafanaCookie := "" -}}
{{- if $whEnabled -}}
  {{- if and (not $whPath) $authExisting (hasKey $authExisting.data "bot-webhook-path") -}}
    {{- $whPath = (b64dec (index $authExisting.data "bot-webhook-path")) -}}
  {{- end -}}
  {{- if and (not $whSecret) $authExisting (hasKey $authExisting.data "bot-webhook-secret-token") -}}
    {{- $whSecret = (b64dec (index $authExisting.data "bot-webhook-secret-token")) -}}
  {{- end -}}
  {{- if not $whPath -}}
    {{- $whPath = printf "/tg/%s" (randAlphaNum 32) -}}
  {{- end -}}
  {{- if not $whSecret -}}
    {{- $whSecret = randAlphaNum 32 -}}
  {{- end -}}
{{- end -}}
{{- if and (not $grafanaAlertsWebhookToken) $authExisting (hasKey $authExisting.data "grafana-alerts-webhook-token") -}}
  {{- $grafanaAlertsWebhookToken = (b64dec (index $authExisting.data "grafana-alerts-webhook-token")) -}}
{{- end -}}
{{- if not $grafanaAlertsWebhookToken -}}
  {{- $grafanaAlertsWebhookToken = randAlphaNum 32 -}}
{{- end -}}

apiVersion: v1
kind: Secret
metadata:
  name: {{ $authName }}
  namespace: {{ $ns }}
  labels:
    {{- include "tracegate.labels" . | nindent 4 }}
type: Opaque
stringData:
  api-internal-token: {{ required "controlPlane.auth.apiInternalToken is required" .Values.controlPlane.auth.apiInternalToken | quote }}
  agent-auth-token: {{ required "controlPlane.auth.agentAuthToken is required" .Values.controlPlane.auth.agentAuthToken | quote }}
  bot-token: {{ if $botEnabled }}{{ required "controlPlane.auth.botToken is required when replicas.bot>0" .Values.controlPlane.auth.botToken | quote }}{{ else }}{{ .Values.controlPlane.auth.botToken | quote }}{{ end }}
  grafana-alerts-webhook-token: {{ $grafanaAlertsWebhookToken | quote }}
{{ if $whEnabled }}
  bot-webhook-path: {{ $whPath | quote }}
  bot-webhook-secret-token: {{ $whSecret | quote }}
{{ end }}

---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $grafanaName }}
  namespace: {{ $ns }}
  labels:
    {{- include "tracegate.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ if and (not $grafanaAdmin) $grafanaExisting (hasKey $grafanaExisting.data "admin-password") }}
  admin-password: {{ b64dec (index $grafanaExisting.data "admin-password") | quote }}
  {{ else if $grafanaAdmin }}
  admin-password: {{ $grafanaAdmin | quote }}
  {{ else }}
  admin-password: {{ randAlphaNum 32 | quote }}
  {{ end }}

  {{ if and $grafanaExisting (hasKey $grafanaExisting.data "cookie-secret") }}
  cookie-secret: {{ b64dec (index $grafanaExisting.data "cookie-secret") | quote }}
  {{ else }}
  cookie-secret: {{ randAlphaNum 64 | quote }}
  {{ end }}

  {{ if and $grafanaExisting (hasKey $grafanaExisting.data "pseudonym-secret") }}
  pseudonym-secret: {{ b64dec (index $grafanaExisting.data "pseudonym-secret") | quote }}
  {{ else }}
  pseudonym-secret: {{ randAlphaNum 64 | quote }}
  {{ end }}

{{- if .Values.controlPlane.postgres.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tracegate.fullname" . }}-postgres
  namespace: {{ $ns }}
  labels:
    {{- include "tracegate.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgres-password: {{ required "controlPlane.postgres.password is required" .Values.controlPlane.postgres.password | quote }}
{{ end }}

{{ if $whEnabled }}
{{- $tlsName := printf "%s-bot-webhook-tls" (include "tracegate.fullname" .) }}
{{- $tlsExisting := lookup "v1" "Secret" $ns $tlsName }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $tlsName }}
  namespace: {{ $ns }}
  labels:
    {{- include "tracegate.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
{{ if and $tlsExisting (hasKey $tlsExisting.data "tls.crt") (hasKey $tlsExisting.data "tls.key") }}
  tls.crt: {{ index $tlsExisting.data "tls.crt" | quote }}
  tls.key: {{ index $tlsExisting.data "tls.key" | quote }}
{{ else }}
  {{- $host := required "controlPlane.botWebhook.publicHost is required when botWebhook.enabled=true" .Values.controlPlane.botWebhook.publicHost }}
  {{- $cert := genSelfSignedCert $host nil nil 3650 }}
  tls.crt: {{ $cert.Cert | b64enc | quote }}
  tls.key: {{ $cert.Key | b64enc | quote }}
{{ end }}
{{ end }}
{{ end }}

{{- if and .Values.gateway.enabled .Values.gateway.vpsT.enabled .Values.gateway.vpsT.agent.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tracegate.fullname" . }}-vps-t-agent-auth
  namespace: {{ include "tracegate.namespace" . }}
  labels:
    {{- include "tracegate.labels" . | nindent 4 }}
type: Opaque
stringData:
  agent-auth-token: {{ required "gateway.vpsT.agent.authToken is required" .Values.gateway.vpsT.agent.authToken | quote }}
  agent-stats-secret: {{ required "gateway.vpsT.agent.statsSecret is required" .Values.gateway.vpsT.agent.statsSecret | quote }}
{{ end }}

{{- if and .Values.gateway.enabled .Values.gateway.vpsT.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tracegate.fullname" . }}-vps-t-xray-config
  namespace: {{ include "tracegate.namespace" . }}
  labels:
    {{- include "tracegate.labels" . | nindent 4 }}
type: Opaque
stringData:
  config.json: |
{{ tpl .Values.gateway.vpsT.xray.config . | nindent 4 }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tracegate.fullname" . }}-vps-t-hysteria-config
  namespace: {{ include "tracegate.namespace" . }}
  labels:
    {{- include "tracegate.labels" . | nindent 4 }}
type: Opaque
stringData:
  config.yaml: |
{{ .Values.gateway.vpsT.hysteria.config | nindent 4 }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tracegate.fullname" . }}-vps-t-wireguard-config
  namespace: {{ include "tracegate.namespace" . }}
  labels:
    {{- include "tracegate.labels" . | nindent 4 }}
type: Opaque
stringData:
  wg0.conf: |
{{ .Values.gateway.vpsT.wireguard.config | nindent 4 }}
{{ end }}

{{- $hyBackplaneEnabled := and .Values.gateway.enabled (.Values.gateway.interconnect.hysteriaBackplane.enabled | default false) .Values.gateway.vpsT.enabled .Values.gateway.vpsE.enabled -}}
{{- $hyNs := include "tracegate.namespace" . -}}
{{- $hyAuthName := printf "%s-interconnect-hysteria-backplane-auth" (include "tracegate.fullname" .) -}}
{{- $hyAuth := "" -}}
{{- if $hyBackplaneEnabled }}
{{- $hyAuth = (.Values.gateway.interconnect.hysteriaBackplane.auth | default "" | trim) -}}
{{- $hyAuthExisting := lookup "v1" "Secret" $hyNs $hyAuthName -}}
{{- if and (eq $hyAuth "") $hyAuthExisting (hasKey $hyAuthExisting.data "password") -}}
{{- $hyAuth = (b64dec (index $hyAuthExisting.data "password")) -}}
{{- end -}}
{{- if eq $hyAuth "" -}}
{{- $hyAuth = randAlphaNum 32 -}}
{{- end -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $hyAuthName }}
  namespace: {{ $hyNs }}
  labels:
    {{- include "tracegate.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ $hyAuth | quote }}
{{ end }}

{{- if and .Values.gateway.enabled (.Values.gateway.interconnect.wireguardBackplane.enabled | default false) .Values.gateway.vpsT.enabled .Values.gateway.vpsE.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tracegate.fullname" . }}-vps-t-wireguard-backplane
  namespace: {{ include "tracegate.namespace" . }}
  labels:
    {{- include "tracegate.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.gateway.interconnect.wireguardBackplane.interface }}.conf: |
    [Interface]
    Address = {{ .Values.gateway.interconnect.wireguardBackplane.vpsTAddress }}
    ListenPort = {{ .Values.gateway.interconnect.wireguardBackplane.listenPort }}
    PrivateKey = {{ required "gateway.interconnect.wireguardBackplane.vpsTPrivateKey is required when backplane is enabled" .Values.gateway.interconnect.wireguardBackplane.vpsTPrivateKey }}
    SaveConfig = false

    [Peer]
    PublicKey = {{ required "gateway.interconnect.wireguardBackplane.vpsEPublicKey is required when backplane is enabled" .Values.gateway.interconnect.wireguardBackplane.vpsEPublicKey }}
    AllowedIPs = {{ regexReplaceAll "/.*$" .Values.gateway.interconnect.wireguardBackplane.vpsEAddress "" }}/32
{{- end }}

{{- if $hyBackplaneEnabled }}
{{- $ns := $hyNs -}}
{{- $hyTcpEncapEnabled := (.Values.gateway.interconnect.hysteriaBackplane.tcpEncapsulation.enabled | default false) -}}
{{- $hyTcpClientHost := (.Values.gateway.interconnect.hysteriaBackplane.tcpEncapsulation.clientBindHost | default "127.0.0.1" | trim) -}}
{{- if eq $hyTcpClientHost "" -}}
{{- $hyTcpClientHost = "127.0.0.1" -}}
{{- end -}}
{{- $hyTcpClientPort := int (.Values.gateway.interconnect.hysteriaBackplane.tcpEncapsulation.clientBindPort | default 16445) -}}
{{- $hyBackplaneListenAddr := printf ":%d" (int (.Values.gateway.interconnect.hysteriaBackplane.listenPort | default 15445)) -}}
{{- if $hyTcpEncapEnabled -}}
{{- $hyBackplaneListenAddr = printf "127.0.0.1:%d" (int (.Values.gateway.interconnect.hysteriaBackplane.listenPort | default 15445)) -}}
{{- end -}}
{{- $tlsName := printf "%s-vps-t-hysteria-backplane-tls" (include "tracegate.fullname" .) -}}
{{- $tlsExisting := lookup "v1" "Secret" $ns $tlsName -}}
{{- $serverName := (.Values.gateway.interconnect.hysteriaBackplane.serverName | default "" | trim) -}}
{{- if eq $serverName "" -}}
{{- $serverName = "backplane-vps-t.internal" -}}
{{- end -}}
{{- $tlsExistingAnnotations := dict -}}
{{- if and $tlsExisting $tlsExisting.metadata $tlsExisting.metadata.annotations -}}
{{- $tlsExistingAnnotations = $tlsExisting.metadata.annotations -}}
{{- end -}}
{{- $managedCertMode := (index $tlsExistingAnnotations "tracegate.io/hysteria-backplane-cert-mode" | default "") -}}
{{- $managedCertServerName := (index $tlsExistingAnnotations "tracegate.io/hysteria-backplane-server-name" | default "") -}}
{{- if or (and .Values.gateway.interconnect.hysteriaBackplane.tls.crt (not .Values.gateway.interconnect.hysteriaBackplane.tls.key)) (and .Values.gateway.interconnect.hysteriaBackplane.tls.key (not .Values.gateway.interconnect.hysteriaBackplane.tls.crt)) -}}
{{- fail "gateway.interconnect.hysteriaBackplane.tls requires both crt and key (PEM)" -}}
{{- end }}
{{- $tlsCert := "" -}}
{{- $tlsKey := "" -}}
{{- $tlsSecretMode := "provided" -}}
{{- if and .Values.gateway.interconnect.hysteriaBackplane.tls.crt .Values.gateway.interconnect.hysteriaBackplane.tls.key -}}
{{- $tlsCert = .Values.gateway.interconnect.hysteriaBackplane.tls.crt -}}
{{- $tlsKey = .Values.gateway.interconnect.hysteriaBackplane.tls.key -}}
{{- else if and $tlsExisting (hasKey $tlsExisting.data "tls.crt") (hasKey $tlsExisting.data "tls.key") (eq $managedCertMode "selfsigned-san-v1") (eq $managedCertServerName $serverName) -}}
{{- $tlsCert = (b64dec (index $tlsExisting.data "tls.crt")) -}}
{{- $tlsKey = (b64dec (index $tlsExisting.data "tls.key")) -}}
{{- $tlsSecretMode = "selfsigned-san-v1" -}}
{{- else -}}
{{- $certDNSNames := list $serverName -}}
{{- $vpsTFqdn := (.Values.gateway.vpsT.fqdn | default "" | trim) -}}
{{- if and $vpsTFqdn (ne $vpsTFqdn $serverName) -}}
{{- $certDNSNames = append $certDNSNames $vpsTFqdn -}}
{{- end -}}
{{- $vpsTProxyFqdn := (.Values.gateway.vpsT.proxyFqdn | default "" | trim) -}}
{{- if and $vpsTProxyFqdn (ne $vpsTProxyFqdn $serverName) (ne $vpsTProxyFqdn $vpsTFqdn) -}}
{{- $certDNSNames = append $certDNSNames $vpsTProxyFqdn -}}
{{- end -}}
{{- $certIPs := list -}}
{{- $vpsTPublicIPv4 := (.Values.gateway.vpsT.publicIPv4 | default "" | trim) -}}
{{- if $vpsTPublicIPv4 -}}
{{- $certIPs = append $certIPs $vpsTPublicIPv4 -}}
{{- end -}}
{{- $cert := genSelfSignedCert $serverName $certIPs $certDNSNames 3650 -}}
{{- $tlsCert = $cert.Cert -}}
{{- $tlsKey = $cert.Key -}}
{{- $tlsSecretMode = "selfsigned-san-v1" -}}
{{- end -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $tlsName }}
  namespace: {{ $ns }}
  annotations:
    tracegate.io/hysteria-backplane-cert-mode: {{ $tlsSecretMode | quote }}
    tracegate.io/hysteria-backplane-server-name: {{ $serverName | quote }}
  labels:
    {{- include "tracegate.labels" . | nindent 4 }}
type: kubernetes.io/tls
stringData:
  tls.crt: |
{{ $tlsCert | nindent 4 }}
  tls.key: |
{{ $tlsKey | nindent 4 }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tracegate.fullname" . }}-vps-e-hysteria-backplane-ca
  namespace: {{ $ns }}
  labels:
    {{- include "tracegate.labels" . | nindent 4 }}
type: Opaque
stringData:
  tls.crt: |
{{ $tlsCert | nindent 4 }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tracegate.fullname" . }}-vps-t-hysteria-backplane-config
  namespace: {{ $ns }}
  labels:
    {{- include "tracegate.labels" . | nindent 4 }}
type: Opaque
stringData:
  config.yaml: |
    listen: {{ $hyBackplaneListenAddr }}
    tls:
      cert: /etc/hysteria-backplane-tls/tls.crt
      key: /etc/hysteria-backplane-tls/tls.key
    auth:
      type: password
      password: {{ $hyAuth | quote }}
    disableUDP: true
    {{- if .Values.gateway.interconnect.hysteriaBackplane.obfs.enabled }}
    obfs:
      type: salamander
      salamander:
        password: {{ required "gateway.interconnect.hysteriaBackplane.obfs.password is required when obfs is enabled" .Values.gateway.interconnect.hysteriaBackplane.obfs.password | quote }}
    {{- end }}
{{ end }}

{{- if and .Values.gateway.enabled .Values.gateway.vpsT.enabled }}
{{- $ns := include "tracegate.namespace" . -}}
{{- $tlsName := printf "%s-vps-t-ws-tls" (include "tracegate.fullname" .) -}}
{{- $tlsExisting := lookup "v1" "Secret" $ns $tlsName -}}
{{- if or (and .Values.gateway.vpsT.wsTls.crt (not .Values.gateway.vpsT.wsTls.key)) (and .Values.gateway.vpsT.wsTls.key (not .Values.gateway.vpsT.wsTls.crt)) -}}
{{- fail "gateway.vpsT.wsTls requires both crt and key (PEM)" -}}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $tlsName }}
  namespace: {{ $ns }}
  labels:
    {{- include "tracegate.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
{{ if and .Values.gateway.vpsT.wsTls.crt .Values.gateway.vpsT.wsTls.key }}
  tls.crt: {{ .Values.gateway.vpsT.wsTls.crt | b64enc | quote }}
  tls.key: {{ .Values.gateway.vpsT.wsTls.key | b64enc | quote }}
{{- else if and $tlsExisting (hasKey $tlsExisting.data "tls.crt") (hasKey $tlsExisting.data "tls.key") }}
  tls.crt: {{ index $tlsExisting.data "tls.crt" | quote }}
  tls.key: {{ index $tlsExisting.data "tls.key" | quote }}
{{- else }}
  {{- $host := (.Values.gateway.vpsT.proxyFqdn | default .Values.gateway.vpsT.fqdn) }}
  {{- if not $host }}{{- $host = "localhost" -}}{{- end }}
  {{- $cert := genSelfSignedCert $host nil nil 3650 }}
  tls.crt: {{ $cert.Cert | b64enc | quote }}
  tls.key: {{ $cert.Key | b64enc | quote }}
{{- end }}
{{- end }}

{{- if and .Values.gateway.enabled .Values.gateway.vpsT.enabled .Values.gateway.vpsT.hysteriaTls.crt .Values.gateway.vpsT.hysteriaTls.key }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tracegate.fullname" . }}-vps-t-hysteria-tls
  namespace: {{ include "tracegate.namespace" . }}
  labels:
    {{- include "tracegate.labels" . | nindent 4 }}
type: kubernetes.io/tls
stringData:
  tls.crt: |
{{ .Values.gateway.vpsT.hysteriaTls.crt | nindent 4 }}
  tls.key: |
{{ .Values.gateway.vpsT.hysteriaTls.key | nindent 4 }}
{{- end }}

{{- if and .Values.gateway.enabled .Values.gateway.vpsE.enabled (eq .Values.gateway.vpsE.mode "xray") }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tracegate.fullname" . }}-vps-e-xray-config
  namespace: {{ include "tracegate.namespace" . }}
  labels:
    {{- include "tracegate.labels" . | nindent 4 }}
type: Opaque
stringData:
  config.json: |
{{ tpl .Values.gateway.vpsE.xray.config . | nindent 4 }}
{{- end }}

{{- if and .Values.gateway.enabled .Values.gateway.vpsE.enabled (eq .Values.gateway.vpsE.mode "xray") .Values.gateway.vpsE.hysteria.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tracegate.fullname" . }}-vps-e-hysteria-config
  namespace: {{ include "tracegate.namespace" . }}
  labels:
    {{- include "tracegate.labels" . | nindent 4 }}
type: Opaque
stringData:
  config.yaml: |
{{ .Values.gateway.vpsE.hysteria.config | nindent 4 }}
{{- end }}

{{- if and .Values.gateway.enabled .Values.gateway.vpsE.enabled (eq .Values.gateway.vpsE.mode "xray") }}
{{- $ns := include "tracegate.namespace" . -}}
{{- $tlsName := printf "%s-vps-e-ws-tls" (include "tracegate.fullname" .) -}}
{{- $tlsExisting := lookup "v1" "Secret" $ns $tlsName -}}
{{- if or (and .Values.gateway.vpsE.wsTls.crt (not .Values.gateway.vpsE.wsTls.key)) (and .Values.gateway.vpsE.wsTls.key (not .Values.gateway.vpsE.wsTls.crt)) -}}
{{- fail "gateway.vpsE.wsTls requires both crt and key (PEM)" -}}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $tlsName }}
  namespace: {{ $ns }}
  labels:
    {{- include "tracegate.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
{{ if and .Values.gateway.vpsE.wsTls.crt .Values.gateway.vpsE.wsTls.key }}
  tls.crt: {{ .Values.gateway.vpsE.wsTls.crt | b64enc | quote }}
  tls.key: {{ .Values.gateway.vpsE.wsTls.key | b64enc | quote }}
{{- else if and $tlsExisting (hasKey $tlsExisting.data "tls.crt") (hasKey $tlsExisting.data "tls.key") }}
  tls.crt: {{ index $tlsExisting.data "tls.crt" | quote }}
  tls.key: {{ index $tlsExisting.data "tls.key" | quote }}
{{- else }}
  {{- $host := (.Values.gateway.vpsE.proxyFqdn | default .Values.gateway.vpsE.fqdn) }}
  {{- if not $host }}{{- $host = "localhost" -}}{{- end }}
  {{- $cert := genSelfSignedCert $host nil nil 3650 }}
  tls.crt: {{ $cert.Cert | b64enc | quote }}
  tls.key: {{ $cert.Key | b64enc | quote }}
{{- end }}
{{- end }}

{{- if and .Values.gateway.enabled .Values.gateway.vpsE.enabled .Values.gateway.vpsE.agent.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tracegate.fullname" . }}-vps-e-agent-auth
  namespace: {{ include "tracegate.namespace" . }}
  labels:
    {{- include "tracegate.labels" . | nindent 4 }}
type: Opaque
stringData:
  agent-auth-token: {{ required "gateway.vpsE.agent.authToken is required" .Values.gateway.vpsE.agent.authToken | quote }}
  agent-stats-secret: {{ .Values.gateway.vpsE.agent.statsSecret | quote }}
{{ end }}

{{- if $hyBackplaneEnabled }}
{{- $ns := $hyNs -}}
{{- $backplaneEndpointHost := (.Values.gateway.vpsT.publicIPv4 | default "" | trim) -}}
{{- if eq $backplaneEndpointHost "" -}}
{{- $backplaneEndpointHost = (.Values.gateway.vpsT.fqdn | default "" | trim) -}}
{{- end -}}
{{- $serverName := (.Values.gateway.interconnect.hysteriaBackplane.serverName | default "" | trim) -}}
{{- if eq $serverName "" -}}
{{- $serverName = "backplane-vps-t.internal" -}}
{{- end -}}
{{- $hyTcpEncapEnabled := (.Values.gateway.interconnect.hysteriaBackplane.tcpEncapsulation.enabled | default false) -}}
{{- $hyTcpClientHost := (.Values.gateway.interconnect.hysteriaBackplane.tcpEncapsulation.clientBindHost | default "127.0.0.1" | trim) -}}
{{- if eq $hyTcpClientHost "" -}}
{{- $hyTcpClientHost = "127.0.0.1" -}}
{{- end -}}
{{- $hyTcpClientPort := int (.Values.gateway.interconnect.hysteriaBackplane.tcpEncapsulation.clientBindPort | default 16445) -}}
{{- $hyBackplaneServerEndpoint := printf "%s:%d" (required "gateway.vpsT.publicIPv4 or gateway.vpsT.fqdn is required when hysteriaBackplane is enabled" $backplaneEndpointHost) (int (.Values.gateway.interconnect.hysteriaBackplane.listenPort | default 15445)) -}}
{{- if $hyTcpEncapEnabled -}}
{{- $hyBackplaneServerEndpoint = printf "%s:%d" $hyTcpClientHost $hyTcpClientPort -}}
{{- end -}}
{{- $wsPort := int (.Values.controlPlane.env.vlessWsTlsPort | default 443) -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tracegate.fullname" . }}-vps-e-hysteria-backplane-config
  namespace: {{ $ns }}
  labels:
    {{- include "tracegate.labels" . | nindent 4 }}
type: Opaque
stringData:
  config.yaml: |
    server: {{ $hyBackplaneServerEndpoint }}
    auth: {{ $hyAuth | quote }}
    tls:
      sni: {{ $serverName | quote }}
      ca: /etc/hysteria-backplane-ca/tls.crt
    lazy: true
    tcpForwarding:
      - listen: {{ (.Values.gateway.interconnect.hysteriaBackplane.bindHost | default "127.0.0.1") }}:{{ int (.Values.gateway.interconnect.hysteriaBackplane.localTransitPort | default 16443) }}
        remote: 127.0.0.1:443
      {{- if ne $wsPort 443 }}
      - listen: {{ (.Values.gateway.interconnect.hysteriaBackplane.bindHost | default "127.0.0.1") }}:{{ int (.Values.gateway.interconnect.hysteriaBackplane.localWsPort | default 16444) }}
        remote: 127.0.0.1:{{ $wsPort }}
      {{- end }}
    {{- if .Values.gateway.interconnect.hysteriaBackplane.obfs.enabled }}
    obfs:
      type: salamander
      salamander:
        password: {{ required "gateway.interconnect.hysteriaBackplane.obfs.password is required when obfs is enabled" .Values.gateway.interconnect.hysteriaBackplane.obfs.password | quote }}
    {{- end }}
{{ end }}

{{- if and .Values.gateway.enabled (.Values.gateway.interconnect.wireguardBackplane.enabled | default false) .Values.gateway.vpsT.enabled .Values.gateway.vpsE.enabled }}
{{- $backplaneEndpointHost := (.Values.gateway.interconnect.wireguardBackplane.endpointHost | default "" | trim) -}}
{{- if eq $backplaneEndpointHost "" -}}
{{- $backplaneEndpointHost = (.Values.gateway.vpsT.publicIPv4 | default "" | trim) -}}
{{- end -}}
{{- if eq $backplaneEndpointHost "" -}}
{{- $backplaneEndpointHost = (.Values.gateway.vpsT.fqdn | default "" | trim) -}}
{{- end -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tracegate.fullname" . }}-vps-e-wireguard-backplane
  namespace: {{ include "tracegate.namespace" . }}
  labels:
    {{- include "tracegate.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.gateway.interconnect.wireguardBackplane.interface }}.conf: |
    [Interface]
    Address = {{ .Values.gateway.interconnect.wireguardBackplane.vpsEAddress }}
    ListenPort = {{ .Values.gateway.interconnect.wireguardBackplane.listenPort }}
    PrivateKey = {{ required "gateway.interconnect.wireguardBackplane.vpsEPrivateKey is required when backplane is enabled" .Values.gateway.interconnect.wireguardBackplane.vpsEPrivateKey }}
    SaveConfig = false

    [Peer]
    PublicKey = {{ required "gateway.interconnect.wireguardBackplane.vpsTPublicKey is required when backplane is enabled" .Values.gateway.interconnect.wireguardBackplane.vpsTPublicKey }}
    AllowedIPs = {{ regexReplaceAll "/.*$" .Values.gateway.interconnect.wireguardBackplane.vpsTAddress "" }}/32
    Endpoint = {{ required "gateway.vpsT.publicIPv4 or gateway.vpsT.fqdn is required when backplane is enabled" $backplaneEndpointHost }}:{{ .Values.gateway.interconnect.wireguardBackplane.listenPort }}
    PersistentKeepalive = {{ .Values.gateway.interconnect.wireguardBackplane.persistentKeepaliveSeconds }}
{{- end }}
