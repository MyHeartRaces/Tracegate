{{- if and .Values.controlPlane.enabled (not .Values.controlPlane.auth.existingSecretName) }}
{{- if not .Values.controlPlane.auth.apiInternalToken }}
{{- fail "controlPlane.auth.apiInternalToken is required when controlPlane.auth.existingSecretName is not set" }}
{{- end }}
{{- if not .Values.controlPlane.auth.agentAuthToken }}
{{- fail "controlPlane.auth.agentAuthToken is required when controlPlane.auth.existingSecretName is not set" }}
{{- end }}
{{- if and (gt (int .Values.controlPlane.replicas.bot) 0) (not .Values.controlPlane.auth.botToken) }}
{{- fail "controlPlane.auth.botToken is required when bot replicas are enabled and controlPlane.auth.existingSecretName is not set" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tracegate.controlPlaneSecretName" . }}
  namespace: {{ include "tracegate.namespace" . }}
  labels:
    {{- include "tracegate.labels" . | nindent 4 }}
type: Opaque
stringData:
  api-internal-token: {{ .Values.controlPlane.auth.apiInternalToken | quote }}
  agent-auth-token: {{ .Values.controlPlane.auth.agentAuthToken | quote }}
  bot-token: {{ .Values.controlPlane.auth.botToken | quote }}
  grafana-alerts-webhook-token: {{ .Values.controlPlane.auth.grafanaAlertsWebhookToken | quote }}
{{- end }}
{{- if and .Values.controlPlane.enabled (gt (int .Values.controlPlane.replicas.bot) 0) .Values.controlPlane.env.botWelcomeRequired (not .Values.controlPlane.env.botWelcomeMessageSecret.name) }}
{{- fail "controlPlane.env.botWelcomeMessageSecret.name is required when bot welcome is required; keep the real warning text outside Git" }}
{{- end }}
{{- if and .Values.controlPlane.enabled (gt (int .Values.controlPlane.replicas.bot) 0) .Values.controlPlane.env.botWelcomeRequired (not .Values.controlPlane.env.botWelcomeMessageSecret.key) }}
{{- fail "controlPlane.env.botWelcomeMessageSecret.key is required when bot welcome is required" }}
{{- end }}
{{- if and .Values.controlPlane.enabled (gt (int .Values.controlPlane.replicas.bot) 0) (not .Values.controlPlane.env.botGuideMessageSecret.name) }}
{{- fail "controlPlane.env.botGuideMessageSecret.name is required when bot replicas are enabled; keep the real /guide text outside Git" }}
{{- end }}
{{- if and .Values.controlPlane.enabled (gt (int .Values.controlPlane.replicas.bot) 0) (not .Values.controlPlane.env.botGuideMessageSecret.key) }}
{{- fail "controlPlane.env.botGuideMessageSecret.key is required when bot replicas are enabled" }}
{{- end }}
{{- if and .Values.controlPlane.enabled .Values.controlPlane.database.embedded.enabled }}
{{- if not .Values.controlPlane.database.embedded.password }}
{{- fail "controlPlane.database.embedded.password is required when embedded PostgreSQL is enabled" }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tracegate.postgresSecretName" . }}
  namespace: {{ include "tracegate.namespace" . }}
  labels:
    {{- include "tracegate.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.controlPlane.database.embedded.password | quote }}
{{- end }}
{{- if and .Values.controlPlane.enabled (not .Values.controlPlane.database.embedded.enabled) (not .Values.controlPlane.database.externalUrl) (not .Values.controlPlane.database.externalUrlSecret.name) }}
{{- fail "controlPlane.database requires externalUrl, externalUrlSecret.name, or embedded.enabled=true" }}
{{- end }}
{{- if not .Values.privateProfiles.required }}
{{- fail "privateProfiles.required=false is forbidden in Tracegate 2.2 production defaults" }}
{{- end }}
{{- if and .Values.privateProfiles.required (not .Values.privateProfiles.existingSecretName) }}
{{- fail "privateProfiles.required=true requires privateProfiles.existingSecretName; private transport profiles must not be committed to Git" }}
{{- end }}
{{- if .Values.privateProfiles.inlineProfiles }}
{{- fail "privateProfiles.inlineProfiles=true is forbidden; use an external Secret created outside Git" }}
{{- end }}
{{- $privateProfilesDefaultMode := int .Values.privateProfiles.defaultMode }}
{{- if not (or (eq $privateProfilesDefaultMode 256) (eq $privateProfilesDefaultMode 288) (eq $privateProfilesDefaultMode 384) (eq $privateProfilesDefaultMode 416)) }}
{{- fail "privateProfiles.defaultMode must be one of 0400, 0440, 0600 or 0640; private Secret files must not grant execute or world permissions" }}
{{- end }}
{{- if not (or (eq .Values.gateway.strategy "RollingUpdate") (eq .Values.gateway.strategy "Recreate")) }}
{{- fail "gateway.strategy must be RollingUpdate or Recreate" }}
{{- end }}
{{- if and (eq .Values.gateway.strategy "Recreate") (not .Values.gateway.allowRecreateStrategy) }}
{{- fail "gateway.strategy=Recreate is forbidden by default in Tracegate 2.2; use RollingUpdate maxUnavailable=0 or explicitly set gateway.allowRecreateStrategy=true for lab-only maintenance" }}
{{- end }}
{{- $gatewayMaxUnavailable := toString .Values.gateway.rollingUpdate.maxUnavailable }}
{{- $gatewayMaxSurge := toString .Values.gateway.rollingUpdate.maxSurge }}
{{- $gatewayZeroUnavailable := and (eq $gatewayMaxUnavailable "0") (not (or (eq $gatewayMaxSurge "0") (eq $gatewayMaxSurge "0%"))) }}
{{- $gatewaySingleHostNetwork := and (eq $gatewayMaxUnavailable "1") (or (eq $gatewayMaxSurge "0") (eq $gatewayMaxSurge "0%")) }}
{{- if and (eq .Values.gateway.strategy "RollingUpdate") (not (or $gatewayZeroUnavailable $gatewaySingleHostNetwork)) }}
{{- fail "gateway.rollingUpdate must be either maxUnavailable=0/maxSurge>0 or single-hostNetwork maxUnavailable=1/maxSurge=0" }}
{{- end }}
{{- if lt (int .Values.gateway.progressDeadlineSeconds) 300 }}
{{- fail "gateway.progressDeadlineSeconds must be at least 300 seconds so safe hostNetwork upgrades can stall instead of failing early" }}
{{- end }}
{{- if not .Values.gateway.pdb.enabled }}
{{- fail "gateway.pdb.enabled=false is forbidden in Tracegate 2.2 production defaults" }}
{{- end }}
{{- if ne (toString .Values.gateway.pdb.minAvailable) "1" }}
{{- fail "gateway.pdb.minAvailable must stay 1 for one-pod Entry/Transit gateway roles" }}
{{- end }}
{{- if not .Values.gateway.probes.enabled }}
{{- fail "gateway.probes.enabled=false is forbidden in Tracegate 2.2 production defaults" }}
{{- end }}
{{- if not .Values.gateway.privatePreflight.enabled }}
{{- fail "gateway.privatePreflight.enabled=false is forbidden in Tracegate 2.2 production defaults" }}
{{- end }}
{{- if not .Values.gateway.privatePreflight.forbidPlaceholders }}
{{- fail "gateway.privatePreflight.forbidPlaceholders=false is forbidden in Tracegate 2.2 production defaults" }}
{{- end }}
{{- if not .Values.gateway.trafficShaping.entry.enabled }}
{{- fail "gateway.trafficShaping.entry.enabled=false is forbidden; Entry must enforce a host-level traffic cap" }}
{{- end }}
{{- if not .Values.gateway.hostNetwork }}
{{- fail "gateway.trafficShaping.entry requires gateway.hostNetwork=true so tc can protect the Entry host interface" }}
{{- end }}
{{- if empty .Values.gateway.trafficShaping.entry.interface }}
{{- fail "gateway.trafficShaping.entry.interface must name the Entry public network interface" }}
{{- end }}
{{- $entryTrafficMaxMbit := int .Values.gateway.trafficShaping.entry.maxMbit }}
{{- if or (lt $entryTrafficMaxMbit 1) (gt $entryTrafficMaxMbit 100) }}
{{- fail "gateway.trafficShaping.entry.maxMbit must be in 1..100 to keep Entry network load bounded" }}
{{- end }}
{{- if lt (int .Values.gateway.trafficShaping.entry.burstKbit) 64 }}
{{- fail "gateway.trafficShaping.entry.burstKbit must be at least 64" }}
{{- end }}
{{- if not .Values.gateway.trafficShaping.entry.applyEgress }}
{{- fail "gateway.trafficShaping.entry.applyEgress=false is forbidden; Entry egress must be shaped" }}
{{- end }}
{{- if not .Values.gateway.trafficShaping.entry.applyIngressPolicing }}
{{- fail "gateway.trafficShaping.entry.applyIngressPolicing=false is forbidden; Entry ingress must be policed" }}
{{- end }}
{{- if not .Values.gateway.trafficShaping.entry.failClosed }}
{{- fail "gateway.trafficShaping.entry.failClosed=false is forbidden; Entry must fail closed if traffic shaping cannot apply" }}
{{- end }}
{{- if not .Values.gateway.trafficShaping.chainClient.enabled }}
{{- fail "gateway.trafficShaping.chainClient.enabled=false is forbidden; chain clients must carry a bounded rate policy" }}
{{- end }}
{{- $chainClientMaxMbit := int .Values.gateway.trafficShaping.chainClient.maxMbit }}
{{- if or (lt $chainClientMaxMbit 1) (gt $chainClientMaxMbit 10) }}
{{- fail "gateway.trafficShaping.chainClient.maxMbit must be in 1..10" }}
{{- end }}
{{- if not .Values.gateway.trafficShaping.chainClient.requireDeclaredHysteriaTx }}
{{- fail "gateway.trafficShaping.chainClient.requireDeclaredHysteriaTx=false is forbidden; Entry Hysteria auth must reject undeclared bandwidth" }}
{{- end }}
{{- if not .Values.gateway.trafficShaping.hysteria.ignoreClientBandwidth }}
{{- fail "gateway.trafficShaping.hysteria.ignoreClientBandwidth=false is forbidden for non-Entry Hysteria surfaces" }}
{{- end }}
{{- if .Values.gateway.trafficShaping.hysteria.entryChainIgnoreClientBandwidth }}
{{- fail "gateway.trafficShaping.hysteria.entryChainIgnoreClientBandwidth=true is forbidden; Entry chain Hysteria must honor the 10 Mbit/s bandwidth cap" }}
{{- end }}
{{- if not .Values.gateway.nodeEncryption.enabled }}
{{- fail "gateway.nodeEncryption.enabled=false is forbidden; Entry/Transit runtime state must require encrypted host storage" }}
{{- end }}
{{- if not .Values.gateway.nodeEncryption.required }}
{{- fail "gateway.nodeEncryption.required=false is forbidden; Entry/Transit runtime state must require encrypted host storage" }}
{{- end }}
{{- if empty .Values.gateway.nodeEncryption.markerFile }}
{{- fail "gateway.nodeEncryption.markerFile must be set" }}
{{- end }}
{{- if empty .Values.gateway.nodeEncryption.markerValue }}
{{- fail "gateway.nodeEncryption.markerValue must be set" }}
{{- end }}
{{- if not .Values.gateway.nodeEncryption.nodeAnnotations.enabled }}
{{- fail "gateway.nodeEncryption.nodeAnnotations.enabled=false is forbidden; Entry/Transit nodes must advertise encrypted runtime storage" }}
{{- end }}
{{- if empty .Values.gateway.nodeEncryption.nodeAnnotations.encryptedRuntime }}
{{- fail "gateway.nodeEncryption.nodeAnnotations.encryptedRuntime must be set" }}
{{- end }}
{{- if empty .Values.gateway.nodeEncryption.nodeAnnotations.expectedValue }}
{{- fail "gateway.nodeEncryption.nodeAnnotations.expectedValue must be set" }}
{{- end }}
{{- if .Values.gateway.entrySmall.enabled }}
{{- if not .Values.gateway.roles.entry.enabled }}
{{- fail "gateway.entrySmall.enabled=true requires gateway.roles.entry.enabled=true" }}
{{- end }}
{{- if not .Values.gateway.entrySmall.forbidWireGuard }}
{{- fail "gateway.entrySmall.forbidWireGuard=false is forbidden; 1g/1vcpu Entry must not carry WGWS" }}
{{- end }}
{{- if not .Values.gateway.entrySmall.forbidExperimental }}
{{- fail "gateway.entrySmall.forbidExperimental=false is forbidden; 1g/1vcpu Entry must not carry lab surfaces" }}
{{- end }}
{{- if .Values.wireguard.enabled }}
{{- fail "wireguard.enabled=true is forbidden when gateway.entrySmall.enabled=true" }}
{{- end }}
{{- if not .Values.shadowsocks2022.enabled }}
{{- fail "shadowsocks2022.enabled=false is forbidden when gateway.entrySmall.enabled=true; Entry-small must carry V1/V2/V3" }}
{{- end }}
{{- $entrySmallDirectLabRequested := or .Values.experimentalProfiles.directTransitObfuscation.enabled .Values.experimentalProfiles.directTransitObfuscation.mieru.enabled .Values.experimentalProfiles.directTransitObfuscation.restls.enabled }}
{{- $entrySmallTuicLabRequested := or .Values.experimentalProfiles.tuicV5.enabled .Values.experimentalProfiles.tuicV5.directEnabled .Values.experimentalProfiles.tuicV5.chainEnabled }}
{{- if or .Values.experimentalProfiles.enabled $entrySmallDirectLabRequested $entrySmallTuicLabRequested }}
{{- fail "experimentalProfiles are forbidden when gateway.entrySmall.enabled=true" }}
{{- end }}
{{- if ne (toString .Values.gateway.entrySmall.rollout.strategy) "Recreate" }}
{{- fail "gateway.entrySmall.rollout.strategy must be Recreate for 1g/1vcpu Entry nodes" }}
{{- end }}
{{- if not .Values.gateway.entrySmall.rollout.allowRecreateStrategy }}
{{- fail "gateway.entrySmall.rollout.allowRecreateStrategy=true is required for 1g/1vcpu Entry nodes" }}
{{- end }}
{{- if ne (toString .Values.gateway.entrySmall.rollout.maxSurge) "0" }}
{{- fail "gateway.entrySmall.rollout.maxSurge must stay 0 for 1g/1vcpu Entry nodes" }}
{{- end }}
{{- $entrySmallContainers := list "agent" "haproxy" "nginx" "xray" "hysteria" }}
{{- if and .Values.interconnect.mieru.enabled (or .Values.interconnect.entryTransit.enabled .Values.interconnect.entryTransit.routerEntry.enabled) }}
{{- $entrySmallContainers = append $entrySmallContainers "mieru" }}
{{- end }}
{{- if and .Values.interconnect.mieru.enabled .Values.interconnect.entryTransit.enabled .Values.interconnect.entryTransit.outerCarrier.enabled (eq (toString .Values.interconnect.entryTransit.outerCarrier.mode) "wss") }}
{{- $entrySmallContainers = append $entrySmallContainers "wstunnel" }}
{{- end }}
{{- if .Values.interconnect.zapret2.enabled }}
{{- $entrySmallContainers = append $entrySmallContainers "zapret2" }}
{{- end }}
{{- if .Values.shadowsocks2022.enabled }}
{{- $entrySmallContainers = append $entrySmallContainers "shadowtls" }}
{{- end }}
{{- if .Values.gateway.trafficShaping.entry.enabled }}
{{- $entrySmallContainers = append $entrySmallContainers "entryTrafficShaper" }}
{{- end }}
{{- $entrySmallMemoryTotalMi := 0 }}
{{- $entrySmallCpuTotalMillis := 0 }}
{{- range $containerName := $entrySmallContainers }}
{{- $resources := index $.Values.gateway.entrySmall.containerResources $containerName }}
{{- if not $resources }}
{{- fail (printf "gateway.entrySmall.containerResources.%s is required while gateway.entrySmall.enabled=true" $containerName) }}
{{- end }}
{{- $limits := $resources.limits }}
{{- if not $limits }}
{{- fail (printf "gateway.entrySmall.containerResources.%s.limits is required while gateway.entrySmall.enabled=true" $containerName) }}
{{- end }}
{{- $memoryRaw := toString $limits.memory }}
{{- $memoryMi := 0 }}
{{- if hasSuffix "Mi" $memoryRaw }}
{{- $memoryMi = int (trimSuffix "Mi" $memoryRaw) }}
{{- else if hasSuffix "Gi" $memoryRaw }}
{{- $memoryMi = mul (int (trimSuffix "Gi" $memoryRaw)) 1024 }}
{{- else }}
{{- fail (printf "gateway.entrySmall.containerResources.%s.limits.memory must use Mi or Gi" $containerName) }}
{{- end }}
{{- $cpuRaw := toString $limits.cpu }}
{{- $cpuMillis := 0 }}
{{- if hasSuffix "m" $cpuRaw }}
{{- $cpuMillis = int (trimSuffix "m" $cpuRaw) }}
{{- else if contains "." $cpuRaw }}
{{- fail (printf "gateway.entrySmall.containerResources.%s.limits.cpu must use millicores or whole cores" $containerName) }}
{{- else }}
{{- $cpuMillis = mul (int $cpuRaw) 1000 }}
{{- end }}
{{- if lt $memoryMi 1 }}
{{- fail (printf "gateway.entrySmall.containerResources.%s.limits.memory must be positive" $containerName) }}
{{- end }}
{{- if lt $cpuMillis 1 }}
{{- fail (printf "gateway.entrySmall.containerResources.%s.limits.cpu must be positive" $containerName) }}
{{- end }}
{{- $entrySmallMemoryTotalMi = add $entrySmallMemoryTotalMi $memoryMi }}
{{- $entrySmallCpuTotalMillis = add $entrySmallCpuTotalMillis $cpuMillis }}
{{- end }}
{{- if gt $entrySmallMemoryTotalMi (int .Values.gateway.entrySmall.memoryBudgetMi) }}
{{- fail (printf "gateway.entrySmall container memory limits total %dMi exceed memoryBudgetMi=%d" $entrySmallMemoryTotalMi (int .Values.gateway.entrySmall.memoryBudgetMi)) }}
{{- end }}
{{- if gt $entrySmallCpuTotalMillis (int .Values.gateway.entrySmall.cpuLimitBudgetMillis) }}
{{- fail (printf "gateway.entrySmall container CPU limits total %dm exceed cpuLimitBudgetMillis=%d" $entrySmallCpuTotalMillis (int .Values.gateway.entrySmall.cpuLimitBudgetMillis)) }}
{{- end }}
{{- end }}
{{- $entryGatewayEnabled := .Values.gateway.roles.entry.enabled }}
{{- $transitGatewayEnabled := .Values.gateway.roles.transit.enabled }}
{{- if and .Values.gateway.hostNetwork $entryGatewayEnabled $transitGatewayEnabled (or (empty .Values.gateway.roles.entry.nodeSelector) (empty .Values.gateway.roles.transit.nodeSelector)) }}
{{- fail "gateway.hostNetwork=true with both Entry and Transit enabled requires non-empty per-role nodeSelector values to prevent port collisions" }}
{{- end }}
{{- if and .Values.gateway.hostNetwork $entryGatewayEnabled $transitGatewayEnabled (eq (toJson .Values.gateway.roles.entry.nodeSelector) (toJson .Values.gateway.roles.transit.nodeSelector)) }}
{{- fail "gateway.hostNetwork=true with both Entry and Transit enabled requires distinct Entry and Transit nodeSelector values" }}
{{- end }}
{{- if not (or $entryGatewayEnabled $transitGatewayEnabled) }}
{{- fail "at least one gateway role must be enabled in Tracegate 2.2" }}
{{- end }}
{{- range $roleName, $role := .Values.gateway.roles }}
{{- if $role.enabled }}
{{- if ne (int $role.ports.publicTcp) 443 }}
{{- fail (printf "gateway.roles.%s.ports.publicTcp must stay 443; use mtproto.publicPort=8443 for the MTProto-only fallback" $roleName) }}
{{- end }}
{{- if ne (int $role.ports.publicUdp) 4443 }}
{{- fail (printf "gateway.roles.%s.ports.publicUdp must stay 4443; UDP/443 is reserved for NaiveProxy V4" $roleName) }}
{{- end }}
{{- end }}
{{- end }}
{{- if and .Values.mtproto.enabled (not (has (int .Values.mtproto.publicPort) (list 443 8443))) }}
{{- fail "mtproto.publicPort must be 443 or the dedicated MTProto fallback port 8443" }}
{{- end }}
{{- if and .Values.mtproto.enabled (eq (int .Values.mtproto.publicPort) 8443) (not .Values.gateway.roles.transit.enabled) }}
{{- fail "mtproto.publicPort=8443 requires the transit gateway role" }}
{{- end }}
{{- $mtprotoRoute := .Values.mtproto.route | default dict }}
{{- $mtprotoRouteMode := toString (dig "mode" "endpoint-direct" $mtprotoRoute) }}
{{- if and .Values.mtproto.enabled (not (has $mtprotoRouteMode (list "endpoint-direct" "entry-transit-endpoint"))) }}
{{- fail "mtproto.route.mode must be endpoint-direct or entry-transit-endpoint" }}
{{- end }}
{{- if and .Values.mtproto.enabled (eq $mtprotoRouteMode "entry-transit-endpoint") }}
{{- if not (and .Values.gateway.roles.entry.enabled .Values.gateway.roles.transit.enabled) }}
{{- fail "mtproto.route.mode=entry-transit-endpoint requires entry and endpoint gateway roles" }}
{{- end }}
{{- if not (trim (toString (dig "entry" "upstreamHost" "" $mtprotoRoute))) }}
{{- fail "mtproto.route.entry.upstreamHost is required when mtproto.route.mode=entry-transit-endpoint" }}
{{- end }}
{{- if empty (dig "endpoint" "allowedProxySources" (list) $mtprotoRoute) }}
{{- fail "mtproto.route.endpoint.allowedProxySources must list the transit source address when mtproto.route.mode=entry-transit-endpoint" }}
{{- end }}
{{- end }}
{{- if .Values.naiveproxy.enabled }}
{{- $naiveproxyDomain := lower (trim (toString .Values.naiveproxy.domain)) }}
{{- $naiveproxyEnvHost := lower (trim (toString (.Values.controlPlane.env.naiveproxyHost | default .Values.naiveproxy.domain))) }}
{{- if not $naiveproxyDomain }}
{{- fail "naiveproxy.domain is required for the V4 auth-domain stealth contract" }}
{{- end }}
{{- if ne $naiveproxyDomain $naiveproxyEnvHost }}
{{- fail "naiveproxy.domain must match controlPlane.env.naiveproxyHost" }}
{{- end }}
{{- if or (contains "://" $naiveproxyDomain) (contains "/" $naiveproxyDomain) (contains ":" $naiveproxyDomain) (contains " " $naiveproxyDomain) (contains "\t" $naiveproxyDomain) }}
{{- fail "naiveproxy.domain must be a hostname without URL syntax, port or whitespace" }}
{{- end }}
{{- if ne (toString .Values.naiveproxy.role) "NAIVEPROXY" }}
{{- fail "naiveproxy.role must stay NAIVEPROXY" }}
{{- end }}
{{- if ne (toString .Values.naiveproxy.runtimeProfile) "tracegate-naiveproxy-v4" }}
{{- fail "naiveproxy.runtimeProfile must stay tracegate-naiveproxy-v4" }}
{{- end }}
{{- $naiveproxyTcpExposure := toString .Values.naiveproxy.tcpExposure }}
{{- if not (or (eq $naiveproxyTcpExposure "demux") (eq $naiveproxyTcpExposure "dedicated")) }}
{{- fail "naiveproxy.tcpExposure must be demux or dedicated" }}
{{- end }}
{{- if ne (int .Values.naiveproxy.ports.publicTcp) 443 }}
{{- fail "naiveproxy.ports.publicTcp must stay 443" }}
{{- end }}
{{- if ne (int .Values.naiveproxy.ports.publicUdp) 443 }}
{{- fail "naiveproxy.ports.publicUdp must stay 443 for HTTP/3" }}
{{- end }}
{{- if empty .Values.naiveproxy.tls.existingSecretName }}
{{- fail "naiveproxy.tls.existingSecretName is required" }}
{{- end }}
{{- if empty .Values.naiveproxy.nodeSelector }}
{{- fail "naiveproxy.nodeSelector is required with hostNetwork=true to prevent tcp/443 and udp/443 collisions" }}
{{- end }}
{{- if eq $naiveproxyTcpExposure "demux" }}
{{- $naiveproxyDemuxRoleName := toString .Values.naiveproxy.demux.role }}
{{- $naiveproxyDemuxRole := index .Values.gateway.roles $naiveproxyDemuxRoleName }}
{{- if empty $naiveproxyDemuxRoleName }}
{{- fail "naiveproxy.demux.role is required when naiveproxy.tcpExposure=demux" }}
{{- end }}
{{- if not $naiveproxyDemuxRole }}
{{- fail (printf "naiveproxy.demux.role=%s must reference an existing gateway role" $naiveproxyDemuxRoleName) }}
{{- end }}
{{- if not .Values.naiveproxy.hostNetwork }}
{{- fail "naiveproxy.hostNetwork=true is required when naiveproxy.tcpExposure=demux" }}
{{- end }}
{{- if ne (toJson .Values.naiveproxy.nodeSelector) (toJson $naiveproxyDemuxRole.nodeSelector) }}
{{- fail "naiveproxy.nodeSelector must match naiveproxy.demux.role nodeSelector when naiveproxy.tcpExposure=demux" }}
{{- end }}
{{- if ne (toString .Values.naiveproxy.demux.backendHost) "127.0.0.1" }}
{{- fail "naiveproxy.demux.backendHost must stay 127.0.0.1 for host-local HAProxy demux" }}
{{- end }}
{{- $naiveproxyDemuxBackendPort := int .Values.naiveproxy.demux.backendPort }}
{{- if or (lt $naiveproxyDemuxBackendPort 1024) (gt $naiveproxyDemuxBackendPort 65535) (eq $naiveproxyDemuxBackendPort 443) (eq $naiveproxyDemuxBackendPort 4443) (eq $naiveproxyDemuxBackendPort 8443) }}
{{- fail "naiveproxy.demux.backendPort must be an unreserved high TCP port and must not collide with 443, 4443, or 8443" }}
{{- end }}
{{- else }}
{{- if and .Values.naiveproxy.hostNetwork $entryGatewayEnabled (eq (toJson .Values.naiveproxy.nodeSelector) (toJson .Values.gateway.roles.entry.nodeSelector)) }}
{{- fail "naiveproxy.nodeSelector must be distinct from gateway.roles.entry.nodeSelector" }}
{{- end }}
{{- if and .Values.naiveproxy.hostNetwork $transitGatewayEnabled (eq (toJson .Values.naiveproxy.nodeSelector) (toJson .Values.gateway.roles.transit.nodeSelector)) }}
{{- fail "naiveproxy.nodeSelector must be distinct from gateway.roles.transit.nodeSelector" }}
{{- end }}
{{- end }}
{{- end }}
{{- if and .Values.interconnect.entryTransit.enabled (not (and $entryGatewayEnabled $transitGatewayEnabled)) }}
{{- fail "interconnect.entryTransit.enabled=true requires both Entry and Transit gateway roles; disable the bridge for single-role Transit deployments" }}
{{- end }}
{{- if and .Values.wireguard.enabled (not $transitGatewayEnabled) }}
{{- fail "wireguard.enabled=true requires the Transit gateway role" }}
{{- end }}
{{- if and .Values.mtproto.enabled (not $transitGatewayEnabled) }}
{{- fail "mtproto.enabled=true requires the Transit gateway role" }}
{{- end }}
{{- $v3ChainBridgeEnabled := or .Values.interconnect.entryTransit.enabled .Values.interconnect.emergencyXrayChain.enabled }}
{{- if and .Values.shadowsocks2022.enabled (not (and $entryGatewayEnabled $transitGatewayEnabled $v3ChainBridgeEnabled)) }}
{{- fail "shadowsocks2022.enabled=true requires both Entry and Transit gateway roles with entryTransit or emergencyXrayChain enabled for V3 production profiles" }}
{{- end }}
{{- if and .Values.shadowsocks2022.enabled .Values.interconnect.emergencyXrayChain.enabled (eq (toString .Values.interconnect.emergencyXrayChain.serverName) (toString .Values.shadowsocks2022.shadowtls.serverNameTransit)) }}
{{- fail "interconnect.emergencyXrayChain.serverName must not equal shadowsocks2022.shadowtls.serverNameTransit; the chain bridge needs a dedicated SNI" }}
{{- end }}
{{- if and .Values.interconnect.entryTransit.routerEntry.enabled (not $entryGatewayEnabled) }}
{{- fail "interconnect.entryTransit.routerEntry.enabled=true requires the Entry gateway role" }}
{{- end }}
{{- if and .Values.interconnect.entryTransit.routerTransit.enabled (not $transitGatewayEnabled) }}
{{- fail "interconnect.entryTransit.routerTransit.enabled=true requires the Transit gateway role" }}
{{- end }}
{{- if and .Values.naiveproxy.enabled (eq (toString .Values.naiveproxy.tcpExposure) "demux") (not (index .Values.gateway.roles (toString .Values.naiveproxy.demux.role)).enabled) }}
{{- fail (printf "naiveproxy.demux.role=%s must be enabled" (toString .Values.naiveproxy.demux.role)) }}
