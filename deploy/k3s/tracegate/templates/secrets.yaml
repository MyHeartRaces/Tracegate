{{- $linkOuterCarrierServerName := lower (trim (toString $linkOuterCarrier.serverName)) }}
{{- $transitTlsServerName := lower (trim (toString .Values.gateway.roles.transit.tls.serverName)) }}
{{- $mtprotoDomainForBridge := lower (trim (toString (.Values.mtproto.domain | default .Values.controlPlane.env.mtprotoDomain))) }}
