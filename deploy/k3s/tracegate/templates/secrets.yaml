{{- if and .Values.interconnect.entryTransit.enabled (ne (toString $linkOuterCarrier.admission.header) "Sec-WebSocket-Protocol") }}
{{- fail "interconnect.entryTransit.outerCarrier.admission.header must stay Sec-WebSocket-Protocol" }}
{{- end }}
{{- if and .Values.interconnect.entryTransit.enabled (not $linkOuterCarrier.admission.profileFile) }}
{{- fail "interconnect.entryTransit.outerCarrier.admission.profileFile must point to a private file" }}
{{- end }}
{{- if and (or .Values.interconnect.entryTransit.enabled .Values.interconnect.entryTransit.routerEntry.enabled .Values.interconnect.entryTransit.routerTransit.enabled) (not .Values.interconnect.zapret2.enabled) }}
{{- fail "interconnect.zapret2.enabled=false is forbidden for TCP link-crypto DPI resistance" }}
{{- end }}
{{- if and (or .Values.interconnect.entryTransit.enabled .Values.interconnect.entryTransit.routerEntry.enabled .Values.interconnect.entryTransit.routerTransit.enabled) (not $linkOuterCarrier.tcpShapingProfileFile) }}
{{- fail "interconnect.entryTransit.outerCarrier.tcpShapingProfileFile must point to a private file" }}
{{- end }}
{{- if and (or .Values.interconnect.entryTransit.enabled .Values.interconnect.entryTransit.routerEntry.enabled .Values.interconnect.entryTransit.routerTransit.enabled) (not $linkOuterCarrier.promotionPreflightProfileFile) }}
{{- fail "interconnect.entryTransit.outerCarrier.promotionPreflightProfileFile must point to a private file" }}
{{- end }}
