{{- if and .Values.interconnect.entryTransit.enabled (or (hasPrefix "//" $linkOuterCarrierPath) (contains "://" $linkOuterCarrierPath) (contains " " $linkOuterCarrierPath) (contains "\t" $linkOuterCarrierPath) (contains "?" $linkOuterCarrierPath) (contains "#" $linkOuterCarrierPath)) }}
