{{- if .Values.controlPlane.enabled }}
{{- $databaseUrl := .Values.controlPlane.database.externalUrl -}}
{{- if and (not $databaseUrl) .Values.controlPlane.database.embedded.enabled -}}
{{- $databaseUrl = printf "postgresql+psycopg://%s:%s@%s-postgres:5432/%s" .Values.controlPlane.database.embedded.username .Values.controlPlane.database.embedded.password (include "tracegate.fullname" .) .Values.controlPlane.database.embedded.database -}}
{{- end }}
{{- $entryRealityShortId := .Values.controlPlane.env.realityShortIdEntry | default (index .Values.gateway.roles.entry.reality.shortIds 0) -}}
{{- $transitRealityShortId := .Values.controlPlane.env.realityShortIdTransit | default (index .Values.gateway.roles.transit.reality.shortIds 0) -}}
{{- if .Values.controlPlane.database.embedded.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "tracegate.fullname" . }}-postgres
  namespace: {{ include "tracegate.namespace" . }}
  labels:
    {{- include "tracegate.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  serviceName: {{ include "tracegate.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      {{- include "tracegate.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        {{- include "tracegate.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.controlPlane.database.embedded.image | quote }}
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.controlPlane.database.embedded.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.controlPlane.database.embedded.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "tracegate.postgresSecretName" . }}
                  key: password
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.controlPlane.database.embedded.storageClassName }}
        storageClassName: {{ .Values.controlPlane.database.embedded.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.controlPlane.database.embedded.storage | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tracegate.fullname" . }}-postgres
  namespace: {{ include "tracegate.namespace" . }}
  labels:
    {{- include "tracegate.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
  selector:
    {{- include "tracegate.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
---
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tracegate.fullname" . }}-api
  namespace: {{ include "tracegate.namespace" . }}
  labels:
    {{- include "tracegate.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.controlPlane.service.type }}
  ports:
    - name: http
      port: {{ int .Values.controlPlane.service.port }}
      targetPort: http
  selector:
    {{- include "tracegate.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tracegate.fullname" . }}-api
  namespace: {{ include "tracegate.namespace" . }}
  labels:
    {{- include "tracegate.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ int .Values.controlPlane.replicas.api }}
  selector:
    matchLabels:
      {{- include "tracegate.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "tracegate.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      terminationGracePeriodSeconds: {{ int .Values.controlPlane.terminationGracePeriodSeconds }}
      {{- if .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      {{- end }}
      nodeSelector:
        {{- toYaml .Values.controlPlane.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.controlPlane.tolerations | nindent 8 }}
      affinity:
        {{- toYaml .Values.controlPlane.affinity | nindent 8 }}
      initContainers:
        - name: migrate-db
          image: {{ include "tracegate.image" .Values.global.image | quote }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          command: ["/bin/sh", "-lc"]
          args:
            - |
              python - <<'PY'
              from pathlib import Path

              path = Path("/app/alembic/env.py")
              old = """    # Use an explicit outer transaction so advisory lock + migrations commit atomically.
                  with connectable.begin() as connection:
                      context.configure(
                          connection=connection,
                          target_metadata=target_metadata,
                          compare_type=True,
                      )

                      with context.begin_transaction():
                          if connection.dialect.name == "postgresql":
                              # Transaction-scoped advisory lock avoids concurrent runners and is auto-released on commit/rollback.
                              connection.execute(text("SELECT pg_advisory_xact_lock(:key)"), {"key": MIGRATION_ADVISORY_LOCK_KEY})
                          context.run_migrations()
              """
              new = """    with connectable.connect() as lock_connection:
                      if lock_connection.dialect.name == "postgresql":
                          lock_connection.execute(text("SELECT pg_advisory_lock(:key)"), {"key": MIGRATION_ADVISORY_LOCK_KEY})
                          lock_connection.commit()
                      try:
                          with connectable.connect() as connection:
                              context.configure(
                                  connection=connection,
                                  target_metadata=target_metadata,
                                  compare_type=True,
                              )

                              with context.begin_transaction():
                                  context.run_migrations()
                      finally:
                          if lock_connection.dialect.name == "postgresql":
                              lock_connection.execute(text("SELECT pg_advisory_unlock(:key)"), {"key": MIGRATION_ADVISORY_LOCK_KEY})
                              lock_connection.commit()
              """
              text = path.read_text()
              if old in text:
                  path.write_text(text.replace(old, new))

              migration = Path("/app/alembic/versions/f6b7c8d9e012_add_v0_connection_variant.py")
              replacements = {
                  "'vless_ws_tls'": "'VLESS_WS_TLS'",
                  "'vless_grpc_tls'": "'VLESS_GRPC_TLS'",
                  "'vless_reality'": "'VLESS_REALITY'",
                  "'hysteria2'": "'HYSTERIA2'",
                  "'shadowsocks2022_shadowtls'": "'SHADOWSOCKS2022_SHADOWTLS'",
                  "'wireguard_wstunnel'": "'WIREGUARD_WSTUNNEL'",
                  "'direct'": "'DIRECT'",
                  "'chain'": "'CHAIN'",
              }
              migration_text = migration.read_text()
              for needle, replacement in replacements.items():
                  migration_text = migration_text.replace(needle, replacement)
              migration.write_text(migration_text)
              PY
              exec tracegate-migrate-db
          env:
            - name: DATABASE_URL
{{- if .Values.controlPlane.database.externalUrlSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.controlPlane.database.externalUrlSecret.name }}
                  key: {{ .Values.controlPlane.database.externalUrlSecret.key }}
{{- else }}
              value: {{ $databaseUrl | quote }}
{{- end }}
      containers:
        - name: api
          image: {{ include "tracegate.image" .Values.global.image | quote }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          command: ["tracegate-api"]
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: APP_ENV
              value: {{ .Values.controlPlane.env.appEnv | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.controlPlane.env.logLevel | quote }}
            - name: PUBLIC_BASE_URL
              value: {{ .Values.global.publicBaseUrl | quote }}
            - name: DATABASE_URL
{{- if .Values.controlPlane.database.externalUrlSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.controlPlane.database.externalUrlSecret.name }}
                  key: {{ .Values.controlPlane.database.externalUrlSecret.key }}
{{- else }}
              value: {{ $databaseUrl | quote }}
{{- end }}
            - name: API_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "tracegate.controlPlaneSecretName" . }}
                  key: api-internal-token
            - name: AGENT_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "tracegate.controlPlaneSecretName" . }}
                  key: agent-auth-token
            - name: BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "tracegate.controlPlaneSecretName" . }}
                  key: bot-token
            - name: DEFAULT_ENTRY_HOST
              value: {{ .Values.controlPlane.env.defaultEntryHost | quote }}
            - name: DEFAULT_TRANSIT_HOST
              value: {{ .Values.controlPlane.env.defaultTransitHost | quote }}
            - name: REALITY_PUBLIC_KEY
              value: {{ .Values.controlPlane.env.realityPublicKey | quote }}
            - name: REALITY_SHORT_ID
              value: {{ .Values.controlPlane.env.realityShortId | quote }}
            - name: REALITY_PUBLIC_KEY_ENTRY
              value: {{ .Values.controlPlane.env.realityPublicKeyEntry | quote }}
            - name: REALITY_SHORT_ID_ENTRY
              value: {{ $entryRealityShortId | quote }}
            - name: REALITY_PUBLIC_KEY_TRANSIT
              value: {{ .Values.controlPlane.env.realityPublicKeyTransit | quote }}
            - name: REALITY_SHORT_ID_TRANSIT
              value: {{ $transitRealityShortId | quote }}
            - name: WIREGUARD_SERVER_PUBLIC_KEY
              value: {{ .Values.controlPlane.env.wireguardServerPublicKey | quote }}
            - name: WIREGUARD_DNS
              value: {{ .Values.controlPlane.env.wireguardDns | quote }}
            - name: WIREGUARD_ALLOWED_IPS
              value: {{ toJson (.Values.controlPlane.env.wireguardAllowedIps | default (list "0.0.0.0/0" "::/0")) | quote }}
            - name: WIREGUARD_MTU
              value: {{ int .Values.controlPlane.env.wireguardMtu | quote }}
            - name: WIREGUARD_WSTUNNEL_PATH
              value: {{ .Values.wireguard.wstunnel.publicPath | quote }}
            - name: HYSTERIA_SALAMANDER_PASSWORD_ENTRY
              valueFrom:
                secretKeyRef:
                  name: {{ include "tracegate.privateProfilesSecretName" . }}
                  key: {{ .Values.privateProfiles.secretKeys.hysteriaSalamanderEntry }}
            - name: HYSTERIA_SALAMANDER_PASSWORD_TRANSIT
              valueFrom:
                secretKeyRef:
                  name: {{ include "tracegate.privateProfilesSecretName" . }}
                  key: {{ .Values.privateProfiles.secretKeys.hysteriaSalamanderTransit }}
            - name: HYSTERIA_UDP_PORT
              value: {{ int .Values.gateway.roles.transit.ports.publicUdp | quote }}
            - name: SHADOWTLS_SERVER_NAME_ENTRY
              value: {{ .Values.shadowsocks2022.shadowtls.serverNameEntry | quote }}
            - name: SHADOWTLS_SERVER_NAME_TRANSIT
              value: {{ .Values.shadowsocks2022.shadowtls.serverNameTransit | quote }}
            - name: SHADOWTLS_PASSWORD_ENTRY
              valueFrom:
                secretKeyRef:
                  name: {{ include "tracegate.privateProfilesSecretName" . }}
                  key: {{ .Values.privateProfiles.secretKeys.shadowtlsPasswordEntry }}
            - name: SHADOWTLS_PASSWORD_TRANSIT
              valueFrom:
                secretKeyRef:
                  name: {{ include "tracegate.privateProfilesSecretName" . }}
                  key: {{ .Values.privateProfiles.secretKeys.shadowtlsPasswordTransit }}
            - name: SHADOWSOCKS2022_METHOD
              value: {{ .Values.shadowsocks2022.method | quote }}
            - name: SHADOWSOCKS2022_PASSWORD_ENTRY
              valueFrom:
                secretKeyRef:
                  name: {{ include "tracegate.privateProfilesSecretName" . }}
                  key: {{ .Values.privateProfiles.secretKeys.shadowsocks2022PasswordEntry }}
            - name: SHADOWSOCKS2022_PASSWORD_TRANSIT
              valueFrom:
                secretKeyRef:
                  name: {{ include "tracegate.privateProfilesSecretName" . }}
                  key: {{ .Values.privateProfiles.secretKeys.shadowsocks2022PasswordTransit }}
            - name: VLESS_WS_PATH
              value: {{ .Values.controlPlane.env.vlessWsPath | quote }}
            - name: MTPROTO_DOMAIN
              value: {{ (.Values.mtproto.domain | default .Values.controlPlane.env.mtprotoDomain) | quote }}
            - name: SUPERADMIN_TELEGRAM_IDS
              value: {{ toJson (.Values.controlPlane.env.superadminTelegramIds | default (list)) | quote }}
{{- if kindIs "slice" .Values.controlPlane.env.enabledClientProfiles }}
            - name: ENABLED_CLIENT_PROFILES
              value: {{ toJson .Values.controlPlane.env.enabledClientProfiles | quote }}
{{- end }}
            - name: GRAFANA_ENABLED
              value: {{ .Values.controlPlane.env.grafanaEnabled | quote }}
            - name: GRAFANA_INTERNAL_URL
              value: {{ .Values.controlPlane.env.grafanaInternalUrl | quote }}
            - name: GRAFANA_PUBLIC_BASE_URL
              value: {{ .Values.controlPlane.env.grafanaPublicBaseUrl | quote }}
            - name: GRAFANA_ADMIN_USER
              value: {{ .Values.controlPlane.env.grafanaAdminUser | quote }}
            - name: GRAFANA_OTP_HANDOFF_URL
              value: {{ .Values.controlPlane.env.grafanaOtpHandoffUrl | quote }}
            - name: GRAFANA_ALERTS_WEBHOOK_URL
              value: {{ (.Values.controlPlane.env.grafanaAlertsWebhookUrl | default (printf "http://%s-api:%d/grafana/alerting/webhook" (include "tracegate.fullname" .) (int .Values.controlPlane.service.port))) | quote }}
            - name: GRAFANA_ALERTS_WEBHOOK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "tracegate.controlPlaneSecretName" . }}
                  key: grafana-alerts-webhook-token
{{- if .Values.controlPlane.env.grafanaAdminPasswordSecret.name }}
            - name: GRAFANA_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.controlPlane.env.grafanaAdminPasswordSecret.name }}
                  key: {{ .Values.controlPlane.env.grafanaAdminPasswordSecret.key }}
{{- end }}
{{- if .Values.controlPlane.env.grafanaCookieSecretSecret.name }}
            - name: GRAFANA_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.controlPlane.env.grafanaCookieSecretSecret.name }}
                  key: {{ .Values.controlPlane.env.grafanaCookieSecretSecret.key }}
{{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            {{- toYaml .Values.controlPlane.resources.api | nindent 12 }}
---
{{- range $name, $replicas := dict "dispatcher" .Values.controlPlane.replicas.dispatcher "bot" .Values.controlPlane.replicas.bot }}
{{- if gt (int $replicas) 0 }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tracegate.fullname" $ }}-{{ $name }}
  namespace: {{ include "tracegate.namespace" $ }}
  labels:
    {{- include "tracegate.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
spec:
  replicas: {{ int $replicas }}
  selector:
    matchLabels:
      {{- include "tracegate.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ $name }}
  template:
    metadata:
      labels:
        {{- include "tracegate.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ $name }}
    spec:
      terminationGracePeriodSeconds: {{ int $.Values.controlPlane.terminationGracePeriodSeconds }}
      containers:
        - name: {{ $name }}
          image: {{ include "tracegate.image" $.Values.global.image | quote }}
          imagePullPolicy: {{ $.Values.global.image.pullPolicy }}
          command: [{{ ternary "\"tracegate-dispatcher\"" "\"tracegate-bot\"" (eq $name "dispatcher") }}]
          env:
            - name: DATABASE_URL
{{- if $.Values.controlPlane.database.externalUrlSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.controlPlane.database.externalUrlSecret.name }}
                  key: {{ $.Values.controlPlane.database.externalUrlSecret.key }}
{{- else }}
              value: {{ $databaseUrl | quote }}
{{- end }}
            - name: API_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "tracegate.controlPlaneSecretName" $ }}
                  key: api-internal-token
            - name: AGENT_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "tracegate.controlPlaneSecretName" $ }}
                  key: agent-auth-token
            - name: BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "tracegate.controlPlaneSecretName" $ }}
                  key: bot-token
            - name: SUPERADMIN_TELEGRAM_IDS
              value: {{ toJson ($.Values.controlPlane.env.superadminTelegramIds | default (list)) | quote }}
{{- if kindIs "slice" $.Values.controlPlane.env.enabledClientProfiles }}
            - name: ENABLED_CLIENT_PROFILES
              value: {{ toJson $.Values.controlPlane.env.enabledClientProfiles | quote }}
{{- end }}
            - name: WIREGUARD_SERVER_PUBLIC_KEY
              value: {{ $.Values.controlPlane.env.wireguardServerPublicKey | quote }}
            - name: WIREGUARD_DNS
              value: {{ $.Values.controlPlane.env.wireguardDns | quote }}
            - name: WIREGUARD_ALLOWED_IPS
              value: {{ toJson ($.Values.controlPlane.env.wireguardAllowedIps | default (list "0.0.0.0/0" "::/0")) | quote }}
            - name: WIREGUARD_MTU
              value: {{ int $.Values.controlPlane.env.wireguardMtu | quote }}
            - name: WIREGUARD_WSTUNNEL_PATH
              value: {{ $.Values.wireguard.wstunnel.publicPath | quote }}
            - name: SHADOWTLS_SERVER_NAME_ENTRY
              value: {{ $.Values.shadowsocks2022.shadowtls.serverNameEntry | quote }}
            - name: SHADOWTLS_SERVER_NAME_TRANSIT
              value: {{ $.Values.shadowsocks2022.shadowtls.serverNameTransit | quote }}
            - name: SHADOWTLS_PASSWORD_ENTRY
              valueFrom:
                secretKeyRef:
                  name: {{ include "tracegate.privateProfilesSecretName" $ }}
                  key: {{ $.Values.privateProfiles.secretKeys.shadowtlsPasswordEntry }}
            - name: SHADOWTLS_PASSWORD_TRANSIT
              valueFrom:
                secretKeyRef:
                  name: {{ include "tracegate.privateProfilesSecretName" $ }}
                  key: {{ $.Values.privateProfiles.secretKeys.shadowtlsPasswordTransit }}
            - name: SHADOWSOCKS2022_METHOD
              value: {{ $.Values.shadowsocks2022.method | quote }}
            - name: SHADOWSOCKS2022_PASSWORD_ENTRY
              valueFrom:
                secretKeyRef:
                  name: {{ include "tracegate.privateProfilesSecretName" $ }}
                  key: {{ $.Values.privateProfiles.secretKeys.shadowsocks2022PasswordEntry }}
            - name: SHADOWSOCKS2022_PASSWORD_TRANSIT
              valueFrom:
                secretKeyRef:
                  name: {{ include "tracegate.privateProfilesSecretName" $ }}
                  key: {{ $.Values.privateProfiles.secretKeys.shadowsocks2022PasswordTransit }}
{{- if eq $name "bot" }}
            - name: BOT_API_BASE_URL
              value: {{ printf "http://%s-api:%d" (include "tracegate.fullname" $) (int $.Values.controlPlane.service.port) | quote }}
            - name: BOT_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "tracegate.controlPlaneSecretName" $ }}
                  key: api-internal-token
            - name: BOT_WELCOME_REQUIRED
              value: {{ $.Values.controlPlane.env.botWelcomeRequired | quote }}
            - name: BOT_WELCOME_VERSION
              value: {{ $.Values.controlPlane.env.botWelcomeVersion | quote }}
            - name: GRAFANA_ENABLED
              value: {{ $.Values.controlPlane.env.grafanaEnabled | quote }}
{{- if $.Values.controlPlane.env.botWelcomeMessageSecret.name }}
            - name: BOT_WELCOME_MESSAGE
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.controlPlane.env.botWelcomeMessageSecret.name }}
                  key: {{ $.Values.controlPlane.env.botWelcomeMessageSecret.key }}
{{- end }}
{{- if $.Values.controlPlane.env.botGuideMessageSecret.name }}
            - name: BOT_GUIDE_MESSAGE
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.controlPlane.env.botGuideMessageSecret.name }}
                  key: {{ $.Values.controlPlane.env.botGuideMessageSecret.key }}
{{- end }}
{{- end }}
          resources:
            {{- toYaml (index $.Values.controlPlane.resources $name) | nindent 12 }}
---
{{- end }}
{{- end }}
{{- end }}
