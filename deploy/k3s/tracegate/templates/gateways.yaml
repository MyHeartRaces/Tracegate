{{- $configmapsChecksum := include (print $.Template.BasePath "/configmaps.yaml") . | sha256sum -}}
{{- $secretsChecksum := include (print $.Template.BasePath "/secrets.yaml") . | sha256sum -}}
{{- $interconnectSelectorEnabled := and .Values.gateway.enabled .Values.gateway.vpsE.enabled (.Values.gateway.interconnect.selector.enabled | default false) -}}
{{- $interconnectHyEnabled := and .Values.gateway.enabled .Values.gateway.vpsE.enabled .Values.gateway.vpsT.enabled (.Values.gateway.interconnect.hysteriaBackplane.enabled | default false) -}}
{{- $interconnectHyTcpEncapEnabled := and $interconnectHyEnabled (.Values.gateway.interconnect.hysteriaBackplane.tcpEncapsulation.enabled | default false) -}}
{{- $interconnectWgEnabled := and .Values.gateway.enabled (.Values.gateway.interconnect.wireguardBackplane.enabled | default false) -}}
{{- $selectorMetricsPort := int (.Values.gateway.interconnect.selector.metricsPort | default 9093) -}}
{{- $hyBackplaneListenPort := int (.Values.gateway.interconnect.hysteriaBackplane.listenPort | default 15445) -}}
{{- $hyBackplaneTransitPort := int (.Values.gateway.interconnect.hysteriaBackplane.localTransitPort | default 16443) -}}
{{- $hyBackplaneWsPort := int (.Values.gateway.interconnect.hysteriaBackplane.localWsPort | default 16444) -}}
{{- $hyBackplaneTcpServerHost := (.Values.gateway.interconnect.hysteriaBackplane.tcpEncapsulation.serverListenHost | default "0.0.0.0" | trim) -}}
{{- if eq $hyBackplaneTcpServerHost "" }}{{- $hyBackplaneTcpServerHost = "0.0.0.0" -}}{{- end -}}
{{- $hyBackplaneTcpServerPort := int (.Values.gateway.interconnect.hysteriaBackplane.tcpEncapsulation.serverListenPort | default 15446) -}}
{{- $hyBackplaneTcpClientHost := (.Values.gateway.interconnect.hysteriaBackplane.tcpEncapsulation.clientBindHost | default "127.0.0.1" | trim) -}}
{{- if eq $hyBackplaneTcpClientHost "" }}{{- $hyBackplaneTcpClientHost = "127.0.0.1" -}}{{- end -}}
{{- $hyBackplaneTcpClientPort := int (.Values.gateway.interconnect.hysteriaBackplane.tcpEncapsulation.clientBindPort | default 16445) -}}
{{- $hyBackplaneRemoteHost := (.Values.gateway.vpsT.publicIPv4 | default "" | trim) -}}
{{- if eq $hyBackplaneRemoteHost "" -}}
{{- $hyBackplaneRemoteHost = (.Values.gateway.vpsT.fqdn | default "" | trim) -}}
{{- end -}}
{{- if and .Values.gateway.enabled .Values.gateway.vpsT.enabled }}
{{- if .Values.gateway.vpsT.agent.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tracegate.fullname" . }}-agent-vps-t
  namespace: {{ include "tracegate.namespace" . }}
  labels:
    {{- include "tracegate.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway-vps-t
spec:
  publishNotReadyAddresses: true
  ports:
    - name: http
      port: {{ .Values.gateway.vpsT.agent.port }}
      targetPort: {{ .Values.gateway.vpsT.agent.port }}
  selector:
    app.kubernetes.io/component: gateway-vps-t
    app.kubernetes.io/instance: {{ .Release.Name }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tracegate.fullname" . }}-gateway-vps-t
  namespace: {{ include "tracegate.namespace" . }}
  labels:
    {{- include "tracegate.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway-vps-t
spec:
  # hostNetwork + fixed ports (443/tcp, 443/udp, 51820/udp) cannot be rolled without a port collision.
  # Recreate avoids a deadlock where a new pod stays Pending while the old pod stays Running.
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: gateway-vps-t
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "tracegate.labels" . | nindent 8 }}
        app.kubernetes.io/component: gateway-vps-t
      annotations:
        checksum/configmaps: {{ $configmapsChecksum | quote }}
        checksum/secrets: {{ $secretsChecksum | quote }}
    spec:
      hostNetwork: {{ .Values.gateway.vpsT.hostNetwork }}
      dnsPolicy: ClusterFirstWithHostNet
      shareProcessNamespace: {{ .Values.gateway.vpsT.shareProcessNamespace }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      nodeSelector:
        {{- toYaml .Values.gateway.vpsT.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.gateway.vpsT.tolerations | nindent 8 }}
      affinity:
        {{- toYaml .Values.gateway.vpsT.affinity | nindent 8 }}
      volumes:
        - name: entry-mux-config
          configMap:
            name: {{ include "tracegate.fullname" . }}-vps-t-entry-mux
        - name: entry-decoy
          configMap:
            name: {{ include "tracegate.fullname" . }}-entry-decoy
        - name: entry-ws-tls
          secret:
            secretName: {{ include "tracegate.fullname" . }}-vps-t-ws-tls
        - name: xray-config
          secret:
            secretName: {{ include "tracegate.fullname" . }}-vps-t-xray-config
        - name: hysteria-config
          secret:
            secretName: {{ include "tracegate.fullname" . }}-vps-t-hysteria-config
        - name: wg-config
          secret:
            secretName: {{ include "tracegate.fullname" . }}-vps-t-wireguard-config
        {{- if $interconnectHyEnabled }}
        - name: hysteria-backplane-config
          secret:
            secretName: {{ include "tracegate.fullname" . }}-vps-t-hysteria-backplane-config
        - name: hysteria-backplane-tls
          secret:
            secretName: {{ include "tracegate.fullname" . }}-vps-t-hysteria-backplane-tls
        {{- end }}
        {{- if $interconnectWgEnabled }}
        - name: wg-backplane-config
          secret:
            secretName: {{ include "tracegate.fullname" . }}-vps-t-wireguard-backplane
        {{- end }}
        - name: decoy
          configMap:
            name: {{ include "tracegate.fullname" . }}-vps-t-decoy
        {{- if and .Values.gateway.vpsT.hysteriaTls.crt .Values.gateway.vpsT.hysteriaTls.key }}
        - name: hysteria-tls
          secret:
            secretName: {{ include "tracegate.fullname" . }}-vps-t-hysteria-tls
        {{- end }}
        - name: agent-data
          hostPath:
            path: {{ .Values.gateway.vpsT.agentDataHostPath | quote }}
            type: DirectoryOrCreate
      initContainers:
        - name: seed-runtime
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              set -eu

              mkdir -p /agent-data/base/xray /agent-data/base/hysteria /agent-data/base/wireguard
              cp /base/xray/config.json /agent-data/base/xray/config.json
              cp /base/hysteria/config.yaml /agent-data/base/hysteria/config.yaml
              cp /base/wireguard/wg0.conf /agent-data/base/wireguard/wg0.conf

              mkdir -p /agent-data/runtime/xray /agent-data/runtime/hysteria /agent-data/runtime/wireguard
              [ -f /agent-data/runtime/xray/config.json ] || cp /agent-data/base/xray/config.json /agent-data/runtime/xray/config.json
              [ -f /agent-data/runtime/hysteria/config.yaml ] || cp /agent-data/base/hysteria/config.yaml /agent-data/runtime/hysteria/config.yaml
              [ -f /agent-data/runtime/wireguard/wg0.conf ] || cp /agent-data/base/wireguard/wg0.conf /agent-data/runtime/wireguard/wg0.conf
          volumeMounts:
            - name: agent-data
              mountPath: /agent-data
            - name: xray-config
              mountPath: /base/xray
            - name: hysteria-config
              mountPath: /base/hysteria
            - name: wg-config
              mountPath: /base/wireguard
      containers:
        - name: entry-mux
          image: {{ .Values.gateway.vpsT.entryMux.image | default "nginx:1.24-alpine" }}
          imagePullPolicy: {{ .Values.gateway.vpsT.entryMux.pullPolicy | default "IfNotPresent" }}
          command:
            - /bin/sh
            - -ec
            - |
              n=0
              until nc -z 127.0.0.1 2443 && nc -z 127.0.0.1 10000; do
                n=$((n+1))
                if [ "$n" -ge 120 ]; then
                  echo "entry-mux dependencies are not ready on VPS-T" >&2
                  exit 1
                fi
                sleep 1
              done
              exec /docker-entrypoint.sh nginx -g 'daemon off;'
          ports:
            - containerPort: 443
              protocol: TCP
              name: entry-tcp
          volumeMounts:
            - name: entry-mux-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: entry-ws-tls
              mountPath: /etc/nginx/tls
              readOnly: true
            - name: decoy
              mountPath: /usr/share/nginx/html
              readOnly: true
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          readinessProbe:
            tcpSocket:
              port: entry-tcp
            initialDelaySeconds: 2
            periodSeconds: 10
          startupProbe:
            tcpSocket:
              port: entry-tcp
            periodSeconds: 2
            failureThreshold: 90
          livenessProbe:
            tcpSocket:
              port: entry-tcp
            initialDelaySeconds: 10
            periodSeconds: 20
        - name: xray
          image: {{ .Values.gateway.vpsT.xray.image }}
          imagePullPolicy: {{ .Values.gateway.vpsT.xray.pullPolicy }}
          command: ["xray", "run", "-c", "/etc/xray/config.json"]
          ports:
            - containerPort: 2443
              protocol: TCP
              name: vless-reality
            - containerPort: 10000
              protocol: TCP
              name: vless-ws
          volumeMounts:
            - name: agent-data
              mountPath: /etc/xray
              subPath: runtime/xray
          securityContext:
            runAsUser: 0
            runAsGroup: 0
        - name: hysteria
          image: {{ .Values.gateway.vpsT.hysteria.image }}
          imagePullPolicy: {{ .Values.gateway.vpsT.hysteria.pullPolicy }}
          command: ["hysteria", "server", "-c", "/etc/hysteria/config.yaml"]
          ports:
            - containerPort: 443
              protocol: UDP
              name: hysteria-udp
          volumeMounts:
            - name: decoy
              mountPath: /var/www/decoy
            - name: agent-data
              mountPath: /etc/hysteria
              subPath: runtime/hysteria
            {{- if and .Values.gateway.vpsT.hysteriaTls.crt .Values.gateway.vpsT.hysteriaTls.key }}
            - name: hysteria-tls
              mountPath: /etc/hysteria/tls
              readOnly: true
            {{- end }}
          securityContext:
            runAsUser: 0
            runAsGroup: 0
        {{- if $interconnectHyEnabled }}
        - name: hysteria-backplane
          image: {{ .Values.gateway.vpsT.hysteria.image }}
          imagePullPolicy: {{ .Values.gateway.vpsT.hysteria.pullPolicy }}
          command: ["hysteria", "server", "-c", "/etc/hysteria-backplane/config.yaml"]
          {{- if not $interconnectHyTcpEncapEnabled }}
          ports:
            - containerPort: {{ $hyBackplaneListenPort }}
              protocol: UDP
              name: hy-backplane
          {{- end }}
          volumeMounts:
            - name: hysteria-backplane-config
              mountPath: /etc/hysteria-backplane
              readOnly: true
            - name: hysteria-backplane-tls
              mountPath: /etc/hysteria-backplane-tls
              readOnly: true
          securityContext:
            runAsUser: 0
            runAsGroup: 0
        {{- if $interconnectHyTcpEncapEnabled }}
        - name: hysteria-backplane-tcp-bridge
          image: {{ include "tracegate.image" .Values.gateway.agentImage }}
          imagePullPolicy: {{ .Values.gateway.agentImage.pullPolicy }}
          command:
            - tracegate-udp-tcp-tunnel
            - --log-level
            - INFO
            - server
            - --tcp-bind-host
            - {{ $hyBackplaneTcpServerHost | quote }}
            - --tcp-bind-port
            - {{ $hyBackplaneTcpServerPort | quote }}
            - --udp-target-host
            - 127.0.0.1
            - --udp-target-port
            - {{ $hyBackplaneListenPort | quote }}
            - --idle-timeout-seconds
            - {{ (.Values.gateway.interconnect.hysteriaBackplane.tcpEncapsulation.idleTimeoutSeconds | default 300) | quote }}
          ports:
            - containerPort: {{ $hyBackplaneTcpServerPort }}
              protocol: TCP
              name: hybp-encap
          securityContext:
            runAsUser: 0
            runAsGroup: 0
        {{- end }}
        {{- end }}
        - name: wireguard
          image: {{ .Values.gateway.vpsT.wireguard.image }}
          imagePullPolicy: {{ .Values.gateway.vpsT.wireguard.pullPolicy }}
          env:
            - name: WG_INTERFACE
              value: {{ .Values.gateway.vpsT.wireguard.interface | quote }}
            - name: WG_CONFIG
              value: /etc/wireguard/wg0.conf
            - name: ENABLE_IP_FORWARD
              value: "1"
          ports:
            - containerPort: 51820
              protocol: UDP
              name: wireguard-udp
          volumeMounts:
            - name: agent-data
              mountPath: /etc/wireguard
              subPath: runtime/wireguard
          securityContext:
            privileged: true
            capabilities:
              add: ["NET_ADMIN", "SYS_MODULE"]
            runAsUser: 0
            runAsGroup: 0
        {{- if $interconnectWgEnabled }}
        - name: wireguard-backplane
          image: {{ .Values.gateway.vpsT.wireguard.image }}
          imagePullPolicy: {{ .Values.gateway.vpsT.wireguard.pullPolicy }}
          env:
            - name: WG_INTERFACE
              value: {{ .Values.gateway.interconnect.wireguardBackplane.interface | quote }}
            - name: WG_CONFIG
              value: /etc/wireguard-backplane/wg0.conf
            - name: ENABLE_IP_FORWARD
              value: "0"
            - name: ENABLE_NAT
              value: "0"
          ports:
            - containerPort: {{ .Values.gateway.interconnect.wireguardBackplane.listenPort }}
              protocol: UDP
              name: wg-backplane
          volumeMounts:
            - name: wg-backplane-config
              mountPath: /etc/wireguard-backplane
              readOnly: true
          securityContext:
            privileged: true
            capabilities:
              add: ["NET_ADMIN", "SYS_MODULE"]
            runAsUser: 0
            runAsGroup: 0
        {{- end }}
        {{- if .Values.gateway.vpsT.agent.enabled }}
        - name: agent
          image: {{ include "tracegate.image" .Values.gateway.agentImage }}
          imagePullPolicy: {{ .Values.gateway.agentImage.pullPolicy }}
          command: ["tracegate-agent"]
          ports:
            - containerPort: {{ .Values.gateway.vpsT.agent.port }}
              protocol: TCP
              name: agent-http
          env:
            - name: APP_ENV
              value: prod
            - name: AGENT_HOST
              value: {{ .Values.gateway.vpsT.agent.host | quote }}
            - name: AGENT_PORT
              value: {{ .Values.gateway.vpsT.agent.port | quote }}
            - name: AGENT_ROLE
              value: {{ .Values.gateway.vpsT.agent.role | quote }}
            - name: AGENT_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "tracegate.fullname" . }}-vps-t-agent-auth
                  key: agent-auth-token
            - name: PSEUDONYM_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "tracegate.fullname" . }}-grafana-auth
                  key: pseudonym-secret
            - name: AGENT_DATA_ROOT
              value: {{ .Values.gateway.vpsT.agent.dataRoot | quote }}
            - name: AGENT_DRY_RUN
              value: {{ .Values.gateway.vpsT.agent.dryRun | quote }}
            - name: AGENT_RUNTIME_MODE
              value: {{ .Values.gateway.vpsT.agent.runtimeMode | quote }}
            - name: AGENT_XRAY_API_ENABLED
              value: {{ .Values.gateway.vpsT.agent.xrayApiEnabled | quote }}
            - name: AGENT_XRAY_API_SERVER
              value: {{ .Values.gateway.vpsT.agent.xrayApiServer | quote }}
            - name: AGENT_XRAY_API_TIMEOUT_SECONDS
              value: {{ .Values.gateway.vpsT.agent.xrayApiTimeoutSeconds | quote }}
            - name: AGENT_STATS_URL
              value: {{ .Values.gateway.vpsT.agent.statsUrl | quote }}
            - name: AGENT_STATS_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "tracegate.fullname" . }}-vps-t-agent-auth
                  key: agent-stats-secret
            - name: AGENT_WG_INTERFACE
              value: {{ .Values.gateway.vpsT.agent.wgInterface | quote }}
            - name: AGENT_WG_EXPECTED_PORT
              value: {{ .Values.gateway.vpsT.agent.wgExpectedPort | quote }}
            - name: DEFAULT_VPS_T_HOST
              value: {{ .Values.controlPlane.env.defaultVpsTHost | quote }}
            - name: DEFAULT_VPS_E_HOST
              value: {{ .Values.controlPlane.env.defaultVpsEHost | quote }}
            - name: REALITY_MULTI_INBOUND_GROUPS
              value: {{ toJson (.Values.gateway.realityMultiInbound.groups | default (list)) | quote }}
            - name: AGENT_RELOAD_XRAY_CMD
              value: {{ .Values.gateway.vpsT.agent.reloadXrayCmd | quote }}
            - name: AGENT_RELOAD_HYSTERIA_CMD
              value: {{ .Values.gateway.vpsT.agent.reloadHysteriaCmd | quote }}
            - name: AGENT_RELOAD_WG_CMD
              value: {{ .Values.gateway.vpsT.agent.reloadWgCmd | quote }}
          volumeMounts:
            - name: agent-data
              mountPath: {{ .Values.gateway.vpsT.agent.dataRoot }}
            - name: agent-data
              mountPath: /etc/wireguard
              subPath: runtime/wireguard
          securityContext:
            # Needs NET_ADMIN to query/reload WireGuard inside the shared pod netns.
            capabilities:
              add: ["NET_ADMIN"]
            runAsUser: 0
            runAsGroup: 0
          readinessProbe:
            httpGet:
              path: /v1/health
              port: agent-http
            initialDelaySeconds: 5
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /v1/health
              port: agent-http
            initialDelaySeconds: 10
            periodSeconds: 20
        {{- end }}
{{- end }}

{{- if and .Values.gateway.enabled .Values.gateway.vpsE.enabled }}
---
{{- if .Values.gateway.vpsE.agent.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tracegate.fullname" . }}-agent-vps-e
  namespace: {{ include "tracegate.namespace" . }}
  labels:
    {{- include "tracegate.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway-vps-e
spec:
  publishNotReadyAddresses: true
  ports:
    - name: http
      port: {{ .Values.gateway.vpsE.agent.port }}
      targetPort: {{ .Values.gateway.vpsE.agent.port }}
  selector:
    app.kubernetes.io/component: gateway-vps-e
    app.kubernetes.io/instance: {{ .Release.Name }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tracegate.fullname" . }}-gateway-vps-e
  namespace: {{ include "tracegate.namespace" . }}
  labels:
    {{- include "tracegate.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway-vps-e
spec:
  # hostNetwork + fixed port 443/tcp cannot be rolled without a port collision.
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: gateway-vps-e
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "tracegate.labels" . | nindent 8 }}
        app.kubernetes.io/component: gateway-vps-e
      annotations:
        checksum/configmaps: {{ $configmapsChecksum | quote }}
        checksum/secrets: {{ $secretsChecksum | quote }}
    spec:
      hostNetwork: {{ .Values.gateway.vpsE.hostNetwork }}
      dnsPolicy: {{ ternary "Default" "ClusterFirst" .Values.gateway.vpsE.hostNetwork }}
      shareProcessNamespace: {{ .Values.gateway.vpsE.shareProcessNamespace }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      nodeSelector:
        {{- toYaml .Values.gateway.vpsE.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.gateway.vpsE.tolerations | nindent 8 }}
      affinity:
        {{- toYaml .Values.gateway.vpsE.affinity | nindent 8 }}
      volumes:
        {{- if eq .Values.gateway.vpsE.mode "xray" }}
        - name: xray-config
          secret:
            secretName: {{ include "tracegate.fullname" . }}-vps-e-xray-config
        {{- if .Values.gateway.vpsE.hysteria.enabled }}
        - name: hysteria-config
          secret:
            secretName: {{ include "tracegate.fullname" . }}-vps-e-hysteria-config
        {{- end }}
        - name: entry-mux-config
          configMap:
            name: {{ include "tracegate.fullname" . }}-vps-e-entry-mux
        - name: entry-decoy
          configMap:
            name: {{ include "tracegate.fullname" . }}-entry-decoy
        - name: entry-ws-tls
          secret:
            secretName: {{ include "tracegate.fullname" . }}-vps-e-ws-tls
        {{- else }}
        - name: haproxy-config
          configMap:
            name: {{ include "tracegate.fullname" . }}-vps-e-haproxy
        {{- end }}
        - name: agent-data
          hostPath:
            path: {{ .Values.gateway.vpsE.agentDataHostPath | quote }}
            type: DirectoryOrCreate
        {{- if $interconnectHyEnabled }}
        - name: hysteria-backplane-config
          secret:
            secretName: {{ include "tracegate.fullname" . }}-vps-e-hysteria-backplane-config
        - name: hysteria-backplane-ca
          secret:
            secretName: {{ include "tracegate.fullname" . }}-vps-e-hysteria-backplane-ca
        {{- end }}
        {{- if $interconnectSelectorEnabled }}
        - name: transit-selector-config
          configMap:
            name: {{ include "tracegate.fullname" . }}-vps-e-transit-selector
        {{- end }}
        {{- if $interconnectWgEnabled }}
        - name: wg-backplane-config
          secret:
            secretName: {{ include "tracegate.fullname" . }}-vps-e-wireguard-backplane
        {{- end }}
      {{- if eq .Values.gateway.vpsE.mode "xray" }}
      initContainers:
        - name: seed-runtime
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              set -eu

              mkdir -p /agent-data/base/xray
              cp /base/xray/config.json /agent-data/base/xray/config.json
              {{- if .Values.gateway.vpsE.hysteria.enabled }}
              mkdir -p /agent-data/base/hysteria
              cp /base/hysteria/config.yaml /agent-data/base/hysteria/config.yaml
              {{- end }}

              mkdir -p /agent-data/runtime/xray
              [ -f /agent-data/runtime/xray/config.json ] || cp /agent-data/base/xray/config.json /agent-data/runtime/xray/config.json
              {{- if .Values.gateway.vpsE.hysteria.enabled }}
              mkdir -p /agent-data/runtime/hysteria
              [ -f /agent-data/runtime/hysteria/config.yaml ] || cp /agent-data/base/hysteria/config.yaml /agent-data/runtime/hysteria/config.yaml
              {{- end }}
              mkdir -p /agent-data/runtime/xray-b2
          volumeMounts:
            - name: agent-data
              mountPath: /agent-data
            - name: xray-config
              mountPath: /base/xray
            {{- if .Values.gateway.vpsE.hysteria.enabled }}
            - name: hysteria-config
              mountPath: /base/hysteria
            {{- end }}
      {{- end }}
      containers:
        {{- if eq .Values.gateway.vpsE.mode "xray" }}
        - name: entry-mux
          image: {{ .Values.gateway.vpsE.entryMux.image | default "nginx:1.24-alpine" }}
          imagePullPolicy: {{ .Values.gateway.vpsE.entryMux.pullPolicy | default "IfNotPresent" }}
          command:
            - /bin/sh
            - -ec
            - |
              n=0
              until nc -z 127.0.0.1 2443 && nc -z 127.0.0.1 10000{{- if .Values.gateway.vpsE.b2SplitBackend.enabled }} && nc -z 127.0.0.1 2501{{- end }}; do
                n=$((n+1))
                if [ "$n" -ge 120 ]; then
                  echo "entry-mux dependencies are not ready on VPS-E" >&2
                  exit 1
                fi
                sleep 1
              done
              exec /docker-entrypoint.sh nginx -g 'daemon off;'
          ports:
            - containerPort: 443
              protocol: TCP
              name: entry-tcp
          volumeMounts:
            - name: entry-mux-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: entry-ws-tls
              mountPath: /etc/nginx/tls
              readOnly: true
            - name: entry-decoy
              mountPath: /usr/share/nginx/html
              readOnly: true
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          readinessProbe:
            tcpSocket:
              port: entry-tcp
            initialDelaySeconds: 2
            periodSeconds: 10
          startupProbe:
            tcpSocket:
              port: entry-tcp
            periodSeconds: 2
            failureThreshold: 90
          livenessProbe:
            tcpSocket:
              port: entry-tcp
            initialDelaySeconds: 10
            periodSeconds: 20
        - name: xray
          image: {{ .Values.gateway.vpsE.xray.image }}
          imagePullPolicy: {{ .Values.gateway.vpsE.xray.pullPolicy }}
          command: ["xray", "run", "-c", "/etc/xray/config.json"]
          ports:
            - containerPort: 2443
              protocol: TCP
              name: vless-reality
            - containerPort: 10000
              protocol: TCP
              name: vless-ws
          volumeMounts:
            - name: agent-data
              mountPath: /etc/xray
              subPath: runtime/xray
          securityContext:
            runAsUser: 0
            runAsGroup: 0
        {{- if .Values.gateway.vpsE.b2SplitBackend.enabled }}
        - name: xray-b2
          image: {{ include "tracegate.image" .Values.gateway.agentImage }}
          imagePullPolicy: {{ .Values.gateway.agentImage.pullPolicy }}
          command:
            - sh
            - -ec
            - |
              until [ -s /etc/xray-b2/config.json ]; do
                sleep 1
              done
              exec xray run -c /etc/xray-b2/config.json
          volumeMounts:
            - name: agent-data
              mountPath: /etc/xray-b2
              subPath: runtime/xray-b2
          securityContext:
            runAsUser: 0
            runAsGroup: 0
        {{- end }}
        {{- if .Values.gateway.vpsE.hysteria.enabled }}
        - name: hysteria
          image: {{ .Values.gateway.vpsE.hysteria.image }}
          imagePullPolicy: {{ .Values.gateway.vpsE.hysteria.pullPolicy }}
          command: ["hysteria", "server", "-c", "/etc/hysteria/config.yaml"]
          ports:
            - containerPort: 443
              protocol: UDP
              name: hysteria-udp
          volumeMounts:
            - name: entry-decoy
              mountPath: /var/www/decoy
            - name: agent-data
              mountPath: /etc/hysteria
              subPath: runtime/hysteria
            - name: entry-ws-tls
              mountPath: /etc/hysteria/tls
              readOnly: true
          securityContext:
            runAsUser: 0
            runAsGroup: 0
        {{- end }}
        {{- else }}
        - name: haproxy
          image: {{ .Values.gateway.vpsE.tcpForward.image }}
          imagePullPolicy: {{ .Values.gateway.vpsE.tcpForward.pullPolicy }}
          ports:
            - containerPort: 443
              protocol: TCP
              name: entry-tcp
            {{- $wsPort := int (.Values.controlPlane.env.vlessWsTlsPort | default 443) -}}
            {{- if ne $wsPort 443 }}
            - containerPort: {{ $wsPort }}
              protocol: TCP
              name: ws-tls-tcp
            {{- end }}
          volumeMounts:
            - name: haproxy-config
              mountPath: /usr/local/etc/haproxy/haproxy.cfg
              subPath: haproxy.cfg
          securityContext:
            runAsUser: 0
            runAsGroup: 0
        {{- end }}
        {{- if $interconnectHyEnabled }}
        - name: hysteria-backplane-client
          image: {{ .Values.gateway.vpsE.hysteria.image }}
          imagePullPolicy: {{ .Values.gateway.vpsE.hysteria.pullPolicy }}
          command: ["hysteria", "client", "-c", "/etc/hysteria-backplane/config.yaml"]
          ports:
            - containerPort: {{ $hyBackplaneTransitPort }}
              protocol: TCP
              name: hybp-tcp
            {{- if ne $hyBackplaneWsPort $hyBackplaneTransitPort }}
            - containerPort: {{ $hyBackplaneWsPort }}
              protocol: TCP
              name: hybp-ws
            {{- end }}
          volumeMounts:
            - name: hysteria-backplane-config
              mountPath: /etc/hysteria-backplane
              readOnly: true
            - name: hysteria-backplane-ca
              mountPath: /etc/hysteria-backplane-ca
              readOnly: true
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          readinessProbe:
            tcpSocket:
              host: 127.0.0.1
              port: hybp-tcp
            initialDelaySeconds: 1
            periodSeconds: 10
          startupProbe:
            tcpSocket:
              host: 127.0.0.1
              port: hybp-tcp
            periodSeconds: 2
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              host: 127.0.0.1
              port: hybp-tcp
            initialDelaySeconds: 10
            periodSeconds: 20
        {{- if $interconnectHyTcpEncapEnabled }}
        - name: hysteria-backplane-tcp-bridge
          image: {{ include "tracegate.image" .Values.gateway.agentImage }}
          imagePullPolicy: {{ .Values.gateway.agentImage.pullPolicy }}
          command:
            - tracegate-udp-tcp-tunnel
            - --log-level
            - INFO
            - client
            - --udp-bind-host
            - {{ $hyBackplaneTcpClientHost | quote }}
            - --udp-bind-port
            - {{ $hyBackplaneTcpClientPort | quote }}
            - --tcp-connect-host
            - {{ required "gateway.vpsT.publicIPv4 or gateway.vpsT.fqdn is required when hysteriaBackplane tcpEncapsulation is enabled" $hyBackplaneRemoteHost | quote }}
            - --tcp-connect-port
            - {{ $hyBackplaneTcpServerPort | quote }}
            - --connect-timeout-seconds
            - {{ (.Values.gateway.interconnect.hysteriaBackplane.tcpEncapsulation.connectTimeoutSeconds | default 5) | quote }}
            - --reconnect-delay-seconds
            - {{ (.Values.gateway.interconnect.hysteriaBackplane.tcpEncapsulation.reconnectDelaySeconds | default 1) | quote }}
          securityContext:
            runAsUser: 0
            runAsGroup: 0
        {{- end }}
        {{- end }}
        {{- if $interconnectSelectorEnabled }}
        - name: transit-selector
          image: {{ include "tracegate.image" .Values.gateway.agentImage }}
          imagePullPolicy: {{ .Values.gateway.agentImage.pullPolicy }}
          command: ["tracegate-transit-selector"]
          env:
            - name: APP_ENV
              value: prod
            - name: TRANSIT_SELECTOR_LISTENERS_JSON
              valueFrom:
                configMapKeyRef:
                  name: {{ include "tracegate.fullname" . }}-vps-e-transit-selector
                  key: listeners.json
            - name: TRANSIT_SELECTOR_PROBE_INTERVAL_SECONDS
              value: {{ .Values.gateway.interconnect.selector.probeIntervalSeconds | quote }}
            - name: TRANSIT_SELECTOR_PROBE_TIMEOUT_SECONDS
              value: {{ .Values.gateway.interconnect.selector.probeTimeoutSeconds | quote }}
            - name: TRANSIT_SELECTOR_CONNECT_TIMEOUT_SECONDS
              value: {{ .Values.gateway.interconnect.selector.connectTimeoutSeconds | quote }}
            - name: TRANSIT_SELECTOR_FAILURE_STALE_SECONDS
              value: {{ .Values.gateway.interconnect.selector.failureStaleSeconds | quote }}
            - name: TRANSIT_SELECTOR_SWITCH_COOLDOWN_SECONDS
              value: {{ .Values.gateway.interconnect.selector.switchCooldownSeconds | quote }}
            - name: TRANSIT_SELECTOR_SWITCH_MARGIN_MS
              value: {{ .Values.gateway.interconnect.selector.switchMarginMs | quote }}
            - name: TRANSIT_SELECTOR_METRICS_ENABLED
              value: {{ .Values.gateway.interconnect.selector.metricsEnabled | quote }}
            - name: TRANSIT_SELECTOR_METRICS_HOST
              value: {{ .Values.gateway.interconnect.selector.metricsHost | quote }}
            - name: TRANSIT_SELECTOR_METRICS_PORT
              value: {{ .Values.gateway.interconnect.selector.metricsPort | quote }}
          ports:
            - containerPort: {{ .Values.gateway.interconnect.selector.transitPort }}
              protocol: TCP
              name: sel-tcp
            {{- if ne (int (.Values.gateway.interconnect.selector.wsTransitPort | default 15444)) (int (.Values.gateway.interconnect.selector.transitPort | default 15443)) }}
            - containerPort: {{ .Values.gateway.interconnect.selector.wsTransitPort }}
              protocol: TCP
              name: sel-ws
            {{- end }}
          {{- if .Values.gateway.interconnect.selector.metricsEnabled }}
            - containerPort: {{ $selectorMetricsPort }}
              protocol: TCP
              name: sel-metrics
          {{- end }}
          volumeMounts:
            - name: transit-selector-config
              mountPath: /etc/tracegate-transit-selector
              readOnly: true
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          readinessProbe:
            tcpSocket:
              host: 127.0.0.1
              port: sel-tcp
            initialDelaySeconds: 1
            periodSeconds: 10
          startupProbe:
            tcpSocket:
              host: 127.0.0.1
              port: sel-tcp
            periodSeconds: 2
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              host: 127.0.0.1
              port: sel-tcp
            initialDelaySeconds: 10
            periodSeconds: 20
        {{- end }}
        {{- if $interconnectWgEnabled }}
        - name: wireguard-backplane
          image: {{ .Values.gateway.vpsT.wireguard.image }}
          imagePullPolicy: {{ .Values.gateway.vpsT.wireguard.pullPolicy }}
          env:
            - name: WG_INTERFACE
              value: {{ .Values.gateway.interconnect.wireguardBackplane.interface | quote }}
            - name: WG_CONFIG
              value: /etc/wireguard-backplane/wg0.conf
            - name: ENABLE_IP_FORWARD
              value: "0"
            - name: ENABLE_NAT
              value: "0"
          ports:
            - containerPort: {{ .Values.gateway.interconnect.wireguardBackplane.listenPort }}
              protocol: UDP
              name: wg-backplane
          volumeMounts:
            - name: wg-backplane-config
              mountPath: /etc/wireguard-backplane
              readOnly: true
          securityContext:
            privileged: true
            capabilities:
              add: ["NET_ADMIN", "SYS_MODULE"]
            runAsUser: 0
            runAsGroup: 0
        {{- end }}
        {{- if .Values.gateway.vpsE.agent.enabled }}
        - name: agent
          image: {{ include "tracegate.image" .Values.gateway.agentImage }}
          imagePullPolicy: {{ .Values.gateway.agentImage.pullPolicy }}
          command: ["tracegate-agent"]
          ports:
            - containerPort: {{ .Values.gateway.vpsE.agent.port }}
              protocol: TCP
              name: agent-http
          env:
            - name: APP_ENV
              value: prod
            - name: AGENT_HOST
              value: {{ .Values.gateway.vpsE.agent.host | quote }}
            - name: AGENT_PORT
              value: {{ .Values.gateway.vpsE.agent.port | quote }}
            - name: AGENT_ROLE
              value: {{ .Values.gateway.vpsE.agent.role | quote }}
            - name: AGENT_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "tracegate.fullname" . }}-vps-e-agent-auth
                  key: agent-auth-token
            - name: PSEUDONYM_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "tracegate.fullname" . }}-grafana-auth
                  key: pseudonym-secret
            - name: AGENT_DATA_ROOT
              value: {{ .Values.gateway.vpsE.agent.dataRoot | quote }}
            - name: AGENT_DRY_RUN
              value: {{ .Values.gateway.vpsE.agent.dryRun | quote }}
            - name: AGENT_RUNTIME_MODE
              value: {{ .Values.gateway.vpsE.agent.runtimeMode | quote }}
            - name: AGENT_XRAY_API_ENABLED
              value: {{ .Values.gateway.vpsE.agent.xrayApiEnabled | quote }}
            - name: AGENT_XRAY_API_SERVER
              value: {{ .Values.gateway.vpsE.agent.xrayApiServer | quote }}
            - name: AGENT_XRAY_API_TIMEOUT_SECONDS
              value: {{ .Values.gateway.vpsE.agent.xrayApiTimeoutSeconds | quote }}
            - name: AGENT_STATS_URL
              value: {{ .Values.gateway.vpsE.agent.statsUrl | quote }}
            - name: AGENT_STATS_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "tracegate.fullname" . }}-vps-e-agent-auth
                  key: agent-stats-secret
            - name: AGENT_WG_INTERFACE
              value: {{ .Values.gateway.vpsE.agent.wgInterface | quote }}
            - name: AGENT_WG_EXPECTED_PORT
              value: {{ .Values.gateway.vpsE.agent.wgExpectedPort | quote }}
            - name: DEFAULT_VPS_T_HOST
              value: {{ .Values.controlPlane.env.defaultVpsTHost | quote }}
            - name: DEFAULT_VPS_E_HOST
              value: {{ .Values.controlPlane.env.defaultVpsEHost | quote }}
            - name: REALITY_MULTI_INBOUND_GROUPS
              value: {{ toJson (.Values.gateway.realityMultiInbound.groups | default (list)) | quote }}
            - name: AGENT_VPS_E_B2_SPLIT_BACKEND_ENABLED
              value: {{ .Values.gateway.vpsE.b2SplitBackend.enabled | quote }}
            - name: AGENT_RELOAD_XRAY_CMD
              value: {{ .Values.gateway.vpsE.agent.reloadXrayCmd | quote }}
            - name: AGENT_RELOAD_HYSTERIA_CMD
              value: {{ .Values.gateway.vpsE.agent.reloadHysteriaCmd | quote }}
            - name: AGENT_RELOAD_WG_CMD
              value: {{ .Values.gateway.vpsE.agent.reloadWgCmd | quote }}
          volumeMounts:
            - name: agent-data
              mountPath: {{ .Values.gateway.vpsE.agent.dataRoot }}
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
            runAsUser: 0
            runAsGroup: 0
          readinessProbe:
            httpGet:
              path: /v1/health
              port: agent-http
            initialDelaySeconds: 5
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /v1/health
              port: agent-http
            initialDelaySeconds: 10
            periodSeconds: 20
        {{- end }}
{{- end }}
