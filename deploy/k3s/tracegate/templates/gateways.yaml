              mountPath: /etc/xray
              subPath: runtime/xray
            - name: decoy
              mountPath: {{ $.Values.decoy.mountPath }}
              readOnly: true
            - name: tls
              mountPath: /etc/tracegate/tls
              readOnly: true
{{- if $roleLinkCryptoEnabled }}
        - name: mieru
          image: {{ include "tracegate.image" $.Values.gateway.images.mieru | quote }}
          imagePullPolicy: {{ $.Values.gateway.images.mieru.pullPolicy }}
          command:
            - sh
            - -lc
            - |
              set -eu
              until {{ $roleLinkCryptoReadyTest }}; do sleep 2; done
              status_dir="/tmp/tracegate-mieru-status"
              rm -rf "${status_dir}"
              mkdir -p "${status_dir}"
              pids=""
              profile_count=0
              shutdown_mieru_profiles() {
                kill ${pids} 2>/dev/null || true
                wait ${pids} 2>/dev/null || true
              }
              start_mieru_profile() {
                profile="$1"
                [ -s "${profile}" ] || return 0
                profile_count=$((profile_count + 1))
                status_file="${status_dir}/${profile_count}.status"
                (
                  set +e
                  mieru run -c "${profile}" &
                  child_pid="$!"
                  trap 'kill "${child_pid}" 2>/dev/null || true; wait "${child_pid}" 2>/dev/null || true; exit 143' TERM INT
                  wait "${child_pid}"
                  code="$?"
                  printf '%s\n' "${code}" > "${status_file}"
                  exit "${code}"
                ) &
                pids="${pids} $!"
              }
              trap 'shutdown_mieru_profiles; exit 143' TERM INT
{{- if $roleLinkCryptoClientEnabled }}
              start_mieru_profile "{{ $.Values.privateProfiles.mountPath }}/{{ $.Values.privateProfiles.keys.mieruClient }}"
{{- end }}
{{- if $roleLinkCryptoServerEnabled }}
              start_mieru_profile "{{ $.Values.privateProfiles.mountPath }}/{{ $.Values.privateProfiles.keys.mieruServer }}"
{{- end }}
              if [ "${profile_count}" -eq 0 ]; then
                echo "tracegate mieru: no link-crypto profiles started"
                while :; do sleep 3600; done
              fi
              while :; do
                for status_file in "${status_dir}"/*.status; do
                  [ -f "${status_file}" ] || continue
                  code="$(cat "${status_file}" 2>/dev/null || echo 1)"
                  shutdown_mieru_profiles
                  exit "${code:-1}"
                done
                sleep 2
              done
          env:
            - name: TRACEGATE_LINK_CRYPTO_ROLE
              value: {{ $role.role | quote }}
            - name: TRACEGATE_LINK_CRYPTO_STATE_JSON
              value: {{ $roleLinkCryptoState | quote }}
            - name: TRACEGATE_LINK_CRYPTO_STATE_ENV
              value: {{ $roleLinkCryptoEnv | quote }}
            - name: TRACEGATE_LINK_CRYPTO_RELOAD_MARKER
              value: {{ $roleLinkCryptoReloadMarker | quote }}
{{- with $.Values.gateway.containerResources.mieru }}
          resources:
            {{- toYaml . | nindent 12 }}
{{- end }}
          volumeMounts:
            - name: private-profiles
              mountPath: {{ $.Values.privateProfiles.mountPath }}
              readOnly: true
            - name: gateway-state
              mountPath: /var/lib/tracegate
              readOnly: true
{{- end }}
{{- if $roleLinkWssCarrierEnabled }}
