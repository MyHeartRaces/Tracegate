{{- range $roleName, $role := .Values.gateway.roles }}
{{- $architectureMode := toString ($.Values.architecture.mode | default "legacy-three-node") }}
{{- $endpointRoleConfigured := hasKey $.Values.gateway.roles "endpoint" }}
{{- $skipLegacyEndpointAlias := and $endpointRoleConfigured (eq $architectureMode "entry-endpoint") (eq $roleName "transit") }}
{{- if and $endpointRoleConfigured (eq $roleName "endpoint") }}{{- $role = mergeOverwrite (deepCopy $.Values.gateway.roles.transit) $role }}{{- end }}
{{- if and $.Values.gateway.enabled $role.enabled (not $skipLegacyEndpointAlias) }}
{{- $roleRuntimeName := ternary "entry" "transit" (eq $roleName "entry") }}
{{- $roleIsEntry := eq $roleRuntimeName "entry" }}
{{- $roleIsEndpoint := eq $roleRuntimeName "transit" }}
{{- $roleAgentRole := $role.role | default (ternary "ENTRY" "TRANSIT" $roleIsEntry) }}
{{- $mtprotoIngressHosts := list }}
{{- range $shard := ($.Values.architecture.entryIngress.shards | default (list)) }}
{{- if $shard.mtprotoHost }}{{- $mtprotoIngressHosts = append $mtprotoIngressHosts $shard.mtprotoHost }}{{- end }}
{{- end }}
{{- $roleRealityKey := ternary $.Values.privateProfiles.keys.realityPrivateKeyEntry $.Values.privateProfiles.keys.realityPrivateKeyTransit $roleIsEntry }}
{{- $roleRealitySecretKey := ternary $.Values.privateProfiles.secretKeys.realityPrivateKeyEntry $.Values.privateProfiles.secretKeys.realityPrivateKeyTransit $roleIsEntry }}
{{- $roleHysteriaSalamanderKey := ternary $.Values.privateProfiles.keys.hysteriaSalamanderEntry $.Values.privateProfiles.keys.hysteriaSalamanderTransit $roleIsEntry }}
{{- $roleHysteriaSalamanderSecretKey := ternary $.Values.privateProfiles.secretKeys.hysteriaSalamanderEntry $.Values.privateProfiles.secretKeys.hysteriaSalamanderTransit $roleIsEntry }}
{{- $roleHysteriaStatsKey := ternary $.Values.privateProfiles.keys.hysteriaStatsEntry $.Values.privateProfiles.keys.hysteriaStatsTransit $roleIsEntry }}
{{- $roleHysteriaStatsSecretKey := ternary $.Values.privateProfiles.secretKeys.hysteriaStatsEntry $.Values.privateProfiles.secretKeys.hysteriaStatsTransit $roleIsEntry }}
{{- $endpointBackhaul := $.Values.interconnect.endpointBackhaul | default dict }}
{{- $endpointBackhaulHysteria := dig "hysteria2" (dict) $endpointBackhaul }}
{{- $endpointBackhaulHysteriaEnabled := and ($endpointBackhaul.enabled | default false) (dig "enabled" false $endpointBackhaulHysteria) }}
{{- $roleEndpointBackhaulHysteriaClientEnabled := and $roleIsEntry $endpointBackhaulHysteriaEnabled }}
{{- $endpointBackhaulAuthKey := $.Values.privateProfiles.keys.hysteriaEndpointBackhaulAuth }}
{{- $endpointBackhaulAuthSecretKey := $.Values.privateProfiles.secretKeys.hysteriaEndpointBackhaulAuth }}
{{- $roleZapretKey := ternary $.Values.privateProfiles.keys.zapretEntry $.Values.privateProfiles.keys.zapretTransit $roleIsEntry }}
{{- $roleZapretSecretKey := ternary $.Values.privateProfiles.secretKeys.zapretEntry $.Values.privateProfiles.secretKeys.zapretTransit $roleIsEntry }}
{{- $roleShadowsocks2022Key := ternary $.Values.privateProfiles.keys.shadowsocks2022Entry $.Values.privateProfiles.keys.shadowsocks2022Transit $roleIsEntry }}
{{- $roleShadowsocks2022SecretKey := ternary $.Values.privateProfiles.secretKeys.shadowsocks2022Entry $.Values.privateProfiles.secretKeys.shadowsocks2022Transit $roleIsEntry }}
{{- $roleShadowsocks2022PasswordKey := ternary $.Values.privateProfiles.keys.shadowsocks2022PasswordEntry $.Values.privateProfiles.keys.shadowsocks2022PasswordTransit $roleIsEntry }}
{{- $roleShadowsocks2022PasswordSecretKey := ternary $.Values.privateProfiles.secretKeys.shadowsocks2022PasswordEntry $.Values.privateProfiles.secretKeys.shadowsocks2022PasswordTransit $roleIsEntry }}
{{- $roleVlessEncryptionDecryptionSecretKey := ternary $.Values.privateProfiles.secretKeys.vlessEncryptionDecryptionEntry $.Values.privateProfiles.secretKeys.vlessEncryptionDecryptionTransit $roleIsEntry }}
{{- $roleShadowtlsKey := ternary $.Values.privateProfiles.keys.shadowtlsEntry $.Values.privateProfiles.keys.shadowtlsTransit $roleIsEntry }}
{{- $roleShadowtlsSecretKey := ternary $.Values.privateProfiles.secretKeys.shadowtlsEntry $.Values.privateProfiles.secretKeys.shadowtlsTransit $roleIsEntry }}
{{- $roleShadowtlsPasswordKey := ternary $.Values.privateProfiles.keys.shadowtlsPasswordEntry $.Values.privateProfiles.keys.shadowtlsPasswordTransit $roleIsEntry }}
{{- $roleShadowtlsPasswordSecretKey := ternary $.Values.privateProfiles.secretKeys.shadowtlsPasswordEntry $.Values.privateProfiles.secretKeys.shadowtlsPasswordTransit $roleIsEntry }}
{{- $endpointShadowtlsServerName := $.Values.shadowsocks2022.shadowtls.serverNameEndpoint | default $.Values.shadowsocks2022.shadowtls.serverNameTransit }}
{{- $roleShadowtlsServerName := ternary $.Values.shadowsocks2022.shadowtls.serverNameEntry $endpointShadowtlsServerName $roleIsEntry }}
{{- $roleLabTuicKey := ternary $.Values.privateProfiles.keys.labTuicEntry $.Values.privateProfiles.keys.labTuicTransit $roleIsEntry }}
{{- $roleLabTuicSecretKey := ternary $.Values.privateProfiles.secretKeys.labTuicEntry $.Values.privateProfiles.secretKeys.labTuicTransit $roleIsEntry }}
{{- $roleProfileState := printf "/var/lib/tracegate/private/profiles/%s/desired-state.json" $roleRuntimeName }}
{{- $roleProfileEnv := printf "/var/lib/tracegate/private/profiles/%s/desired-state.env" $roleRuntimeName }}
{{- $roleLinkCryptoState := printf "/var/lib/tracegate/private/link-crypto/%s/desired-state.json" $roleRuntimeName }}
{{- $roleLinkCryptoEnv := printf "/var/lib/tracegate/private/link-crypto/%s/desired-state.env" $roleRuntimeName }}
{{- $roleRouterState := printf "/var/lib/tracegate/private/router/%s/desired-state.json" $roleRuntimeName }}
{{- $roleRouterEnv := printf "/var/lib/tracegate/private/router/%s/desired-state.env" $roleRuntimeName }}
{{- $roleRouterClientBundle := printf "/var/lib/tracegate/private/router/%s/client-bundle.json" $roleRuntimeName }}
{{- $roleRouterClientEnv := printf "/var/lib/tracegate/private/router/%s/client-bundle.env" $roleRuntimeName }}
{{- $roleRouterRequired := or (and $roleIsEntry $.Values.interconnect.entryTransit.routerEntry.enabled) (and $roleIsEndpoint $.Values.interconnect.entryTransit.routerTransit.enabled) }}
{{- $roleProfileReloadMarker := printf "/var/lib/tracegate/private/runtime/profiles-%s-last-reload.json" $roleRuntimeName }}
{{- $roleLinkCryptoReloadMarker := printf "/var/lib/tracegate/private/runtime/link-crypto-%s-last-reload.json" $roleRuntimeName }}
{{- $roleProfileMarkerTest := printf "grep -q '\\\"schema\\\": \\\"tracegate.k3s-private-reload.v1\\\"' %s && grep -q '\\\"summarySchema\\\": \\\"tracegate.k3s-private-reload-summary.v1\\\"' %s && grep -q '\\\"component\\\": \\\"profiles\\\"' %s && grep -q '\\\"role\\\": \\\"%s\\\"' %s && grep -q '\\\"auth\\\": \\\"required\\\"' %s && grep -q '\\\"allowAnonymousLocalhost\\\": false' %s" $roleProfileReloadMarker $roleProfileReloadMarker $roleProfileReloadMarker $roleAgentRole $roleProfileReloadMarker $roleProfileReloadMarker $roleProfileReloadMarker }}
{{- $roleLinkCryptoMarkerTest := printf "grep -q '\\\"schema\\\": \\\"tracegate.k3s-private-reload.v1\\\"' %s && grep -q '\\\"summarySchema\\\": \\\"tracegate.k3s-private-reload-summary.v1\\\"' %s && grep -q '\\\"component\\\": \\\"link-crypto\\\"' %s && grep -q '\\\"role\\\": \\\"%s\\\"' %s && grep -q '\\\"private-profile\\\"' %s" $roleLinkCryptoReloadMarker $roleLinkCryptoReloadMarker $roleLinkCryptoReloadMarker $roleAgentRole $roleLinkCryptoReloadMarker $roleLinkCryptoReloadMarker }}
{{- $roleRouterAbsentTest := printf "[ ! -e %s ] && [ ! -e %s ] && [ ! -e %s ] && [ ! -e %s ]" $roleRouterState $roleRouterEnv $roleRouterClientBundle $roleRouterClientEnv }}
{{- $roleRouterValidatedTest := printf "[ -s %s ] && [ -s %s ] && [ -s %s ] && [ -s %s ] && [ ! %s -nt %s ] && [ ! %s -nt %s ] && [ ! %s -nt %s ] && [ ! %s -nt %s ] && grep -q '\\\"router\\\"' %s && grep -q '\\\"clientBundle\\\"' %s && grep -q '\\\"clientEnv\\\"' %s" $roleRouterState $roleRouterEnv $roleRouterClientBundle $roleRouterClientEnv $roleRouterState $roleLinkCryptoReloadMarker $roleRouterEnv $roleLinkCryptoReloadMarker $roleRouterClientBundle $roleLinkCryptoReloadMarker $roleRouterClientEnv $roleLinkCryptoReloadMarker $roleLinkCryptoReloadMarker $roleLinkCryptoReloadMarker $roleLinkCryptoReloadMarker }}
{{- $roleRouterReadyTest := ternary $roleRouterValidatedTest (printf "(%s) || (%s)" $roleRouterAbsentTest $roleRouterValidatedTest) $roleRouterRequired }}
{{- $roleProfileReadyTest := printf "[ -s %s ] && [ -s %s ] && [ -s %s ] && [ ! %s -nt %s ] && [ ! %s -nt %s ] && %s" $roleProfileState $roleProfileEnv $roleProfileReloadMarker $roleProfileState $roleProfileReloadMarker $roleProfileEnv $roleProfileReloadMarker $roleProfileMarkerTest }}
{{- $roleLinkCryptoReadyTest := printf "[ -s %s ] && [ -s %s ] && [ -s %s ] && [ ! %s -nt %s ] && [ ! %s -nt %s ] && %s && ( %s )" $roleLinkCryptoState $roleLinkCryptoEnv $roleLinkCryptoReloadMarker $roleLinkCryptoState $roleLinkCryptoReloadMarker $roleLinkCryptoEnv $roleLinkCryptoReloadMarker $roleLinkCryptoMarkerTest $roleRouterReadyTest }}
{{- $labDirectRestlsEnabled := and $roleIsEndpoint $.Values.experimentalProfiles.enabled $.Values.experimentalProfiles.directTransitObfuscation.enabled $.Values.experimentalProfiles.directTransitObfuscation.restls.enabled }}
{{- $labTuicRoleEnabled := and $.Values.experimentalProfiles.enabled $.Values.experimentalProfiles.tuicV5.enabled (or (and $roleIsEndpoint $.Values.experimentalProfiles.tuicV5.directEnabled) $.Values.experimentalProfiles.tuicV5.chainEnabled) }}
{{- $innerCarrier := toString $.Values.interconnect.entryTransit.innerCarrier }}
{{- $innerCarrierActive := and (ne $architectureMode "entry-endpoint") $.Values.interconnect.shadowsocks2022.enabled (eq $innerCarrier "shadowsocks2022") }}
{{- $roleLinkCryptoClientEnabled := and $innerCarrierActive $.Values.interconnect.entryTransit.enabled $roleIsEntry }}
{{- $roleLinkCryptoServerEnabled := and $innerCarrierActive (or (and $roleIsEndpoint $.Values.interconnect.entryTransit.enabled) (and $roleIsEntry $.Values.interconnect.entryTransit.routerEntry.enabled) (and $roleIsEndpoint $.Values.interconnect.entryTransit.routerTransit.enabled)) }}
{{- $roleLinkCryptoEnabled := or $roleLinkCryptoClientEnabled $roleLinkCryptoServerEnabled }}
{{- $roleEntryTrafficShaperEnabled := and $roleIsEntry $.Values.gateway.trafficShaping.entry.enabled $.Values.gateway.trafficShaping.entry.runtimeSidecar }}
{{- $roleNodeEncryptionRequired := and $.Values.gateway.nodeEncryption.enabled $.Values.gateway.nodeEncryption.required $.Values.gateway.nodeEncryption.runtimeInitValidation (or $roleIsEntry $roleIsEndpoint) }}
{{- $mtprotoDomain := $.Values.mtproto.domain | default $.Values.controlPlane.env.mtprotoDomain }}
{{- $mtprotoTlsDomain := $.Values.mtproto.tlsDomain | default $mtprotoDomain }}
{{- $mtprotoPublicPort := int $.Values.mtproto.publicPort }}
{{- $mtprotoRuntime := lower (toString ($.Values.mtproto.runtime | default "mtg")) }}
{{- $mtprotoRoute := $.Values.mtproto.route | default dict }}
{{- $mtprotoRouteMode := toString ($mtprotoRoute.mode | default "endpoint-direct") }}
{{- $mtprotoEntryTunnelEnabled := and $.Values.mtproto.enabled (eq $mtprotoRouteMode "entry-endpoint-tunnel") }}
{{- $mtprotoEntryRouteEnabled := and $.Values.mtproto.enabled $roleIsEntry (or (eq $mtprotoRouteMode "entry-transit-endpoint") $mtprotoEntryTunnelEnabled) }}
{{- $mtprotoEntryLocalEnabled := and $.Values.mtproto.enabled $roleIsEntry (eq $mtprotoRouteMode "entry-local-endpoint-egress") }}
{{- $mtprotoRuntimeRoleEnabled := and $.Values.mtproto.enabled (or $mtprotoEntryLocalEnabled (and $roleIsEndpoint (ne $mtprotoRouteMode "entry-local-endpoint-egress"))) }}
{{- $mtprotoRuntimeHandlesPublic := and $mtprotoRuntimeRoleEnabled (not $mtprotoEntryTunnelEnabled) }}
{{- $mtprotoRoleHandlesPublic := or $mtprotoRuntimeHandlesPublic $mtprotoEntryRouteEnabled }}
{{- $mtprotoFallbackPublicPort := and $mtprotoRoleHandlesPublic (ne $mtprotoPublicPort (int $role.ports.publicTcp)) }}
{{- $mtprotoEgress := $.Values.mtproto.egress | default dict }}
{{- $mtprotoEgressSocksPort := int (dig "socksPort" 11084 $mtprotoEgress) }}
{{- $mtprotoEgressShadowtls := dig "shadowtls" (dict) $mtprotoEgress }}
{{- $mtprotoEgressShadowtlsEnabled := and $.Values.mtproto.enabled (eq $mtprotoRouteMode "entry-local-endpoint-egress") (dig "enabled" false $mtprotoEgressShadowtls) }}
{{- $mtprotoEgressShadowtlsServerName := trim (toString (dig "serverName" "avito.ru" $mtprotoEgressShadowtls)) }}
{{- $mtprotoEgressShadowtlsEndpointHost := trim (toString (dig "endpointHost" "" $mtprotoEgressShadowtls)) }}
{{- $mtprotoEgressShadowtlsEndpointPort := int (dig "endpointPort" 443 $mtprotoEgressShadowtls) }}
{{- $mtprotoEgressShadowtlsServerListenPort := int (dig "serverListenPort" 14444 $mtprotoEgressShadowtls) }}
{{- $mtprotoEgressShadowtlsEndpointSocksPort := int (dig "endpointSocksPort" 11085 $mtprotoEgressShadowtls) }}
{{- $mtprotoEgressShadowtlsPasswordKey := $.Values.privateProfiles.keys.shadowtlsPasswordTransit }}
{{- $mtprotoEgressShadowtlsPasswordSecretKey := $.Values.privateProfiles.secretKeys.shadowtlsPasswordTransit }}
{{- $topologyEndpoint := dig "servers" "endpoint" (dict) ($.Values.topology | default dict) }}
{{- if not $mtprotoEgressShadowtlsEndpointHost }}{{- $mtprotoEgressShadowtlsEndpointHost = trim (toString ($topologyEndpoint.publicIp | default "")) }}{{- end }}
{{- $mtprotoDomainFrontingHost := trim (toString (dig "domainFrontingHost" $mtprotoTlsDomain $mtprotoEgress)) }}
{{- $mtprotoDomainFrontingPort := int (dig "domainFrontingPort" 443 $mtprotoEgress) }}
{{- $mtprotoDomainFrontingLegacyIP := "" }}
{{- if regexMatch "^([0-9]{1,3}\\.){3}[0-9]{1,3}$" $mtprotoDomainFrontingHost }}
{{- $mtprotoDomainFrontingLegacyIP = $mtprotoDomainFrontingHost }}
{{- end }}
{{- $mtprotoTolerateTimeSkewness := toString ($.Values.mtproto.tolerateTimeSkewness | default "5m") }}
{{- $mtprotoFallback := $.Values.mtproto.fallback | default dict }}
{{- $mtprotoOfficialFallbackEnabled := and $mtprotoRuntimeRoleEnabled $roleIsEndpoint (dig "enabled" false $mtprotoFallback) }}
{{- $mtprotoOfficialBackendPort := int (dig "officialBackendPort" 9444 $mtprotoFallback) }}
{{- $mtprotoOfficialStatsPort := int (dig "officialStatsPort" 2398 $mtprotoFallback) }}
{{- $mtprotoOfficialWorkers := int (dig "officialWorkers" 1 $mtprotoFallback) }}
{{- $mtprotoOfficialBindAddress := trim (toString (dig "officialBindAddress" "127.0.0.1" $mtprotoFallback)) }}
{{- $mtprotoOfficialArgs := trim (toString (dig "officialArgs" "" $mtprotoFallback)) }}
{{- $mtprotoOfficialBaseArgs := "" }}
{{- if $mtprotoTlsDomain }}{{- $mtprotoOfficialBaseArgs = printf "--domain %s" $mtprotoTlsDomain }}{{- end }}
{{- if $mtprotoOfficialBindAddress }}{{- $mtprotoOfficialBaseArgs = trim (printf "%s --address %s" $mtprotoOfficialBaseArgs $mtprotoOfficialBindAddress) }}{{- end }}
{{- $mtprotoOfficialRuntimeArgs := trim (printf "%s %s" $mtprotoOfficialBaseArgs $mtprotoOfficialArgs) }}
{{- $linkOuterCarrier := $.Values.interconnect.entryTransit.outerCarrier }}
{{- $linkOuterCarrierPathPrefix := trimPrefix "/" (toString $linkOuterCarrier.publicPath) }}
{{- $linkWssCarrierEnabled := and (ne $architectureMode "entry-endpoint") $.Values.interconnect.entryTransit.enabled $linkOuterCarrier.enabled (eq (toString $linkOuterCarrier.mode) "wss") }}
{{- $roleLinkWssCarrierEnabled := and $roleLinkCryptoEnabled $linkWssCarrierEnabled (or $roleIsEntry $roleIsEndpoint) }}
{{- $entrySmallRole := and $roleIsEntry $.Values.gateway.entrySmall.enabled }}
{{- $roleGatewayStrategy := ternary $.Values.gateway.entrySmall.rollout.strategy $.Values.gateway.strategy $entrySmallRole }}
{{- $roleAllowRecreateStrategy := ternary $.Values.gateway.entrySmall.rollout.allowRecreateStrategy $.Values.gateway.allowRecreateStrategy $entrySmallRole }}
{{- $roleRollingMaxUnavailable := ternary $.Values.gateway.entrySmall.rollout.maxUnavailable $.Values.gateway.rollingUpdate.maxUnavailable $entrySmallRole }}
{{- $roleRollingMaxSurge := ternary $.Values.gateway.entrySmall.rollout.maxSurge $.Values.gateway.rollingUpdate.maxSurge $entrySmallRole }}
{{- $roleContainerResources := $.Values.gateway.containerResources }}
{{- $roleCanonicalServer := lower (toString ($role.canonicalServer | default $roleName)) }}
{{- $roleTopology := index ($.Values.topology.servers | default dict) $roleCanonicalServer | default dict }}
{{- $roleDisplayName := toString ($roleTopology.displayName | default (title $roleCanonicalServer)) }}
{{- $roleIngress := ternary ($.Values.architecture.entryIngress | default dict) ($.Values.architecture.endpointIngress | default dict) $roleIsEntry }}
{{- $roleHaproxyReadinessHost := "" }}
{{- if ($roleIngress.enabled | default false) }}
{{- range $shard := ($roleIngress.shards | default (list)) }}
{{- $state := lower (toString ($shard.state | default "active")) }}
{{- if and (not $roleHaproxyReadinessHost) (or (eq $state "active") (eq $state "draining")) }}
{{- $roleHaproxyReadinessHost = toString $shard.publicIp }}
{{- end }}
{{- end }}
{{- end }}
{{- if $entrySmallRole }}
{{- $roleContainerResources = mergeOverwrite (deepCopy $.Values.gateway.containerResources) $.Values.gateway.entrySmall.containerResources }}
{{- end }}
{{- if $.Values.gateway.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "tracegate.roleName" (dict "root" $ "role" $roleName) }}
  namespace: {{ include "tracegate.namespace" $ }}
  labels:
    {{- include "tracegate.labels" $ | nindent 4 }}
    app.kubernetes.io/component: gateway-{{ $roleName }}
    tracegate.io/canonical-server: {{ $roleCanonicalServer | quote }}
    tracegate.io/display-name: {{ $roleDisplayName | quote }}
spec:
  minAvailable: {{ $.Values.gateway.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "tracegate.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: gateway-{{ $roleName }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tracegate.roleName" (dict "root" $ "role" $roleName) }}
  namespace: {{ include "tracegate.namespace" $ }}
  labels:
    {{- include "tracegate.labels" $ | nindent 4 }}
    app.kubernetes.io/component: gateway-{{ $roleName }}
    tracegate.io/canonical-server: {{ $roleCanonicalServer | quote }}
    tracegate.io/display-name: {{ $roleDisplayName | quote }}
spec:
  strategy:
    type: {{ $roleGatewayStrategy }}
{{- if eq $roleGatewayStrategy "RollingUpdate" }}
    rollingUpdate:
{{- if regexMatch "^[0-9]+$" (toString $roleRollingMaxUnavailable) }}
      maxUnavailable: {{ int $roleRollingMaxUnavailable }}
{{- else }}
      maxUnavailable: {{ $roleRollingMaxUnavailable | quote }}
{{- end }}
{{- if regexMatch "^[0-9]+$" (toString $roleRollingMaxSurge) }}
      maxSurge: {{ int $roleRollingMaxSurge }}
{{- else }}
      maxSurge: {{ $roleRollingMaxSurge | quote }}
{{- end }}
{{- end }}
  progressDeadlineSeconds: {{ int $.Values.gateway.progressDeadlineSeconds }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "tracegate.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: gateway-{{ $roleName }}
  template:
    metadata:
      labels:
        {{- include "tracegate.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: gateway-{{ $roleName }}
        tracegate.io/canonical-server: {{ $roleCanonicalServer | quote }}
        tracegate.io/display-name: {{ $roleDisplayName | quote }}
      annotations:
        tracegate.io/restart-boundary: static-topology-only
        tracegate.io/private-profiles: external-secret
        tracegate.io/no-host-wide-nfqueue: {{ not $.Values.interconnect.zapret2.hostWideInterception | quote }}
        checksum/tracegate-configmaps: {{ include (print $.Template.BasePath "/configmaps.yaml") $ | sha256sum | quote }}
    spec:
{{- if $.Values.gateway.seccompProfileType }}
      securityContext:
        seccompProfile:
          type: {{ $.Values.gateway.seccompProfileType }}
{{- end }}
      hostNetwork: {{ $.Values.gateway.hostNetwork }}
      dnsPolicy: {{ $.Values.gateway.dnsPolicy }}
      shareProcessNamespace: {{ $.Values.gateway.shareProcessNamespace }}
      terminationGracePeriodSeconds: {{ int $.Values.gateway.terminationGracePeriodSeconds }}
      {{- if $.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml $.Values.global.imagePullSecrets | nindent 8 }}
      {{- end }}
      nodeSelector:
        {{- toYaml $role.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml $role.tolerations | nindent 8 }}
      affinity:
        {{- toYaml $role.affinity | nindent 8 }}
      volumes:
        - name: runtime-contract
          configMap:
            name: {{ include "tracegate.fullname" $ }}-runtime-contract
        - name: haproxy-config
          configMap:
            name: {{ include "tracegate.roleName" (dict "root" $ "role" $roleName) }}-haproxy
        - name: nginx-config
          configMap:
            name: {{ include "tracegate.roleName" (dict "root" $ "role" $roleName) }}-nginx
        - name: xray-config
          configMap:
            name: {{ include "tracegate.roleName" (dict "root" $ "role" $roleName) }}-xray
        - name: hysteria-config
          configMap:
            name: {{ include "tracegate.roleName" (dict "root" $ "role" $roleName) }}-hysteria
        - name: decoy
{{- if $.Values.decoy.hostPath }}
          hostPath:
            path: {{ $.Values.decoy.hostPath | quote }}
            type: {{ $.Values.decoy.hostPathType | default "Directory" | quote }}
{{- else if $.Values.decoy.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ $.Values.decoy.existingClaim | quote }}
{{- else if $.Values.decoy.existingConfigMap }}
          configMap:
            name: {{ $.Values.decoy.existingConfigMap | quote }}
{{- else }}
          emptyDir: {}
{{- end }}
        - name: gateway-state
{{- if eq (toString $.Values.gateway.stateStorage.mode) "pvc" }}
          persistentVolumeClaim:
            claimName: {{ required (printf "gateway.stateStorage.existingClaims.%s is required" $roleName) (index $.Values.gateway.stateStorage.existingClaims $roleName) | quote }}
{{- else if eq (toString $.Values.gateway.stateStorage.mode) "emptyDir" }}
          emptyDir: {}
{{- else }}
          hostPath:
            path: {{ printf "%s/%s" $.Values.gateway.agent.dataHostPathPrefix $roleName | quote }}
            type: DirectoryOrCreate
{{- end }}
{{- if $mtprotoOfficialFallbackEnabled }}
        - name: mtproxy-work
          emptyDir:
            sizeLimit: 16Mi
{{- end }}
        - name: private-profiles
          secret:
            secretName: {{ include "tracegate.privateProfilesSecretName" $ }}
            optional: {{ not $.Values.privateProfiles.required }}
            defaultMode: {{ int $.Values.privateProfiles.defaultMode }}
            items:
              - key: {{ $roleRealitySecretKey }}
                path: {{ $roleRealityKey }}
              - key: {{ $roleHysteriaSalamanderSecretKey }}
                path: {{ $roleHysteriaSalamanderKey }}
              - key: {{ $roleHysteriaStatsSecretKey }}
                path: {{ $roleHysteriaStatsKey }}
{{- if $endpointBackhaulHysteriaEnabled }}
              - key: {{ $endpointBackhaulAuthSecretKey }}
                path: {{ $endpointBackhaulAuthKey }}
{{- end }}
{{- if $roleEndpointBackhaulHysteriaClientEnabled }}
              - key: {{ $.Values.privateProfiles.secretKeys.hysteriaSalamanderTransit }}
                path: {{ $.Values.privateProfiles.keys.hysteriaSalamanderTransit }}
{{- end }}
{{- if $.Values.interconnect.emergencyXrayChain.enabled }}
              - key: {{ $.Values.privateProfiles.secretKeys.xrayChainBridgeClientId }}
                path: {{ $.Values.privateProfiles.keys.xrayChainBridgeClientId }}
{{- end }}
{{- if $roleLinkCryptoClientEnabled }}
              - key: {{ $.Values.privateProfiles.secretKeys.shadowsocks2022LinkClient }}
                path: {{ $.Values.privateProfiles.keys.shadowsocks2022LinkClient }}
{{- end }}
{{- if $roleLinkCryptoServerEnabled }}
              - key: {{ $.Values.privateProfiles.secretKeys.shadowsocks2022LinkServer }}
                path: {{ $.Values.privateProfiles.keys.shadowsocks2022LinkServer }}
{{- end }}
{{- if $.Values.interconnect.zapret2.enabled }}
              - key: {{ $roleZapretSecretKey }}
                path: {{ $roleZapretKey }}
{{- if and $roleIsEndpoint $.Values.mtproto.enabled }}
              - key: {{ $.Values.privateProfiles.secretKeys.zapretMtproto }}
                path: {{ $.Values.privateProfiles.keys.zapretMtproto }}
{{- end }}
{{- end }}
{{- if $.Values.shadowsocks2022.enabled }}
              - key: {{ $roleShadowsocks2022SecretKey }}
                path: {{ $roleShadowsocks2022Key }}
              - key: {{ $roleShadowsocks2022PasswordSecretKey }}
                path: {{ $roleShadowsocks2022PasswordKey }}
              - key: {{ $roleShadowtlsSecretKey }}
                path: {{ $roleShadowtlsKey }}
              - key: {{ $roleShadowtlsPasswordSecretKey }}
                path: {{ $roleShadowtlsPasswordKey }}
{{- end }}
{{- if and $mtprotoEgressShadowtlsEnabled (or $roleIsEntry (not $.Values.shadowsocks2022.enabled)) }}
              - key: {{ $mtprotoEgressShadowtlsPasswordSecretKey }}
                path: {{ $mtprotoEgressShadowtlsPasswordKey }}
{{- end }}
{{- if and $roleIsEndpoint $.Values.wireguard.enabled }}
              - key: {{ $.Values.privateProfiles.secretKeys.wireguard }}
                path: {{ $.Values.privateProfiles.keys.wireguard }}
{{- end }}
{{- if $mtprotoRuntimeRoleEnabled }}
              - key: {{ $.Values.privateProfiles.secretKeys.mtproto }}
                path: {{ $.Values.privateProfiles.keys.mtproto }}
{{- end }}
{{- if $labDirectRestlsEnabled }}
