          command:
            - sh
            - -lc
            - |
              set -eu
              until {{ $roleLinkCryptoReadyTest }}; do sleep 2; done
{{- if eq $roleName "entry" }}
              exec wstunnel client -L "tcp://127.0.0.1:{{ int $linkOuterCarrier.clientLocalPort }}:127.0.0.1:{{ int $.Values.interconnect.mieru.localSocks.transitPort }}" "wss://{{ $linkOuterCarrier.serverName }}:{{ int $linkOuterCarrier.publicPort }}{{ $linkOuterCarrier.publicPath }}"
{{- else }}
              exec wstunnel server "ws://127.0.0.1:{{ int $linkOuterCarrier.serverLocalPort }}" --restrict-to "127.0.0.1:{{ int $.Values.interconnect.mieru.localSocks.transitPort }}"
{{- end }}
          env:
            - name: TRACEGATE_LINK_CRYPTO_ROLE
              value: {{ $role.role | quote }}
            - name: TRACEGATE_LINK_CRYPTO_STATE_JSON
              value: {{ $roleLinkCryptoState | quote }}
            - name: TRACEGATE_LINK_CRYPTO_STATE_ENV
              value: {{ $roleLinkCryptoEnv | quote }}
            - name: TRACEGATE_LINK_CRYPTO_RELOAD_MARKER
              value: {{ $roleLinkCryptoReloadMarker | quote }}
            - name: TRACEGATE_LINK_CRYPTO_OUTER_CARRIER
              value: "wss"
            - name: TRACEGATE_LINK_CRYPTO_OUTER_WSS_URL
              value: {{ printf "wss://%s:%d%s" (toString $linkOuterCarrier.serverName) (int $linkOuterCarrier.publicPort) (toString $linkOuterCarrier.publicPath) | quote }}
{{- with $.Values.gateway.containerResources.wstunnel }}
          resources:
            {{- toYaml . | nindent 12 }}
{{- end }}
          volumeMounts:
            - name: gateway-state
              mountPath: /var/lib/tracegate
              readOnly: true
{{- end }}
{{- if $.Values.interconnect.zapret2.enabled }}
{{- $zapretProfileKey := ternary $.Values.privateProfiles.keys.zapretEntry $.Values.privateProfiles.keys.zapretTransit (eq $roleName "entry") }}
        - name: zapret2
          image: {{ include "tracegate.image" $.Values.gateway.images.zapret2 | quote }}
          imagePullPolicy: {{ $.Values.gateway.images.zapret2.pullPolicy }}
          securityContext:
            capabilities:
              add: ["NET_ADMIN", "NET_RAW"]
          command:
            - sh
            - -lc
            - |
              set -eu
              until [ -s /var/lib/tracegate/runtime/runtime-contract.json ]; do sleep 2; done
              status_dir="/tmp/tracegate-zapret2-status"
              rm -rf "${status_dir}"
              mkdir -p "${status_dir}"
              pids=""
              profile_count=0
              shutdown_zapret_profiles() {
                kill ${pids} 2>/dev/null || true
                wait ${pids} 2>/dev/null || true
              }
              start_zapret_profile() {
                profile="$1"
                [ -s "${profile}" ] || return 0
                profile_count=$((profile_count + 1))
                status_file="${status_dir}/${profile_count}.status"
                (
                  set +e
                  zapret --config "${profile}" &
                  child_pid="$!"
                  trap 'kill "${child_pid}" 2>/dev/null || true; wait "${child_pid}" 2>/dev/null || true; exit 143' TERM INT
                  wait "${child_pid}"
                  code="$?"
                  printf '%s\n' "${code}" > "${status_file}"
                  exit "${code}"
                ) &
                pids="${pids} $!"
              }
              trap 'shutdown_zapret_profiles; exit 143' TERM INT
              start_zapret_profile "{{ $.Values.privateProfiles.mountPath }}/{{ $zapretProfileKey }}"
{{- if $linkZapretProfileEnabled }}
              start_zapret_profile "{{ $.Values.privateProfiles.mountPath }}/{{ $.Values.privateProfiles.keys.zapretInterconnect }}"
{{- end }}
{{- if and (eq $roleName "transit") $.Values.mtproto.enabled }}
              start_zapret_profile "{{ $.Values.privateProfiles.mountPath }}/{{ $.Values.privateProfiles.keys.zapretMtproto }}"
{{- end }}
              if [ "${profile_count}" -eq 0 ]; then
                echo "tracegate zapret2: no scoped profiles started"
                while :; do sleep 3600; done
              fi
              while :; do
                for status_file in "${status_dir}"/*.status; do
                  [ -f "${status_file}" ] || continue
                  code="$(cat "${status_file}" 2>/dev/null || echo 1)"
                  shutdown_zapret_profiles
                  exit "${code:-1}"
                done
                sleep 2
              done
{{- with $.Values.gateway.containerResources.zapret2 }}
          resources:
