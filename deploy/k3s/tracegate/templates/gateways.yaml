            - {{ $.Values.privateProfiles.keys.shadowsocks2022LinkClient | quote }}
{{- end }}
{{- if $roleLinkCryptoServerEnabled }}
            - --required-file
            - {{ $.Values.privateProfiles.keys.shadowsocks2022LinkServer | quote }}
{{- end }}
{{- if $.Values.shadowsocks2022.enabled }}
