{{- end }}
{{- if $.Values.shadowsocks2022.enabled }}
        - name: shadowtls-v3
          image: {{ include "tracegate.image" $.Values.gateway.images.shadowtls | quote }}
          imagePullPolicy: {{ $.Values.gateway.images.shadowtls.pullPolicy }}
          command:
            - sh
            - -lc
            - |
              set -eu
              password_file="{{ $.Values.privateProfiles.mountPath }}/{{ $roleShadowtlsPasswordKey }}"
              until {{ $roleProfileReadyTest }} && [ -s "${password_file}" ]; do sleep 2; done
              password="$(tr -d '\r\n' < "${password_file}")"
              exec shadow-tls --v3 server \
                --listen "127.0.0.1:{{ int $.Values.shadowsocks2022.shadowtls.listenPort }}" \
                --server "127.0.0.1:{{ int $.Values.shadowsocks2022.listenPort }}" \
                --tls "{{ $roleShadowtlsServerName }}:443" \
                --password "${password}"
          env:
            - name: TRACEGATE_PROFILE_ROLE
              value: {{ $roleAgentRole | quote }}
            - name: TRACEGATE_PROFILE_STATE_JSON
              value: {{ $roleProfileState | quote }}
            - name: TRACEGATE_PROFILE_STATE_ENV
              value: {{ $roleProfileEnv | quote }}
            - name: TRACEGATE_PROFILE_RELOAD_MARKER
              value: {{ $roleProfileReloadMarker | quote }}
{{- with (index $roleContainerResources "shadowtls") }}
          resources:
            {{- toYaml . | nindent 12 }}
{{- end }}
          volumeMounts:
            - name: private-profiles
              mountPath: {{ $.Values.privateProfiles.mountPath }}
              readOnly: true
            - name: gateway-state
              mountPath: /var/lib/tracegate
              readOnly: true
{{- end }}
{{- if $mtprotoEgressShadowtlsEnabled }}
        - name: mtproto-egress-shadowtls
          image: {{ include "tracegate.image" $.Values.gateway.images.shadowtls | quote }}
          imagePullPolicy: {{ $.Values.gateway.images.shadowtls.pullPolicy }}
          command:
            - sh
            - -lc
            - |
              set -eu
              password_file="{{ $.Values.privateProfiles.mountPath }}/{{ $mtprotoEgressShadowtlsPasswordKey }}"
              until [ -s "${password_file}" ]; do sleep 2; done
              password="$(tr -d '\r\n' < "${password_file}")"
{{- if $roleIsEntry }}
              exec shadow-tls --v3 client \
                --listen "127.0.0.1:{{ $mtprotoEgressSocksPort }}" \
                --server "{{ required "mtproto.egress.shadowtls.endpointHost or topology.servers.endpoint.publicIp is required" $mtprotoEgressShadowtlsEndpointHost }}:{{ $mtprotoEgressShadowtlsEndpointPort }}" \
                --sni "{{ $mtprotoEgressShadowtlsServerName }}" \
                --password "${password}"
{{- else }}
              exec shadow-tls --v3 server \
                --listen "127.0.0.1:{{ $mtprotoEgressShadowtlsServerListenPort }}" \
                --server "127.0.0.1:{{ $mtprotoEgressShadowtlsEndpointSocksPort }}" \
                --tls "{{ $mtprotoEgressShadowtlsServerName }}:443" \
                --password "${password}"
{{- end }}
{{- with (index $roleContainerResources "shadowtls") }}
          resources:
            {{- toYaml . | nindent 12 }}
{{- end }}
          volumeMounts:
            - name: private-profiles
              mountPath: {{ $.Values.privateProfiles.mountPath }}
              readOnly: true
{{- end }}
{{- if and $roleIsEndpoint $.Values.wireguard.enabled $.Values.wireguard.wstunnel.enabled }}
        - name: wireguard
          image: {{ include "tracegate.image" $.Values.gateway.images.wireguard | quote }}
          imagePullPolicy: {{ $.Values.gateway.images.wireguard.pullPolicy }}
          securityContext:
            capabilities:
              add: ["NET_ADMIN", "NET_RAW"]
          command:
            - sh
            - -lc
            - |
              set -eu
              until {{ $roleProfileReadyTest }}; do sleep 2; done
              wg-quick up {{ $.Values.privateProfiles.mountPath }}/{{ $.Values.privateProfiles.keys.wireguard }}
              wireguard_client_cidr={{ toString $.Values.wireguard.clientCidr | quote }}
              wireguard_out_if="$(ip route show default | awk '{print $5; exit}')"
              setup_wireguard_egress() {
                [ -n "$wireguard_client_cidr" ] || return 0
                [ -n "$wireguard_out_if" ] || return 0
                command -v iptables >/dev/null 2>&1
                iptables -t nat -C POSTROUTING -s "$wireguard_client_cidr" -o "$wireguard_out_if" -j MASQUERADE 2>/dev/null || \
                  iptables -t nat -A POSTROUTING -s "$wireguard_client_cidr" -o "$wireguard_out_if" -j MASQUERADE
                iptables -C FORWARD -i wg -o "$wireguard_out_if" -j ACCEPT 2>/dev/null || \
                  iptables -A FORWARD -i wg -o "$wireguard_out_if" -j ACCEPT
                iptables -C FORWARD -i "$wireguard_out_if" -o wg -m conntrack --ctstate RELATED,ESTABLISHED -j ACCEPT 2>/dev/null || \
                  iptables -A FORWARD -i "$wireguard_out_if" -o wg -m conntrack --ctstate RELATED,ESTABLISHED -j ACCEPT
              }
              teardown_wireguard_egress() {
                [ -n "$wireguard_client_cidr" ] || return 0
                [ -n "$wireguard_out_if" ] || return 0
                command -v iptables >/dev/null 2>&1 || return 0
                while iptables -t nat -D POSTROUTING -s "$wireguard_client_cidr" -o "$wireguard_out_if" -j MASQUERADE 2>/dev/null; do :; done
                while iptables -D FORWARD -i wg -o "$wireguard_out_if" -j ACCEPT 2>/dev/null; do :; done
                while iptables -D FORWARD -i "$wireguard_out_if" -o wg -m conntrack --ctstate RELATED,ESTABLISHED -j ACCEPT 2>/dev/null; do :; done
              }
              setup_wireguard_egress
              teardown_wireguard() {
                teardown_wireguard_egress
                wg-quick down {{ $.Values.privateProfiles.mountPath }}/{{ $.Values.privateProfiles.keys.wireguard }} || true
              }
              trap 'teardown_wireguard; exit 0' TERM INT
              while :; do sleep 3600 & wait "$!"; done
          env:
            - name: TRACEGATE_PROFILE_ROLE
              value: {{ $roleAgentRole | quote }}
            - name: TRACEGATE_PROFILE_STATE_JSON
              value: {{ $roleProfileState | quote }}
            - name: TRACEGATE_PROFILE_STATE_ENV
              value: {{ $roleProfileEnv | quote }}
            - name: TRACEGATE_PROFILE_RELOAD_MARKER
              value: {{ $roleProfileReloadMarker | quote }}
{{- with (index $roleContainerResources "wireguard") }}
          resources:
            {{- toYaml . | nindent 12 }}
{{- end }}
          volumeMounts:
            - name: private-profiles
              mountPath: {{ $.Values.privateProfiles.mountPath }}
              readOnly: true
            - name: gateway-state
              mountPath: /var/lib/tracegate
              readOnly: true
        - name: wireguard-sync
          image: {{ include "tracegate.image" $.Values.global.image | quote }}
          imagePullPolicy: {{ $.Values.global.image.pullPolicy }}
          securityContext:
            capabilities:
              add: ["NET_ADMIN", "NET_RAW"]
          command: ["tracegate-wireguard-sync-runner"]
          env:
            - name: WIREGUARD_SYNC_STATE
              value: {{ $roleProfileState | quote }}
            - name: WIREGUARD_SYNC_INTERFACE
              value: "wg"
            - name: WIREGUARD_SYNC_INTERVAL_SECONDS
              value: "2"
            - name: WIREGUARD_SYNC_KEEP_STALE_PEERS
              value: "false"
{{- with (index $roleContainerResources "wireguardSync") }}
          resources:
            {{- toYaml . | nindent 12 }}
{{- end }}
          volumeMounts:
            - name: gateway-state
              mountPath: /var/lib/tracegate
              readOnly: true
        - name: wstunnel-wireguard
          image: {{ include "tracegate.image" $.Values.gateway.images.wstunnel | quote }}
          imagePullPolicy: {{ $.Values.gateway.images.wstunnel.pullPolicy }}
          command: ["sh", "-lc", "until {{ $roleProfileReadyTest }}; do sleep 2; done; /home/app/wstunnel server ws://127.0.0.1:{{ int $.Values.wireguard.wstunnel.websocketPort }} --restrict-to 127.0.0.1:{{ int $.Values.wireguard.wstunnel.localWireguardPort }}"]
          env:
            - name: TRACEGATE_PROFILE_ROLE
              value: {{ $roleAgentRole | quote }}
            - name: TRACEGATE_PROFILE_STATE_JSON
              value: {{ $roleProfileState | quote }}
            - name: TRACEGATE_PROFILE_STATE_ENV
              value: {{ $roleProfileEnv | quote }}
            - name: TRACEGATE_PROFILE_RELOAD_MARKER
              value: {{ $roleProfileReloadMarker | quote }}
{{- with (index $roleContainerResources "wstunnel") }}
          resources:
            {{- toYaml . | nindent 12 }}
{{- end }}
          volumeMounts:
            - name: private-profiles
              mountPath: {{ $.Values.privateProfiles.mountPath }}
              readOnly: true
            - name: gateway-state
              mountPath: /var/lib/tracegate
              readOnly: true
{{- end }}
