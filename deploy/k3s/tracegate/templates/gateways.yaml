{{- if $roleEntryTrafficShaperEnabled }}
        - name: entry-traffic-shaper
          image: {{ include "tracegate.image" $.Values.global.image | quote }}
          imagePullPolicy: {{ $.Values.global.image.pullPolicy }}
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          command:
            - sh
            - -lc
            - |
              set -eu
              iface="{{ $.Values.gateway.trafficShaping.entry.interface }}"
              max_mbit="{{ int $.Values.gateway.trafficShaping.entry.maxMbit }}"
              burst_kbit="{{ int $.Values.gateway.trafficShaping.entry.burstKbit }}"
              rate="${max_mbit}mbit"
              burst_bytes=$((burst_kbit * 1000 / 8))
              cleanup_on_exit="{{ $.Values.gateway.trafficShaping.entry.cleanupOnExit }}"
              fail_closed="{{ $.Values.gateway.trafficShaping.entry.failClosed }}"

              run_tc() {
                "$@" || {
                  code="$?"
                  echo "entry traffic shaping command failed: $*" >&2
                  if [ "${fail_closed}" = "true" ]; then
                    exit "${code}"
                  fi
                  return 0
                }
              }

              cleanup() {
                if [ "${cleanup_on_exit}" = "true" ]; then
                  tc qdisc del dev "${iface}" root 2>/dev/null || true
                  tc qdisc del dev "${iface}" ingress 2>/dev/null || true
                fi
                exit 0
              }
              trap cleanup TERM INT

              if ! ip link show dev "${iface}" >/dev/null 2>&1; then
                echo "Entry traffic shaping interface not found: ${iface}" >&2
                exit 1
              fi

{{- if $.Values.gateway.trafficShaping.entry.applyEgress }}
              tc qdisc del dev "${iface}" root 2>/dev/null || true
              run_tc tc qdisc add dev "${iface}" root handle 1: htb default 10
              run_tc tc class add dev "${iface}" parent 1: classid 1:10 htb rate "${rate}" ceil "${rate}" burst "${burst_bytes}b" cburst "${burst_bytes}b"
              tc qdisc add dev "${iface}" parent 1:10 fq_codel 2>/dev/null || run_tc tc qdisc add dev "${iface}" parent 1:10 pfifo limit 1000
{{- end }}
{{- if $.Values.gateway.trafficShaping.entry.applyIngressPolicing }}
              tc qdisc del dev "${iface}" ingress 2>/dev/null || true
              run_tc tc qdisc add dev "${iface}" handle ffff: ingress
              run_tc tc filter add dev "${iface}" parent ffff: protocol ip pref 10 u32 match u32 0 0 police rate "${rate}" burst "${burst_bytes}b" drop flowid :1
              tc filter add dev "${iface}" parent ffff: protocol ipv6 pref 10 u32 match u32 0 0 police rate "${rate}" burst "${burst_bytes}b" drop flowid :1 2>/dev/null \
                || echo "Entry IPv6 ingress policing unavailable on ${iface}; continuing with IPv4 ingress policing" >&2
{{- end }}
              echo "Entry traffic shaping active on ${iface}: ${rate} egress + ingress police"
              while :; do
{{- if $.Values.gateway.trafficShaping.entry.applyEgress }}
                tc qdisc show dev "${iface}" | grep -q "htb 1:" || { echo "Entry egress qdisc disappeared" >&2; exit 1; }
{{- end }}
{{- if $.Values.gateway.trafficShaping.entry.applyIngressPolicing }}
                tc qdisc show dev "${iface}" | grep -q "ffff:" || { echo "Entry ingress qdisc disappeared" >&2; exit 1; }
{{- end }}
                sleep 3600 & wait "$!"
              done
{{- with (index $roleContainerResources "entryTrafficShaper") }}
          resources:
            {{- toYaml . | nindent 12 }}
{{- end }}
{{- end }}
{{- if $roleLinkCryptoEnabled }}
