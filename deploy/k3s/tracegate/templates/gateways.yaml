            - {{ $.Values.privateProfiles.keys.wireguard | quote }}
{{- end }}
{{- if $mtprotoRuntimeRoleEnabled }}
            - --required-file
            - {{ $.Values.privateProfiles.keys.mtproto | quote }}
{{- end }}
{{- if $labDirectRestlsEnabled }}
            - --required-file
            - {{ $.Values.privateProfiles.keys.labRestlsDirect | quote }}
{{- end }}
{{- if $labTuicRoleEnabled }}
            - --required-file
            - {{ $roleLabTuicKey | quote }}
{{- end }}
{{- if $.Values.interconnect.zapret2.enabled }}
            - --zapret-file
            - {{ $roleZapretKey | quote }}
{{- if and $roleIsEndpoint $.Values.mtproto.enabled }}
