          image: {{ include "tracegate.image" $.Values.gateway.images.singbox | quote }}
          imagePullPolicy: {{ $.Values.gateway.images.singbox.pullPolicy }}
          command:
            - sh
            - -lc
            - |
              set -eu
              until {{ $roleLinkCryptoReadyTest }}; do sleep 2; done
              status_dir="/tmp/tracegate-sing-box-link-crypto-status"
              rm -rf "${status_dir}"
              mkdir -p "${status_dir}"
              pids=""
              profile_count=0
              shutdown_link_crypto_profiles() {
                kill ${pids} 2>/dev/null || true
                wait ${pids} 2>/dev/null || true
              }
              start_link_crypto_profile() {
                profile="$1"
                [ -s "${profile}" ] || return 0
                profile_count=$((profile_count + 1))
                status_file="${status_dir}/${profile_count}.status"
                (
                  set +e
                  sing-box run -c "${profile}" &
                  child_pid="$!"
                  trap 'kill "${child_pid}" 2>/dev/null || true; wait "${child_pid}" 2>/dev/null || true; exit 143' TERM INT
                  wait "${child_pid}"
                  code="$?"
                  printf '%s\n' "${code}" > "${status_file}"
                  exit "${code}"
                ) &
                pids="${pids} $!"
              }
              trap 'shutdown_link_crypto_profiles; exit 143' TERM INT
{{- if $roleLinkCryptoClientEnabled }}
              start_link_crypto_profile "{{ printf "%s/%s" $.Values.privateProfiles.mountPath $.Values.privateProfiles.keys.shadowsocks2022LinkClient }}"
{{- end }}
{{- if $roleLinkCryptoServerEnabled }}
              start_link_crypto_profile "{{ printf "%s/%s" $.Values.privateProfiles.mountPath $.Values.privateProfiles.keys.shadowsocks2022LinkServer }}"
{{- end }}
              if [ "${profile_count}" -eq 0 ]; then
                echo "tracegate link-crypto: no link-crypto profiles started"
                while :; do sleep 3600; done
              fi
              while :; do
                for status_file in "${status_dir}"/*.status; do
                  [ -f "${status_file}" ] || continue
                  code="$(cat "${status_file}" 2>/dev/null || echo 1)"
                  shutdown_link_crypto_profiles
                  exit "${code:-1}"
