            - name: PRIVATE_LINK_CRYPTO_OUTER_WSS_SERVER_PORT
              value: {{ $linkOuterCarrier.serverLocalPort | quote }}
            - name: PRIVATE_LINK_CRYPTO_OUTER_WSS_VERIFY_TLS
              value: {{ $linkOuterCarrier.verifyTls | quote }}
            - name: PRIVATE_LINK_CRYPTO_ZAPRET2_ENABLED
              value: {{ $.Values.interconnect.zapret2.enabled | quote }}
            - name: MTPROTO_DOMAIN
              value: {{ ($.Values.mtproto.domain | default $.Values.controlPlane.env.mtprotoDomain) | quote }}
          volumeMounts:
            - name: gateway-state
              mountPath: /var/lib/tracegate
            - name: runtime-contract
              mountPath: /etc/tracegate/runtime-contract
              readOnly: true
            - name: private-profiles
              mountPath: {{ $.Values.privateProfiles.mountPath }}
              readOnly: true
        - name: haproxy
          image: {{ include "tracegate.image" $.Values.gateway.images.haproxy | quote }}
          imagePullPolicy: {{ $.Values.gateway.images.haproxy.pullPolicy }}
          command: ["haproxy", "-W", "-db", "-f", "/usr/local/etc/haproxy/haproxy.cfg"]
{{- with $.Values.gateway.containerResources.haproxy }}
          resources:
            {{- toYaml . | nindent 12 }}
{{- end }}
          ports:
            - name: https
              containerPort: {{ int $role.ports.publicTcp }}
              protocol: TCP
{{- if $.Values.gateway.probes.enabled }}
          startupProbe:
            exec:
              command: ["sh", "-lc", "test -s /usr/local/etc/haproxy/haproxy.cfg"]
            periodSeconds: {{ int $.Values.gateway.probes.startup.periodSeconds }}
            failureThreshold: {{ int $.Values.gateway.probes.startup.failureThreshold }}
            timeoutSeconds: {{ int $.Values.gateway.probes.startup.timeoutSeconds }}
          readinessProbe:
            tcpSocket:
              port: https
            periodSeconds: {{ int $.Values.gateway.probes.readiness.periodSeconds }}
            failureThreshold: {{ int $.Values.gateway.probes.readiness.failureThreshold }}
            timeoutSeconds: {{ int $.Values.gateway.probes.readiness.timeoutSeconds }}
          livenessProbe:
            exec:
              command: ["sh", "-lc", "test -s /usr/local/etc/haproxy/haproxy.cfg"]
            periodSeconds: {{ int $.Values.gateway.probes.liveness.periodSeconds }}
            failureThreshold: {{ int $.Values.gateway.probes.liveness.failureThreshold }}
            timeoutSeconds: {{ int $.Values.gateway.probes.liveness.timeoutSeconds }}
{{- end }}
          volumeMounts:
            - name: gateway-state
              mountPath: /usr/local/etc/haproxy
              subPath: runtime/haproxy
        - name: nginx
          image: {{ include "tracegate.image" $.Values.gateway.images.nginx | quote }}
          imagePullPolicy: {{ $.Values.gateway.images.nginx.pullPolicy }}
          command: ["nginx", "-g", "daemon off;", "-c", "/etc/nginx/nginx.conf"]
{{- with $.Values.gateway.containerResources.nginx }}
          resources:
            {{- toYaml . | nindent 12 }}
{{- end }}
          {{- if eq $roleName "transit" }}
          ports:
            - name: http
              containerPort: {{ int ($role.ports.publicHttp | default 80) }}
              protocol: TCP
          {{- end }}
{{- if $.Values.gateway.probes.enabled }}
          startupProbe:
            exec:
              command: ["sh", "-lc", "test -s /etc/nginx/nginx.conf"]
            periodSeconds: {{ int $.Values.gateway.probes.startup.periodSeconds }}
            failureThreshold: {{ int $.Values.gateway.probes.startup.failureThreshold }}
            timeoutSeconds: {{ int $.Values.gateway.probes.startup.timeoutSeconds }}
          readinessProbe:
            exec:
              command: ["sh", "-lc", "test -s /etc/nginx/nginx.conf"]
            periodSeconds: {{ int $.Values.gateway.probes.readiness.periodSeconds }}
            failureThreshold: {{ int $.Values.gateway.probes.readiness.failureThreshold }}
            timeoutSeconds: {{ int $.Values.gateway.probes.readiness.timeoutSeconds }}
          livenessProbe:
            exec:
              command: ["sh", "-lc", "test -s /etc/nginx/nginx.conf"]
            periodSeconds: {{ int $.Values.gateway.probes.liveness.periodSeconds }}
            failureThreshold: {{ int $.Values.gateway.probes.liveness.failureThreshold }}
            timeoutSeconds: {{ int $.Values.gateway.probes.liveness.timeoutSeconds }}
{{- end }}
          volumeMounts:
            - name: gateway-state
              mountPath: /etc/nginx/nginx.conf
              subPath: runtime/nginx/nginx.conf
            - name: decoy
              mountPath: {{ $.Values.decoy.mountPath }}
              readOnly: true
            - name: tls
              mountPath: /etc/tracegate/tls
              readOnly: true
        - name: xray
          image: {{ include "tracegate.image" $.Values.gateway.images.xray | quote }}
          imagePullPolicy: {{ $.Values.gateway.images.xray.pullPolicy }}
          command: ["xray", "run", "-c", "/etc/xray/config.json"]
{{- with $.Values.gateway.containerResources.xray }}
          resources:
            {{- toYaml . | nindent 12 }}
{{- end }}
          ports:
            - name: reality
              containerPort: {{ int $role.ports.reality }}
              protocol: TCP
            - name: hy2
              containerPort: {{ int $role.ports.publicUdp }}
              protocol: UDP
{{- if $.Values.gateway.probes.enabled }}
          startupProbe:
            exec:
              command: ["sh", "-lc", "test -s /etc/xray/config.json"]
            periodSeconds: {{ int $.Values.gateway.probes.startup.periodSeconds }}
            failureThreshold: {{ int $.Values.gateway.probes.startup.failureThreshold }}
            timeoutSeconds: {{ int $.Values.gateway.probes.startup.timeoutSeconds }}
          readinessProbe:
            exec:
              command: ["sh", "-lc", "test -s /etc/xray/config.json"]
            periodSeconds: {{ int $.Values.gateway.probes.readiness.periodSeconds }}
            failureThreshold: {{ int $.Values.gateway.probes.readiness.failureThreshold }}
            timeoutSeconds: {{ int $.Values.gateway.probes.readiness.timeoutSeconds }}
          livenessProbe:
            exec:
              command: ["sh", "-lc", "test -s /etc/xray/config.json"]
            periodSeconds: {{ int $.Values.gateway.probes.liveness.periodSeconds }}
            failureThreshold: {{ int $.Values.gateway.probes.liveness.failureThreshold }}
            timeoutSeconds: {{ int $.Values.gateway.probes.liveness.timeoutSeconds }}
{{- end }}
          volumeMounts:
