{{- range $roleName, $role := .Values.gateway.roles }}
{{- if and $.Values.gateway.enabled $role.enabled }}
{{- $roleRealityKey := ternary $.Values.privateProfiles.keys.realityPrivateKeyEntry $.Values.privateProfiles.keys.realityPrivateKeyTransit (eq $roleName "entry") }}
{{- $roleRealitySecretKey := ternary $.Values.privateProfiles.secretKeys.realityPrivateKeyEntry $.Values.privateProfiles.secretKeys.realityPrivateKeyTransit (eq $roleName "entry") }}
{{- $roleHysteriaKey := ternary $.Values.privateProfiles.keys.hysteriaAuthEntry $.Values.privateProfiles.keys.hysteriaAuthTransit (eq $roleName "entry") }}
{{- $roleHysteriaSecretKey := ternary $.Values.privateProfiles.secretKeys.hysteriaAuthEntry $.Values.privateProfiles.secretKeys.hysteriaAuthTransit (eq $roleName "entry") }}
{{- $roleZapretKey := ternary $.Values.privateProfiles.keys.zapretEntry $.Values.privateProfiles.keys.zapretTransit (eq $roleName "entry") }}
{{- $roleZapretSecretKey := ternary $.Values.privateProfiles.secretKeys.zapretEntry $.Values.privateProfiles.secretKeys.zapretTransit (eq $roleName "entry") }}
{{- $roleShadowsocks2022Key := ternary $.Values.privateProfiles.keys.shadowsocks2022Entry $.Values.privateProfiles.keys.shadowsocks2022Transit (eq $roleName "entry") }}
{{- $roleShadowsocks2022SecretKey := ternary $.Values.privateProfiles.secretKeys.shadowsocks2022Entry $.Values.privateProfiles.secretKeys.shadowsocks2022Transit (eq $roleName "entry") }}
{{- $roleShadowtlsKey := ternary $.Values.privateProfiles.keys.shadowtlsEntry $.Values.privateProfiles.keys.shadowtlsTransit (eq $roleName "entry") }}
{{- $roleShadowtlsSecretKey := ternary $.Values.privateProfiles.secretKeys.shadowtlsEntry $.Values.privateProfiles.secretKeys.shadowtlsTransit (eq $roleName "entry") }}
{{- $roleLabTuicKey := ternary $.Values.privateProfiles.keys.labTuicEntry $.Values.privateProfiles.keys.labTuicTransit (eq $roleName "entry") }}
{{- $roleLabTuicSecretKey := ternary $.Values.privateProfiles.secretKeys.labTuicEntry $.Values.privateProfiles.secretKeys.labTuicTransit (eq $roleName "entry") }}
{{- $roleProfileState := printf "/var/lib/tracegate/private/profiles/%s/desired-state.json" $roleName }}
{{- $roleProfileEnv := printf "/var/lib/tracegate/private/profiles/%s/desired-state.env" $roleName }}
{{- $roleLinkCryptoState := printf "/var/lib/tracegate/private/link-crypto/%s/desired-state.json" $roleName }}
{{- $roleLinkCryptoEnv := printf "/var/lib/tracegate/private/link-crypto/%s/desired-state.env" $roleName }}
{{- $roleProfileReloadMarker := printf "/var/lib/tracegate/private/runtime/profiles-%s-last-reload.json" $roleName }}
{{- $roleLinkCryptoReloadMarker := printf "/var/lib/tracegate/private/runtime/link-crypto-%s-last-reload.json" $roleName }}
{{- $roleProfileMarkerTest := printf "grep -q '\\\"schema\\\": \\\"tracegate.k3s-private-reload.v1\\\"' %s && grep -q '\\\"summarySchema\\\": \\\"tracegate.k3s-private-reload-summary.v1\\\"' %s && grep -q '\\\"component\\\": \\\"profiles\\\"' %s && grep -q '\\\"role\\\": \\\"%s\\\"' %s && grep -q '\\\"auth\\\": \\\"required\\\"' %s && grep -q '\\\"allowAnonymousLocalhost\\\": false' %s" $roleProfileReloadMarker $roleProfileReloadMarker $roleProfileReloadMarker $role.role $roleProfileReloadMarker $roleProfileReloadMarker $roleProfileReloadMarker }}
{{- $roleLinkCryptoMarkerTest := printf "grep -q '\\\"schema\\\": \\\"tracegate.k3s-private-reload.v1\\\"' %s && grep -q '\\\"summarySchema\\\": \\\"tracegate.k3s-private-reload-summary.v1\\\"' %s && grep -q '\\\"component\\\": \\\"link-crypto\\\"' %s && grep -q '\\\"role\\\": \\\"%s\\\"' %s && grep -q '\\\"private-profile\\\"' %s" $roleLinkCryptoReloadMarker $roleLinkCryptoReloadMarker $roleLinkCryptoReloadMarker $role.role $roleLinkCryptoReloadMarker $roleLinkCryptoReloadMarker }}
{{- $roleProfileReadyTest := printf "[ -s %s ] && [ -s %s ] && [ -s %s ] && [ ! %s -nt %s ] && [ ! %s -nt %s ] && %s" $roleProfileState $roleProfileEnv $roleProfileReloadMarker $roleProfileState $roleProfileReloadMarker $roleProfileEnv $roleProfileReloadMarker $roleProfileMarkerTest }}
{{- $roleLinkCryptoReadyTest := printf "[ -s %s ] && [ -s %s ] && [ -s %s ] && [ ! %s -nt %s ] && [ ! %s -nt %s ] && %s" $roleLinkCryptoState $roleLinkCryptoEnv $roleLinkCryptoReloadMarker $roleLinkCryptoState $roleLinkCryptoReloadMarker $roleLinkCryptoEnv $roleLinkCryptoReloadMarker $roleLinkCryptoMarkerTest }}
{{- $labDirectMieruEnabled := and (eq $roleName "transit") $.Values.experimentalProfiles.enabled $.Values.experimentalProfiles.directTransitObfuscation.enabled $.Values.experimentalProfiles.directTransitObfuscation.mieru.enabled }}
{{- $labDirectRestlsEnabled := and (eq $roleName "transit") $.Values.experimentalProfiles.enabled $.Values.experimentalProfiles.directTransitObfuscation.enabled $.Values.experimentalProfiles.directTransitObfuscation.restls.enabled }}
{{- $labTuicRoleEnabled := and $.Values.experimentalProfiles.enabled $.Values.experimentalProfiles.tuicV5.enabled (or (and (eq $roleName "transit") $.Values.experimentalProfiles.tuicV5.directEnabled) $.Values.experimentalProfiles.tuicV5.chainEnabled) }}
{{- $roleLinkCryptoClientEnabled := and $.Values.interconnect.mieru.enabled $.Values.interconnect.entryTransit.enabled (eq $roleName "entry") }}
{{- $roleLinkCryptoServerEnabled := and $.Values.interconnect.mieru.enabled (or (and (eq $roleName "transit") $.Values.interconnect.entryTransit.enabled) (and (eq $roleName "entry") $.Values.interconnect.entryTransit.routerEntry.enabled) (and (eq $roleName "transit") $.Values.interconnect.entryTransit.routerTransit.enabled)) }}
{{- $roleLinkCryptoEnabled := or $roleLinkCryptoClientEnabled $roleLinkCryptoServerEnabled }}
{{- $linkOuterCarrier := $.Values.interconnect.entryTransit.outerCarrier }}
{{- $linkWssCarrierEnabled := and $.Values.interconnect.entryTransit.enabled $linkOuterCarrier.enabled (eq (toString $linkOuterCarrier.mode) "wss") }}
{{- $roleLinkWssCarrierEnabled := and $roleLinkCryptoEnabled $linkWssCarrierEnabled (or (eq $roleName "entry") (eq $roleName "transit")) }}
{{- $linkZapretProfileEnabled := and $.Values.interconnect.zapret2.enabled $roleLinkCryptoEnabled }}
{{- if $.Values.gateway.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "tracegate.roleName" (dict "root" $ "role" $roleName) }}
  namespace: {{ include "tracegate.namespace" $ }}
  labels:
    {{- include "tracegate.labels" $ | nindent 4 }}
    app.kubernetes.io/component: gateway-{{ $roleName }}
spec:
  minAvailable: {{ $.Values.gateway.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "tracegate.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: gateway-{{ $roleName }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tracegate.roleName" (dict "root" $ "role" $roleName) }}
  namespace: {{ include "tracegate.namespace" $ }}
  labels:
    {{- include "tracegate.labels" $ | nindent 4 }}
    app.kubernetes.io/component: gateway-{{ $roleName }}
spec:
  strategy:
    type: {{ $.Values.gateway.strategy }}
{{- if eq $.Values.gateway.strategy "RollingUpdate" }}
    rollingUpdate:
      maxUnavailable: {{ $.Values.gateway.rollingUpdate.maxUnavailable | quote }}
      maxSurge: {{ $.Values.gateway.rollingUpdate.maxSurge | quote }}
{{- end }}
  progressDeadlineSeconds: {{ int $.Values.gateway.progressDeadlineSeconds }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "tracegate.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: gateway-{{ $roleName }}
  template:
    metadata:
      labels:
        {{- include "tracegate.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: gateway-{{ $roleName }}
      annotations:
        tracegate.io/restart-boundary: static-topology-only
        tracegate.io/private-profiles: external-secret
        tracegate.io/no-host-wide-nfqueue: {{ not $.Values.interconnect.zapret2.hostWideInterception | quote }}
    spec:
      hostNetwork: {{ $.Values.gateway.hostNetwork }}
      dnsPolicy: {{ $.Values.gateway.dnsPolicy }}
      shareProcessNamespace: {{ $.Values.gateway.shareProcessNamespace }}
      terminationGracePeriodSeconds: {{ int $.Values.gateway.terminationGracePeriodSeconds }}
      {{- if $.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml $.Values.global.imagePullSecrets | nindent 8 }}
      {{- end }}
      nodeSelector:
        {{- toYaml $role.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml $role.tolerations | nindent 8 }}
      affinity:
        {{- toYaml $role.affinity | nindent 8 }}
      volumes:
        - name: runtime-contract
          configMap:
            name: {{ include "tracegate.fullname" $ }}-runtime-contract
        - name: haproxy-config
          configMap:
            name: {{ include "tracegate.roleName" (dict "root" $ "role" $roleName) }}-haproxy
        - name: nginx-config
          configMap:
            name: {{ include "tracegate.roleName" (dict "root" $ "role" $roleName) }}-nginx
        - name: xray-config
          configMap:
            name: {{ include "tracegate.roleName" (dict "root" $ "role" $roleName) }}-xray
        - name: decoy
{{- if $.Values.decoy.hostPath }}
          hostPath:
            path: {{ $.Values.decoy.hostPath | quote }}
            type: {{ $.Values.decoy.hostPathType | default "Directory" | quote }}
{{- else if $.Values.decoy.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ $.Values.decoy.existingClaim | quote }}
{{- else if $.Values.decoy.existingConfigMap }}
          configMap:
            name: {{ $.Values.decoy.existingConfigMap | quote }}
{{- else }}
          emptyDir: {}
{{- end }}
        - name: gateway-state
          hostPath:
            path: {{ printf "%s/%s" $.Values.gateway.agent.dataHostPathPrefix $roleName | quote }}
            type: DirectoryOrCreate
        - name: private-profiles
          secret:
            secretName: {{ include "tracegate.privateProfilesSecretName" $ }}
            optional: {{ not $.Values.privateProfiles.required }}
            defaultMode: {{ int $.Values.privateProfiles.defaultMode }}
            items:
              - key: {{ $roleRealitySecretKey }}
                path: {{ $roleRealityKey }}
              - key: {{ $roleHysteriaSecretKey }}
                path: {{ $roleHysteriaKey }}
{{- if $roleLinkCryptoClientEnabled }}
              - key: {{ $.Values.privateProfiles.secretKeys.mieruClient }}
                path: {{ $.Values.privateProfiles.keys.mieruClient }}
{{- end }}
{{- if $roleLinkCryptoServerEnabled }}
              - key: {{ $.Values.privateProfiles.secretKeys.mieruServer }}
                path: {{ $.Values.privateProfiles.keys.mieruServer }}
{{- end }}
{{- if $.Values.interconnect.zapret2.enabled }}
              - key: {{ $roleZapretSecretKey }}
                path: {{ $roleZapretKey }}
{{- if $linkZapretProfileEnabled }}
              - key: {{ $.Values.privateProfiles.secretKeys.zapretInterconnect }}
                path: {{ $.Values.privateProfiles.keys.zapretInterconnect }}
{{- end }}
{{- if and (eq $roleName "transit") $.Values.mtproto.enabled }}
              - key: {{ $.Values.privateProfiles.secretKeys.zapretMtproto }}
                path: {{ $.Values.privateProfiles.keys.zapretMtproto }}
{{- end }}
{{- end }}
{{- if $.Values.shadowsocks2022.enabled }}
              - key: {{ $roleShadowsocks2022SecretKey }}
                path: {{ $roleShadowsocks2022Key }}
              - key: {{ $roleShadowtlsSecretKey }}
                path: {{ $roleShadowtlsKey }}
{{- end }}
{{- if and (eq $roleName "transit") $.Values.wireguard.enabled }}
              - key: {{ $.Values.privateProfiles.secretKeys.wireguard }}
                path: {{ $.Values.privateProfiles.keys.wireguard }}
{{- end }}
{{- if and (eq $roleName "transit") $.Values.mtproto.enabled }}
              - key: {{ $.Values.privateProfiles.secretKeys.mtproto }}
                path: {{ $.Values.privateProfiles.keys.mtproto }}
{{- end }}
{{- if $labDirectMieruEnabled }}
              - key: {{ $.Values.privateProfiles.secretKeys.labMieruDirect }}
                path: {{ $.Values.privateProfiles.keys.labMieruDirect }}
{{- end }}
{{- if $labDirectRestlsEnabled }}
              - key: {{ $.Values.privateProfiles.secretKeys.labRestlsDirect }}
                path: {{ $.Values.privateProfiles.keys.labRestlsDirect }}
{{- end }}
{{- if $labTuicRoleEnabled }}
              - key: {{ $roleLabTuicSecretKey }}
                path: {{ $roleLabTuicKey }}
{{- end }}
        - name: tls
          secret:
            secretName: {{ $role.tls.existingSecretName | default (printf "%s-tls" (include "tracegate.roleName" (dict "root" $ "role" $roleName))) }}
            optional: {{ not $role.tls.existingSecretName }}
      initContainers:
{{- if and $.Values.gateway.privatePreflight.enabled $.Values.privateProfiles.required }}
        - name: validate-private-profiles
          image: {{ include "tracegate.image" $.Values.global.image | quote }}
          imagePullPolicy: {{ $.Values.global.image.pullPolicy }}
          command: ["tracegate-k3s-private-preflight"]
          args:
            - --role
            - {{ $role.role | quote }}
            - --root
            - {{ $.Values.privateProfiles.mountPath | quote }}
            - --required-file
            - {{ $roleRealityKey | quote }}
            - --required-file
            - {{ $roleHysteriaKey | quote }}
{{- if $roleLinkCryptoClientEnabled }}
            - --required-file
            - {{ $.Values.privateProfiles.keys.mieruClient | quote }}
{{- end }}
{{- if $roleLinkCryptoServerEnabled }}
            - --required-file
            - {{ $.Values.privateProfiles.keys.mieruServer | quote }}
{{- end }}
{{- if $.Values.shadowsocks2022.enabled }}
            - --required-file
            - {{ $roleShadowsocks2022Key | quote }}
            - --required-file
            - {{ $roleShadowtlsKey | quote }}
{{- end }}
{{- if and (eq $roleName "transit") $.Values.wireguard.enabled }}
            - --required-file
            - {{ $.Values.privateProfiles.keys.wireguard | quote }}
{{- end }}
{{- if and (eq $roleName "transit") $.Values.mtproto.enabled }}
            - --required-file
            - {{ $.Values.privateProfiles.keys.mtproto | quote }}
{{- end }}
{{- if $labDirectMieruEnabled }}
            - --required-file
            - {{ $.Values.privateProfiles.keys.labMieruDirect | quote }}
{{- end }}
{{- if $labDirectRestlsEnabled }}
            - --required-file
            - {{ $.Values.privateProfiles.keys.labRestlsDirect | quote }}
{{- end }}
{{- if $labTuicRoleEnabled }}
            - --required-file
            - {{ $roleLabTuicKey | quote }}
{{- end }}
{{- if $.Values.interconnect.zapret2.enabled }}
            - --zapret-file
            - {{ $roleZapretKey | quote }}
{{- if $linkZapretProfileEnabled }}
            - --zapret-file
            - {{ $.Values.privateProfiles.keys.zapretInterconnect | quote }}
{{- end }}
{{- if and (eq $roleName "transit") $.Values.mtproto.enabled }}
            - --zapret-file
            - {{ $.Values.privateProfiles.keys.zapretMtproto | quote }}
{{- end }}
{{- end }}
          volumeMounts:
            - name: private-profiles
              mountPath: {{ $.Values.privateProfiles.mountPath }}
              readOnly: true
{{- end }}
        - name: seed-runtime
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              set -eu
              mkdir -p /state/base/xray /state/base/haproxy /state/base/nginx /state/runtime/xray /state/runtime/haproxy /state/runtime/nginx
              cp /base/xray/config.json /state/base/xray/config.json
              escape_sed_replacement() {
                printf '%s' "$1" | sed 's/[\/&|\\]/\\&/g'
              }
              replace_literal() {
                marker="$1"
                value="$(escape_sed_replacement "$2")"
                sed -i "s|${marker}|${value}|g" /state/base/xray/config.json
              }
              replace_literal REPLACE_REALITY_PRIVATE_KEY "${REALITY_PRIVATE_KEY}"
              replace_literal REPLACE_HYSTERIA_AUTH "${HYSTERIA_AUTH}"
              cp /base/haproxy/haproxy.cfg /state/base/haproxy/haproxy.cfg
              cp /base/nginx/nginx.conf /state/base/nginx/nginx.conf
              [ -f /state/runtime/xray/config.json ] || cp /state/base/xray/config.json /state/runtime/xray/config.json
              [ -f /state/runtime/haproxy/haproxy.cfg ] || cp /state/base/haproxy/haproxy.cfg /state/runtime/haproxy/haproxy.cfg
              [ -f /state/runtime/nginx/nginx.conf ] || cp /state/base/nginx/nginx.conf /state/runtime/nginx/nginx.conf
          env:
            - name: REALITY_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "tracegate.privateProfilesSecretName" $ }}
                  key: {{ ternary $.Values.privateProfiles.secretKeys.realityPrivateKeyEntry $.Values.privateProfiles.secretKeys.realityPrivateKeyTransit (eq $roleName "entry") }}
            - name: HYSTERIA_AUTH
              valueFrom:
                secretKeyRef:
                  name: {{ include "tracegate.privateProfilesSecretName" $ }}
                  key: {{ ternary $.Values.privateProfiles.secretKeys.hysteriaAuthEntry $.Values.privateProfiles.secretKeys.hysteriaAuthTransit (eq $roleName "entry") }}
          volumeMounts:
            - name: gateway-state
              mountPath: /state
            - name: xray-config
              mountPath: /base/xray
            - name: haproxy-config
              mountPath: /base/haproxy
            - name: nginx-config
              mountPath: /base/nginx
      containers:
        - name: agent
          image: {{ include "tracegate.image" $.Values.global.image | quote }}
          imagePullPolicy: {{ $.Values.global.image.pullPolicy }}
          command: ["tracegate-agent"]
{{- with $.Values.gateway.containerResources.agent }}
          resources:
            {{- toYaml . | nindent 12 }}
{{- end }}
          ports:
            - name: agent
              containerPort: {{ int $.Values.gateway.agent.port }}
{{- if $.Values.gateway.probes.enabled }}
          startupProbe:
            httpGet:
              path: /v1/live
              port: agent
            periodSeconds: {{ int $.Values.gateway.probes.startup.periodSeconds }}
            failureThreshold: {{ int $.Values.gateway.probes.startup.failureThreshold }}
            timeoutSeconds: {{ int $.Values.gateway.probes.startup.timeoutSeconds }}
          readinessProbe:
            httpGet:
              path: /v1/health
              port: agent
            periodSeconds: {{ int $.Values.gateway.probes.readiness.periodSeconds }}
            failureThreshold: {{ int $.Values.gateway.probes.readiness.failureThreshold }}
            timeoutSeconds: {{ int $.Values.gateway.probes.readiness.timeoutSeconds }}
          livenessProbe:
            httpGet:
              path: /v1/live
              port: agent
            periodSeconds: {{ int $.Values.gateway.probes.liveness.periodSeconds }}
            failureThreshold: {{ int $.Values.gateway.probes.liveness.failureThreshold }}
            timeoutSeconds: {{ int $.Values.gateway.probes.liveness.timeoutSeconds }}
{{- end }}
          env:
            - name: AGENT_ROLE
              value: {{ $role.role | quote }}
            - name: AGENT_RUNTIME_MODE
              value: "kubernetes"
            - name: AGENT_RUNTIME_PROFILE
              value: {{ $.Values.global.runtimeProfile | quote }}
            - name: AGENT_GATEWAY_STRATEGY
              value: {{ $.Values.gateway.strategy | quote }}
            - name: AGENT_GATEWAY_ALLOW_RECREATE_STRATEGY
              value: {{ $.Values.gateway.allowRecreateStrategy | quote }}
            - name: AGENT_GATEWAY_MAX_UNAVAILABLE
              value: {{ $.Values.gateway.rollingUpdate.maxUnavailable | quote }}
            - name: AGENT_GATEWAY_MAX_SURGE
              value: {{ $.Values.gateway.rollingUpdate.maxSurge | quote }}
            - name: AGENT_GATEWAY_PROGRESS_DEADLINE_SECONDS
              value: {{ $.Values.gateway.progressDeadlineSeconds | quote }}
            - name: AGENT_GATEWAY_PDB_MIN_AVAILABLE
              value: {{ $.Values.gateway.pdb.minAvailable | quote }}
            - name: AGENT_GATEWAY_PROBES_ENABLED
              value: {{ $.Values.gateway.probes.enabled | quote }}
            - name: AGENT_GATEWAY_PRIVATE_PREFLIGHT_ENABLED
              value: {{ $.Values.gateway.privatePreflight.enabled | quote }}
            - name: AGENT_GATEWAY_PRIVATE_PREFLIGHT_FORBID_PLACEHOLDERS
              value: {{ $.Values.gateway.privatePreflight.forbidPlaceholders | quote }}
            - name: DEFAULT_ENTRY_HOST
              value: {{ $.Values.controlPlane.env.defaultEntryHost | quote }}
            - name: DEFAULT_TRANSIT_HOST
              value: {{ $.Values.controlPlane.env.defaultTransitHost | quote }}
            - name: AGENT_DATA_ROOT
              value: /var/lib/tracegate
            - name: AGENT_DRY_RUN
              value: {{ $.Values.gateway.agent.dryRun | quote }}
            - name: AGENT_XRAY_API_ENABLED
              value: "true"
            - name: AGENT_XRAY_API_SERVER
              value: {{ printf "127.0.0.1:%d" (int $role.ports.xrayApi) | quote }}
            - name: AGENT_RELOAD_XRAY_CMD
              value: {{ $.Values.gateway.agent.reloadCommands.xray | quote }}
            - name: AGENT_RELOAD_HAPROXY_CMD
              value: {{ $.Values.gateway.agent.reloadCommands.haproxy | quote }}
            - name: AGENT_RELOAD_NGINX_CMD
              value: {{ $.Values.gateway.agent.reloadCommands.nginx | quote }}
            - name: AGENT_RELOAD_OBFUSCATION_CMD
              value: {{ $.Values.gateway.agent.reloadCommands.obfuscation | quote }}
            - name: AGENT_RELOAD_FRONTING_CMD
              value: {{ $.Values.gateway.agent.reloadCommands.fronting | quote }}
            - name: AGENT_RELOAD_MTPROTO_CMD
              value: {{ $.Values.gateway.agent.reloadCommands.mtproto | quote }}
            - name: AGENT_RELOAD_PROFILES_CMD
              value: {{ $.Values.gateway.agent.reloadCommands.profiles | quote }}
            - name: AGENT_RELOAD_LINK_CRYPTO_CMD
              value: {{ $.Values.gateway.agent.reloadCommands.linkCrypto | quote }}
            - name: API_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "tracegate.controlPlaneSecretName" $ }}
                  key: api-internal-token
            - name: AGENT_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "tracegate.controlPlaneSecretName" $ }}
                  key: agent-auth-token
            - name: PRIVATE_RUNTIME_ROOT
              value: "/var/lib/tracegate/private"
            - name: PRIVATE_ZAPRET_PROFILE_DIR
              value: {{ $.Values.privateProfiles.mountPath | quote }}
            - name: PRIVATE_ZAPRET_PROFILE_ENTRY
              value: {{ $.Values.privateProfiles.keys.zapretEntry | quote }}
            - name: PRIVATE_ZAPRET_PROFILE_TRANSIT
              value: {{ $.Values.privateProfiles.keys.zapretTransit | quote }}
            - name: PRIVATE_ZAPRET_PROFILE_INTERCONNECT
              value: {{ $.Values.privateProfiles.keys.zapretInterconnect | quote }}
            - name: PRIVATE_ZAPRET_PROFILE_MTPROTO
              value: {{ $.Values.privateProfiles.keys.zapretMtproto | quote }}
            - name: PRIVATE_MIERU_PROFILE_DIR
              value: {{ printf "%s/mieru" $.Values.privateProfiles.mountPath | quote }}
            - name: PRIVATE_MIERU_CLIENT_PROFILE
              value: "client.json"
            - name: PRIVATE_MIERU_SERVER_PROFILE
              value: "server.json"
            - name: PRIVATE_SHADOWTLS_PROFILE_DIR
              value: {{ printf "%s/shadowtls" $.Values.privateProfiles.mountPath | quote }}
            - name: PRIVATE_SHADOWTLS_PROFILE_ENTRY
              value: {{ base $.Values.privateProfiles.keys.shadowtlsEntry | quote }}
            - name: PRIVATE_SHADOWTLS_PROFILE_TRANSIT
              value: {{ base $.Values.privateProfiles.keys.shadowtlsTransit | quote }}
            - name: PRIVATE_LINK_CRYPTO_ENABLED
              value: {{ $.Values.interconnect.entryTransit.enabled | quote }}
            - name: PRIVATE_LINK_CRYPTO_GENERATION
              value: {{ $.Values.interconnect.entryTransit.generation | quote }}
            - name: PRIVATE_LINK_CRYPTO_BIND_HOST
              value: {{ $.Values.interconnect.mieru.localSocks.bindHost | quote }}
            - name: PRIVATE_LINK_CRYPTO_ENTRY_PORT
              value: {{ $.Values.interconnect.mieru.localSocks.entryPort | quote }}
            - name: PRIVATE_LINK_CRYPTO_TRANSIT_PORT
              value: {{ $.Values.interconnect.mieru.localSocks.transitPort | quote }}
            - name: PRIVATE_LINK_CRYPTO_ROUTER_ENTRY_ENABLED
              value: {{ $.Values.interconnect.entryTransit.routerEntry.enabled | quote }}
            - name: PRIVATE_LINK_CRYPTO_ROUTER_ENTRY_PORT
              value: {{ $.Values.interconnect.mieru.localSocks.routerEntryPort | quote }}
            - name: PRIVATE_LINK_CRYPTO_ROUTER_TRANSIT_ENABLED
              value: {{ $.Values.interconnect.entryTransit.routerTransit.enabled | quote }}
            - name: PRIVATE_LINK_CRYPTO_ROUTER_TRANSIT_PORT
              value: {{ $.Values.interconnect.mieru.localSocks.routerTransitPort | quote }}
            - name: PRIVATE_LINK_CRYPTO_REMOTE_PORT
              value: {{ $.Values.interconnect.entryTransit.remotePort | quote }}
            - name: PRIVATE_LINK_CRYPTO_OUTER_CARRIER_ENABLED
              value: {{ $linkOuterCarrier.enabled | quote }}
            - name: PRIVATE_LINK_CRYPTO_OUTER_CARRIER_MODE
              value: {{ $linkOuterCarrier.mode | quote }}
            - name: PRIVATE_LINK_CRYPTO_OUTER_WSS_SERVER_NAME
