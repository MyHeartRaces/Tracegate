{{- end }}
{{- if $roleNodeEncryptionRequired }}
        - name: validate-node-encryption
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              set -eu
              marker="/state/{{ $.Values.gateway.nodeEncryption.markerFile }}"
              expected="{{ $.Values.gateway.nodeEncryption.markerValue }}"
              if [ ! -s "${marker}" ]; then
                echo "Entry/Transit encrypted runtime marker is missing: ${marker}" >&2
                echo "Provision {{ $.Values.gateway.agent.dataHostPathPrefix }}/{{ $roleName }} on encrypted storage and write the marker before deployment." >&2
                exit 1
              fi
              actual="$(tr -d '\r\n' < "${marker}")"
              if [ "${actual}" != "${expected}" ]; then
                echo "Entry/Transit encrypted runtime marker has unexpected value: ${marker}" >&2
                exit 1
              fi
              if [ "{{ $.Values.gateway.nodeEncryption.requireDeviceMapperSource }}" = "true" ]; then
                mount_line="$(grep ' /state ' /proc/self/mountinfo | head -n 1 || true)"
                case "${mount_line}" in
                  *"/dev/mapper/"*|*"/dev/dm-"*) ;;
                  *)
                    echo "Encrypted runtime marker is present, but /state is not backed by a dm-crypt-looking source." >&2
                    echo "Set gateway.nodeEncryption.requireDeviceMapperSource=false only when the node uses a verified encrypted provider volume." >&2
                    exit 1
                    ;;
                esac
              fi
          volumeMounts:
            - name: gateway-state
              mountPath: /state
{{- end }}
        - name: seed-runtime
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              set -eu
              mkdir -p /state/base/xray /state/base/haproxy /state/base/nginx /state/base/hysteria /state/runtime/xray /state/runtime/haproxy /state/runtime/nginx /state/runtime/hysteria
              cp /base/xray/config.json /state/base/xray/config.json
              cp /base/hysteria/server.yaml /state/base/hysteria/server.yaml
{{- if $roleEndpointBackhaulHysteriaClientEnabled }}
              cp /base/hysteria/backhaul-client.yaml /state/base/hysteria/backhaul-client.yaml
{{- end }}
              escape_sed_replacement() {
                printf '%s' "$1" | sed 's/[\/&|\\]/\\&/g'
              }
              replace_literal_in_file() {
                target="$1"
                marker="$2"
                value="$(escape_sed_replacement "$3")"
                sed -i "s|${marker}|${value}|g" "${target}"
              }
              replace_xray_literal() {
                marker="$1"
                value="$2"
                replace_literal_in_file /state/base/xray/config.json "${marker}" "${value}"
              }
              replace_hysteria_literal() {
                marker="$1"
                value="$2"
                replace_literal_in_file /state/base/hysteria/server.yaml "${marker}" "${value}"
              }
              read_secret_file() {
                path="$1"
                if [ ! -s "${path}" ]; then
                  echo "missing private profile secret: ${path}" >&2
                  exit 1
                fi
                tr -d '\r\n' < "${path}"
              }
              replace_xray_literal REPLACE_REALITY_PRIVATE_KEY "${REALITY_PRIVATE_KEY}"
{{- if $.Values.interconnect.emergencyXrayChain.enabled }}
              replace_xray_literal REPLACE_XRAY_CHAIN_BRIDGE_CLIENT_ID "$(read_secret_file "{{ $.Values.privateProfiles.mountPath }}/{{ $.Values.privateProfiles.keys.xrayChainBridgeClientId }}")"
{{- end }}
{{- if $.Values.shadowsocks2022.enabled }}
              replace_xray_literal REPLACE_SHADOWSOCKS2022_PASSWORD "$(read_secret_file "{{ $.Values.privateProfiles.mountPath }}/{{ $roleShadowsocks2022PasswordKey }}")"
{{- end }}
{{- if $.Values.vlessEncryption.enabled }}
              replace_xray_literal REPLACE_VLESS_ENCRYPTION_DECRYPTION "${VLESS_ENCRYPTION_DECRYPTION}"
{{- end }}
              replace_hysteria_literal REPLACE_HYSTERIA_SALAMANDER_PASSWORD "$(read_secret_file "{{ $.Values.privateProfiles.mountPath }}/{{ $roleHysteriaSalamanderKey }}")"
              replace_hysteria_literal REPLACE_HYSTERIA_STATS_SECRET "$(read_secret_file "{{ $.Values.privateProfiles.mountPath }}/{{ $roleHysteriaStatsKey }}")"
{{- if $roleEndpointBackhaulHysteriaClientEnabled }}
              replace_literal_in_file /state/base/hysteria/backhaul-client.yaml REPLACE_HYSTERIA_ENDPOINT_BACKHAUL_AUTH "$(read_secret_file "{{ $.Values.privateProfiles.mountPath }}/{{ $endpointBackhaulAuthKey }}")"
              replace_literal_in_file /state/base/hysteria/backhaul-client.yaml REPLACE_HYSTERIA_ENDPOINT_BACKHAUL_SALAMANDER_PASSWORD "$(read_secret_file "{{ $.Values.privateProfiles.mountPath }}/{{ $.Values.privateProfiles.keys.hysteriaSalamanderTransit }}")"
{{- end }}
              cp /base/haproxy/haproxy.cfg /state/base/haproxy/haproxy.cfg
              cp /base/nginx/nginx.conf /state/base/nginx/nginx.conf
              [ -f /state/runtime/xray/config.json ] || cp /state/base/xray/config.json /state/runtime/xray/config.json
              cp /state/base/hysteria/server.yaml /state/runtime/hysteria/server.yaml
{{- if $roleEndpointBackhaulHysteriaClientEnabled }}
              cp /state/base/hysteria/backhaul-client.yaml /state/runtime/hysteria/backhaul-client.yaml
{{- end }}
              cp /state/base/haproxy/haproxy.cfg /state/runtime/haproxy/haproxy.cfg
              cp /state/base/nginx/nginx.conf /state/runtime/nginx/nginx.conf
{{- if $mtprotoRuntimeRoleEnabled }}
              mtproto_config="/state/private/mtproto/runtime/config.toml"
              mkdir -p "$(dirname "${mtproto_config}")"
              mtproto_secret="$(read_secret_file "{{ $.Values.privateProfiles.mountPath }}/{{ $.Values.privateProfiles.keys.mtproto }}")"
              mtproto_secret="$(printf '%s' "${mtproto_secret}" | tr -cd '0123456789abcdefABCDEF' | tr 'A-F' 'a-f')"
              if [ "${#mtproto_secret}" -ne 32 ]; then
                echo "MTProto secret must contain exactly 16 bytes in hex" >&2
                exit 1
              fi
              mtproto_tls_domain_hex="$(printf '%s' {{ $mtprotoTlsDomain | quote }} | od -An -tx1 | tr -d ' \n')"
              mtproto_client_secret="ee${mtproto_secret}${mtproto_tls_domain_hex}"
              {
                printf '%s\n' '# Generated by Tracegate seed-runtime. Agent reconciles this file after startup.'
                printf 'secret = "%s"\n' "${mtproto_client_secret}"
                printf '%s\n' 'bind-to = "127.0.0.1:{{ int $.Values.mtproto.backendPort }}"'
                printf '%s\n' 'proxy-protocol-listener = true'
                printf '%s\n' 'concurrency = 8192'
                printf '%s\n' 'prefer-ip = "only-ipv4"'
                printf '%s\n' 'auto-update = false'
                printf '%s\n' 'tolerate-time-skewness = {{ $mtprotoTolerateTimeSkewness | quote }}'
                printf '%s\n' 'allow-fallback-on-unknown-dc = true'
{{- if $mtprotoDomainFrontingLegacyIP }}
                printf '%s\n' 'domain-fronting-ip = {{ $mtprotoDomainFrontingLegacyIP | quote }}'
{{- end }}
                printf '%s\n' ''
                printf '%s\n' '[domain-fronting]'
                printf '%s\n' 'host = {{ $mtprotoDomainFrontingHost | quote }}'
                printf '%s\n' 'port = {{ $mtprotoDomainFrontingPort }}'
{{- if eq $mtprotoRouteMode "entry-local-endpoint-egress" }}
                printf '%s\n' ''
                printf '%s\n' '[network]'
                printf '%s\n' 'proxies = ["socks5://127.0.0.1:{{ $mtprotoEgressSocksPort }}"]'
{{- end }}
                printf '%s\n' ''
                printf '%s\n' '[network.timeout]'
                printf '%s\n' 'tcp = "10s"'
                printf '%s\n' 'http = "15s"'
                printf '%s\n' 'idle = "10m"'
                printf '%s\n' 'handshake = "15s"'
                printf '%s\n' ''
                printf '%s\n' '[network.keep-alive]'
                printf '%s\n' 'disabled = false'
                printf '%s\n' 'idle = "15s"'
                printf '%s\n' 'interval = "15s"'
                printf '%s\n' 'count = 9'
                printf '%s\n' ''
                printf '%s\n' '[defense.anti-replay]'
                printf '%s\n' 'enabled = true'
                printf '%s\n' 'max-size = "1mib"'
                printf '%s\n' 'error-rate = 0.001'
              } > "${mtproto_config}"
{{- if $mtprotoOfficialFallbackEnabled }}
              mkdir -p /mtproxy
              printf '%s\n' "${mtproto_secret}" > /mtproxy/secret
              chmod 600 /mtproxy/secret
{{- end }}
{{- end }}
          env:
