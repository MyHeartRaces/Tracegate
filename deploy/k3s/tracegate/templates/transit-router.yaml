{{- if .Values.transitRouter.enabled }}
{{- $name := include "tracegate.transitRouterName" . }}
{{- $haproxyImage := mergeOverwrite (deepCopy .Values.gateway.images.haproxy) (.Values.transitRouter.images.haproxy | default dict) }}
{{- $nginxImage := mergeOverwrite (deepCopy .Values.gateway.images.nginx) (.Values.transitRouter.images.nginx | default dict) }}
{{- $xrayImage := mergeOverwrite (deepCopy .Values.gateway.images.xray) (.Values.transitRouter.images.xray | default dict) }}
{{- $endpointHost := required "transitRouter.endpoint.host is required when transitRouter.enabled=true" .Values.transitRouter.endpoint.host }}
{{- $entrySources := .Values.transitRouter.entry.allowedSources | default (list) }}
{{- $mtprotoSnis := list }}
{{- if .Values.transitRouter.sni.mtproto }}
{{- $mtprotoSnis = .Values.transitRouter.sni.mtproto }}
{{- else }}
{{- if .Values.mtproto.domain }}{{- $mtprotoSnis = append $mtprotoSnis .Values.mtproto.domain }}{{- end }}
{{- if .Values.mtproto.tlsDomain }}{{- $mtprotoSnis = append $mtprotoSnis .Values.mtproto.tlsDomain }}{{- end }}
{{- end }}
{{- $mtprotoSnis = uniq $mtprotoSnis }}
{{- $realitySnis := .Values.transitRouter.sni.reality | default (list) }}
{{- $decoySni := required "transitRouter.sni.decoy is required when transitRouter.enabled=true" .Values.transitRouter.sni.decoy }}
{{- $transitTopology := .Values.topology.servers.transit | default dict }}
{{- $transitDisplayName := toString ($transitTopology.displayName | default "Transit") }}
{{- $labels := dict "app.kubernetes.io/name" $name "app.kubernetes.io/instance" .Release.Name "app.kubernetes.io/managed-by" .Release.Service "app.kubernetes.io/part-of" "tracegate" "helm.sh/chart" (printf "%s-%s" .Chart.Name .Chart.Version) "tracegate.io/architecture" .Values.global.architectureRevision "app.kubernetes.io/component" "transit-router" "tracegate.io/canonical-server" "transit" "tracegate.io/display-name" $transitDisplayName }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}-haproxy
  namespace: {{ include "tracegate.namespace" . }}
  labels:
{{ toYaml $labels | nindent 4 }}
data:
  haproxy.cfg: |
    global
      log stdout format raw local0
      maxconn 20000

    defaults
      log global
      mode tcp
      option tcplog
      timeout connect 5s
      timeout client 5m
      timeout server 5m
      timeout tunnel 1h

    frontend fe_tracegate_transit_mtproto_{{ int .Values.transitRouter.ports.mtproto }}
      bind :{{ int .Values.transitRouter.ports.mtproto }}
{{- if $entrySources }}
      acl entry_src src {{ join " " $entrySources }}
      tcp-request connection reject unless entry_src
{{- end }}
      default_backend be_endpoint_{{ int .Values.transitRouter.endpoint.mtproto }}

    frontend fe_tracegate_transit_tls
      bind :{{ int .Values.transitRouter.ports.publicTcp }}
      tcp-request inspect-delay 5s
      tcp-request content accept if { req.ssl_sni -m found }
      tcp-request content accept if WAIT_END
{{- if $mtprotoSnis }}
      acl mtproto_sni req.ssl_sni -i {{ join " " $mtprotoSnis }}
{{- end }}
{{- if $entrySources }}
      acl entry_src src {{ join " " $entrySources }}
{{- end }}
      acl transit_decoy_sni req.ssl_sni -i {{ $decoySni }}
{{- if $realitySnis }}
      acl bridge_reality_sni req.ssl_sni -i {{ join " " $realitySnis }}
{{- end }}
      use_backend be_transit_decoy_tls if transit_decoy_sni
{{- if and $mtprotoSnis $entrySources }}
      use_backend be_endpoint_{{ int .Values.transitRouter.endpoint.publicTcp }} if mtproto_sni entry_src
{{- else if $mtprotoSnis }}
      use_backend be_endpoint_{{ int .Values.transitRouter.endpoint.publicTcp }} if mtproto_sni
{{- end }}
{{- if $realitySnis }}
      use_backend be_local_reality if bridge_reality_sni
{{- end }}
      default_backend be_local_reality

    backend be_transit_decoy_tls
      server transit_decoy_nginx 127.0.0.1:{{ int .Values.transitRouter.ports.decoy }} check

    backend be_local_reality
      server xray_reality 127.0.0.1:{{ int .Values.transitRouter.ports.reality }} check

    backend be_endpoint_{{ int .Values.transitRouter.endpoint.publicTcp }}
      server endpoint {{ $endpointHost }}:{{ int .Values.transitRouter.endpoint.publicTcp }} check

    backend be_endpoint_{{ int .Values.transitRouter.endpoint.mtproto }}
      server endpoint_mtproto_{{ int .Values.transitRouter.endpoint.mtproto }} {{ $endpointHost }}:{{ int .Values.transitRouter.endpoint.mtproto }} check
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}-nginx
  namespace: {{ include "tracegate.namespace" . }}
  labels:
{{ toYaml $labels | nindent 4 }}
data:
  transit-decoy.conf: |
    server {
      listen 127.0.0.1:{{ int .Values.transitRouter.ports.decoy }} ssl;
      http2 on;
      server_name {{ .Values.transitRouter.tls.serverName }};

      root {{ .Values.transitRouter.decoy.mountPath }};
      index index.html;

      ssl_certificate /etc/tracegate/tls/tls.crt;
      ssl_certificate_key /etc/tracegate/tls/tls.key;
      ssl_session_timeout 1d;
      ssl_session_cache shared:TracegateTransitDecoyTLS:10m;
      ssl_protocols TLSv1.2 TLSv1.3;
      ssl_prefer_server_ciphers off;

      add_header X-Content-Type-Options nosniff always;
      add_header Referrer-Policy no-referrer always;

      location ^~ /.well-known/acme-challenge/ {
        default_type text/plain;
        try_files $uri =404;
      }

      location / {
        try_files $uri $uri/ /index.html;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ include "tracegate.namespace" . }}
  labels:
{{ toYaml $labels | nindent 4 }}
spec:
  strategy:
    type: Recreate
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: {{ int .Values.transitRouter.revisionHistoryLimit }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
      app.kubernetes.io/component: transit-router
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: transit-router
        app.kubernetes.io/part-of: tracegate
      annotations:
        tracegate.io/managed-surface: transit-router
        checksum/transit-router-values: {{ toJson .Values.transitRouter | sha256sum | quote }}
    spec:
      hostNetwork: {{ .Values.transitRouter.hostNetwork }}
      dnsPolicy: {{ .Values.transitRouter.dnsPolicy }}
      terminationGracePeriodSeconds: {{ int .Values.transitRouter.terminationGracePeriodSeconds }}
{{- if .Values.global.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml .Values.global.imagePullSecrets | nindent 8 }}
{{- end }}
      nodeSelector:
{{ toYaml .Values.transitRouter.nodeSelector | nindent 8 }}
      tolerations:
{{ toYaml .Values.transitRouter.tolerations | nindent 8 }}
      affinity:
{{ toYaml .Values.transitRouter.affinity | nindent 8 }}
      volumes:
        - name: haproxy-config
          configMap:
            name: {{ $name }}-haproxy
        - name: nginx-config
          configMap:
            name: {{ $name }}-nginx
        - name: xray-config
          secret:
            secretName: {{ required "transitRouter.xray.existingSecretName is required when transitRouter.enabled=true" .Values.transitRouter.xray.existingSecretName }}
            defaultMode: {{ int .Values.transitRouter.xray.defaultMode }}
        - name: router-tls
          secret:
            secretName: {{ required "transitRouter.tls.existingSecretName is required when transitRouter.enabled=true" .Values.transitRouter.tls.existingSecretName }}
            defaultMode: {{ int .Values.transitRouter.tls.defaultMode }}
        - name: decoy
          hostPath:
            path: {{ .Values.transitRouter.decoy.hostPath | quote }}
            type: {{ .Values.transitRouter.decoy.hostPathType | quote }}
      containers:
        - name: haproxy
          image: {{ include "tracegate.image" $haproxyImage | quote }}
          imagePullPolicy: {{ $haproxyImage.pullPolicy | default "IfNotPresent" }}
          command: ["haproxy"]
          args: ["-W", "-db", "-f", "/usr/local/etc/haproxy/haproxy.cfg"]
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            capabilities:
              add:
                - NET_BIND_SERVICE
          ports:
            - name: tls
              containerPort: {{ int .Values.transitRouter.ports.publicTcp }}
              hostPort: {{ int .Values.transitRouter.ports.publicTcp }}
              protocol: TCP
            - name: mtproto
              containerPort: {{ int .Values.transitRouter.ports.mtproto }}
              hostPort: {{ int .Values.transitRouter.ports.mtproto }}
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: tls
            periodSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: haproxy-config
              mountPath: /usr/local/etc/haproxy/haproxy.cfg
              subPath: haproxy.cfg
              readOnly: true
{{- with .Values.transitRouter.resources.haproxy }}
          resources:
{{ toYaml . | nindent 12 }}
{{- end }}
        - name: nginx
          image: {{ include "tracegate.image" $nginxImage | quote }}
          imagePullPolicy: {{ $nginxImage.pullPolicy | default "IfNotPresent" }}
          command: ["nginx"]
          args: ["-g", "daemon off;"]
          ports:
            - name: decoy
              containerPort: {{ int .Values.transitRouter.ports.decoy }}
              protocol: TCP
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: transit-decoy.conf
              readOnly: true
            - name: router-tls
              mountPath: /etc/tracegate/tls
              readOnly: true
            - name: decoy
              mountPath: {{ .Values.transitRouter.decoy.mountPath | quote }}
              readOnly: true
{{- with .Values.transitRouter.resources.nginx }}
          resources:
{{ toYaml . | nindent 12 }}
{{- end }}
        - name: xray
          image: {{ include "tracegate.image" $xrayImage | quote }}
          imagePullPolicy: {{ $xrayImage.pullPolicy | default "IfNotPresent" }}
          command: ["xray"]
          args: ["run", "-c", "/etc/xray/config.json"]
          ports:
            - name: reality
              containerPort: {{ int .Values.transitRouter.ports.reality }}
              protocol: TCP
          volumeMounts:
            - name: xray-config
              mountPath: /etc/xray/config.json
              subPath: {{ .Values.transitRouter.xray.configKey }}
              readOnly: true
{{- with .Values.transitRouter.resources.xray }}
          resources:
{{ toYaml . | nindent 12 }}
{{- end }}
{{- end }}
