namespace:
  create: true
  name: tracegate

global:
  runtimeProfile: tracegate-3
  architectureRevision: "3"
  publicBaseUrl: ""
  image:
    repository: ghcr.io/your-org/tracegate
    tag: "3.0.0"
    pullPolicy: IfNotPresent
  imagePullSecrets: []

architecture:
  # legacy-three-node preserves existing installations. New production
  # installations should use entry-endpoint and keep the internal
  # gateway.roles.transit name only as an Endpoint compatibility alias.
  mode: legacy-three-node
  # endpoint-first deploys and validates only Endpoint. full enables Entry
  # after Endpoint payload, egress and client profile checks have passed.
  deploymentPhase: full
  # New production must keep every data-plane runtime in k3s pods. Host
  # firewall policy remains an operator-managed node prerequisite.
  podRuntimeOnly: false
  ingressRotation:
    enabled: false
    strategy: revision-sticky
    # Hostnames are private operator inputs. Each hostname must resolve
    # DNS-only to an ingress address accepted by the corresponding gateway.
    entryHosts: []
    endpointHosts: []
    minimumPoolSize: 2
    overlapSeconds: 600
    requireDistinctPublicIPs: true
    requireDistinctAsns: true
    rotateEndpointEgress: false
  # One-address Entry contract. Clients use one Cloudflare-proxied gRPC/TLS/H2
  # hostname and Entry forwards all user traffic through a shared,
  # multi-transport, fail-closed backhaul pool to Endpoint.
  universalEntry:
    enabled: false
    publicHost: ""
    provider: cloudflare
    transport: grpc-tls-h2
    originFirewall:
      required: true
      denyDirectAccess: true
      # Set true only for DNS-only controlled hostnames where the public TLS
      # adapter is intentionally reachable directly. Other SNI routes remain
      # protected by the origin firewall.
      allowDirectTlsAdapterSni: false
      # Operator-managed current Cloudflare IPv4 origin source ranges.
      allowedSourceCidrs: []
    clientPolicy:
      multiplexSingleTls: true
      maxParallelHandshakes: 1
      reconnectBaseSeconds: 5
      reconnectMaxSeconds: 120
      jitter: true
    serverPolicy:
      grpcReadTimeout: 1h
      grpcSendTimeout: 1h
    backhaul:
      requireMultiTransportPool: true
      failClosed: true
      endpointEgressOnly: true
  # Four-address Entry ingress contract: one service-facing address that never
  # accepts proxy clients and exactly three client-facing shard addresses.
  entryIngress:
    enabled: false
    serviceFacing:
      publicIp: ""
      hostname: ""
    shards: []
    alias:
      tokenLength: 20
    exclusiveSniPairs:
      enabled: false
      pool: []
    firewall:
      required: true
    channel:
      tcp:
        bindShardIpsOnly: true
        maxConnections: 20000
        maxConnectionsPerSource: 8
        newConnectionsPer10Seconds: 12
        inspectDelay: 5s
        connectTimeout: 5s
        clientTimeout: 5m
        serverTimeout: 5m
        tunnelTimeout: 1h
      udp:
        serviceIpRejectRequired: true
  # Four-address Endpoint contract: one service/egress address that never
  # accepts proxy clients and exactly three client-facing shard addresses.
  endpointIngress:
    enabled: false
    serviceFacing:
      publicIp: ""
      hostname: ""
    shards: []
    alias:
      tokenLength: 20
    exclusiveSniPairs:
      enabled: false
      pool: []
    firewall:
      required: true
    channel:
      tcp:
        bindShardIpsOnly: true
        maxConnections: 20000
        maxConnectionsPerSource: 8
        newConnectionsPer10Seconds: 12
        inspectDelay: 5s
        connectTimeout: 5s
        clientTimeout: 5m
        serverTimeout: 5m
        tunnelTimeout: 1h
      udp:
        serviceIpRejectRequired: true

topology:
  servers:
    endpoint:
      displayName: Endpoint
      publicIp: ""
      kubernetesNodeName: ""
      nodeSelector:
        tracegate.io/role: endpoint
    transit:
      displayName: Transit
      publicIp: ""
      kubernetesNodeName: ""
      nodeSelector:
        tracegate.io/role: transit
    entry:
      displayName: Entry
      publicIp: ""
      kubernetesNodeName: ""
      nodeSelector:
        tracegate.io/role: entry

controlPlane:
  enabled: true
  # Optional override for API, dispatcher, bot and DB migration init container.
  # Empty fields inherit global.image so gateway and control-plane can roll at
  # different tags during constrained production updates.
  image: {}
  # Optional Secret name holding the real SNI catalog (key: sni_catalog.yaml).
  # When set, the control plane mounts it and loads it via TRACEGATE_SNI_CATALOG_FILE
  # instead of the packaged placeholder catalog. Empty -> packaged catalog.
  sniCatalogOverrideSecret: ""
  replicas:
    api: 1
    dispatcher: 1
    bot: 0
  service:
    type: ClusterIP
    port: 8080
  auth:
    existingSecretName: tracegate-control-plane-auth
    apiInternalToken: ""
    agentAuthToken: ""
    botToken: ""
    grafanaAlertsWebhookToken: ""
  database:
    externalUrl: ""
    externalUrlSecret:
      name: tracegate-database-url
      key: url
    embedded:
      enabled: false
      image: postgres:16
      database: tracegate
      username: tracegate
      password: ""
      storage: 10Gi
      storageClassName: ""
    backup:
      # Encrypted off-node PostgreSQL backups. The external Secret is expected
      # to expose RESTIC_REPOSITORY, RESTIC_PASSWORD and backend credentials.
      enabled: false
      schedule: "17 */6 * * *"
      successfulJobsHistoryLimit: 3
      failedJobsHistoryLimit: 5
      startingDeadlineSeconds: 1800
      repositorySecretName: tracegate-postgres-backup
      postgresImage:
        repository: postgres
        tag: "16"
        pullPolicy: IfNotPresent
      resticImage:
        repository: restic/restic
        tag: "0.18.0"
        pullPolicy: IfNotPresent
      retention:
        keepDaily: 7
        keepWeekly: 5
        keepMonthly: 12
      restoreCheck:
        enabled: true
        schedule: "43 4 * * 0"
        successfulJobsHistoryLimit: 3
        failedJobsHistoryLimit: 5
        startingDeadlineSeconds: 3600
  env:
    appEnv: prod
    logLevel: INFO
    defaultEntryHost: entry.example.com
    defaultTransitHost: transit.example.com
    realityPublicKey: ""
    realityShortId: ""
    realityPublicKeyEntry: ""
    realityShortIdEntry: ""
    realityPublicKeyTransit: ""
    realityShortIdTransit: ""
    wireguardServerPublicKey: ""
    wireguardDns: "1.1.1.1"
    wireguardAllowedIps:
      - "0.0.0.0/0"
      - "::/0"
    wireguardMtu: 1280
    vlessWsPath: /ws
    vlessGrpcServiceName: tracegate.v1.Edge
    vlessGrpcPath: /tracegate.v1.Edge/
    mtprotoDomain: ""
    localSocksAuth: required
    botWelcomeRequired: true
    botWelcomeVersion: tracegate-3.0.0-ui-v1
    botWelcomeMessageSecret:
      name: tracegate-bot-welcome
      key: message
    botGuideMessageSecret:
      name: tracegate-bot-guide
      key: message
    enabledClientProfiles: null
    superadminTelegramIds: []
    grafanaEnabled: false
    grafanaInternalUrl: http://tracegate-grafana:3000
    grafanaPublicBaseUrl: ""
    grafanaHost: ""
    grafanaAdminUser: admin
    grafanaOtpHandoffUrl: ""
    grafanaAlertsWebhookUrl: ""
    grafanaAdminPasswordSecret:
      name: ""
      key: admin-password
    grafanaCookieSecretSecret:
      name: ""
      key: cookie-secret
  resources:
    api: {}
    dispatcher: {}
    bot: {}
    postgres: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  terminationGracePeriodSeconds: 30

observability:
  prometheus:
    enabled: false
    name: tracegate-prometheus
    image:
      repository: prom/prometheus
      tag: v2.55.1
      pullPolicy: IfNotPresent
    retention: 15d
    storage:
      size: 10Gi
      storageClassName: ""
    resources: {}
    nodeSelector: {}
    tolerations: []
  nodeExporter:
    enabled: false
    name: tracegate-node-exporter
    image:
      repository: prom/node-exporter
      tag: v1.8.2
      pullPolicy: IfNotPresent
  grafana:
    enabled: false
    name: tracegate-grafana
    image:
      repository: grafana/grafana
      tag: "12.0.0"
      digest: sha256:2d1f9ae67c1778d33e291d4c3c759cd8b650e67491f02533499eb950e075eeb5
      pullPolicy: IfNotPresent
    replicas: 1
    revisionHistoryLimit: 3
    persistence:
      enabled: true
      existingClaim: ""
      size: 5Gi
      storageClassName: local-path
    resources: {}
    nodeSelector: {}
    tolerations: []

vlessEncryption:
  # Xray VLESS Encryption for newly issued VLESS profiles.
  # Existing issued configs remain on their original inbounds and keep their original encryption value.
  enabled: false
  encryption: ""
  realitySni: ""
  wsPath: /ws-enc
  grpcServiceName: tracegate.v1.EdgeEnc
  grpcPath: /tracegate.v1.EdgeEnc/

privateProfiles:
  required: true
  existingSecretName: tracegate-private-profiles
  mountPath: /etc/tracegate/private
  defaultMode: 256
  inlineProfiles: false
  keys:
    realityPrivateKeyEntry: reality/entry-private-key
    realityPrivateKeyTransit: reality/transit-private-key
    hysteriaSalamanderEntry: hysteria/entry-salamander-password
    hysteriaSalamanderTransit: hysteria/transit-salamander-password
    hysteriaStatsEntry: hysteria/entry-stats-secret
    hysteriaStatsTransit: hysteria/transit-stats-secret
    hysteriaEndpointBackhaulAuth: credentials/hysteria-endpoint-backhaul-auth
    xrayChainBridgeClientId: xray/chain-bridge-client-id
    shadowsocks2022LinkClient: link-crypto-ss2022/client.json
    shadowsocks2022LinkServer: link-crypto-ss2022/server.json
    zapretEntry: zapret/entry.env
    zapretTransit: zapret/transit.env
    zapretInterconnect: zapret/entry-transit.env
    zapretMtproto: zapret/mtproto-extra.env
    shadowsocks2022: shadowsocks2022/server.json
    shadowsocks2022Entry: shadowsocks2022/entry-server.json
    shadowsocks2022Transit: shadowsocks2022/transit-server.json
    shadowsocks2022PasswordEntry: credentials/ss2022-entry-password
    shadowsocks2022PasswordTransit: credentials/ss2022-transit-password
    shadowtls: shadowtls/config.yaml
    shadowtlsEntry: shadowtls/entry-config.yaml
    shadowtlsTransit: shadowtls/transit-config.yaml
    shadowtlsPasswordEntry: credentials/shadowtls-entry-password
    shadowtlsPasswordTransit: credentials/shadowtls-transit-password
    vlessEncryptionDecryptionEntry: credentials/vless-encryption-decryption-entry
    vlessEncryptionDecryptionTransit: credentials/vless-encryption-decryption-transit
    wireguard: wireguard/wg.conf
    mtproto: mtproto/secret.txt
    labRestlsDirect: lab/restls-direct.yaml
    labTuicEntry: lab/tuic-entry.json
    labTuicTransit: lab/tuic-transit.json
  secretKeys:
    realityPrivateKeyEntry: reality-entry-private-key
    realityPrivateKeyTransit: reality-transit-private-key
    hysteriaSalamanderEntry: hysteria-entry-salamander-password
    hysteriaSalamanderTransit: hysteria-transit-salamander-password
    hysteriaStatsEntry: hysteria-entry-stats-secret
    hysteriaStatsTransit: hysteria-transit-stats-secret
    hysteriaEndpointBackhaulAuth: hysteria-endpoint-backhaul-auth
    xrayChainBridgeClientId: xray-chain-bridge-client-id
    shadowsocks2022LinkClient: shadowsocks2022-link-client-json
    shadowsocks2022LinkServer: shadowsocks2022-link-server-json
    zapretEntry: zapret-entry-env
    zapretTransit: zapret-transit-env
    zapretInterconnect: zapret-entry-transit-env
    zapretMtproto: zapret-mtproto-extra-env
    shadowsocks2022: shadowsocks2022-server-json
    shadowsocks2022Entry: shadowsocks2022-entry-server-json
    shadowsocks2022Transit: shadowsocks2022-transit-server-json
    shadowsocks2022PasswordEntry: shadowsocks2022-entry-password
    shadowsocks2022PasswordTransit: shadowsocks2022-transit-password
    shadowtls: shadowtls-config-yaml
    shadowtlsEntry: shadowtls-entry-config-yaml
    shadowtlsTransit: shadowtls-transit-config-yaml
    shadowtlsPasswordEntry: shadowtls-entry-password
    shadowtlsPasswordTransit: shadowtls-transit-password
    vlessEncryptionDecryptionEntry: vless-encryption-decryption-entry
    vlessEncryptionDecryptionTransit: vless-encryption-decryption-transit
    wireguard: wireguard-wg-conf
    mtproto: mtproto-secret-txt
    labRestlsDirect: lab-restls-direct-yaml
    labTuicEntry: lab-tuic-entry-json
    labTuicTransit: lab-tuic-transit-json

decoy:
  enabled: true
  preserveExisting: true
  # Optional fixed HTTPS origin used by the Entry web surface. Protocol
  # locations remain local; only ordinary browser requests are redirected.
  entryRedirectBaseUrl: ""
  existingConfigMap: ""
  existingConfigMapItems: []
  # Role-specific sources prevent the full Endpoint site from being mounted
  # on Entry. Empty role values fall back to the global source above.
  roleSources:
    entry:
      existingConfigMap: ""
      existingConfigMapItems: []
    endpoint:
      existingConfigMap: ""
      existingConfigMapItems: []
  existingClaim: ""
  hostPath: /srv/tracegate/decoy
  hostPathType: Directory
  mountPath: /var/www/decoy
  files: {}

transitRouter:
  enabled: false
  # Keep empty for the chart default. Production can set tracegate-transit-router
  # to adopt the existing Transit router without changing the object name.
  name: ""
  hostNetwork: true
  dnsPolicy: ClusterFirstWithHostNet
  revisionHistoryLimit: 3
  terminationGracePeriodSeconds: 10
  nodeSelector:
    tracegate.io/role: transit
  tolerations: []
  affinity: {}
  ports:
    publicTcp: 443
    mtproto: 8443
    decoy: 10443
    reality: 2443
  entry:
    allowedSources: []
  endpoint:
    host: ""
    publicTcp: 443
    mtproto: 8443
  tls:
    serverName: transit.example.com
    existingSecretName: tracegate-transit-router-tls
    defaultMode: 292
  xray:
    existingSecretName: tracegate-transit-router-xray
    configKey: config.json
    defaultMode: 292
  sni:
    mtproto: []
    decoy: transit.example.com
    reality:
      - www.avito.ru
  decoy:
    hostPath: /srv/tracegate/decoy
    hostPathType: Directory
    mountPath: /srv/tracegate/decoy
  images:
    haproxy: {}
    nginx: {}
    xray: {}
  resources:
    haproxy: {}
    nginx: {}
    xray: {}

transportProfiles:
  clientNames:
    - v1-direct-reality-vless
    - v2-direct-quic-hysteria
    - v5-universal-entry
    - v0-grpc-vless
    - v0-ws-vless
    - v3-direct-shadowtls-shadowsocks
    - v0-wgws-wireguard
    - MTProto-FakeTLS-Direct
  v1:
    grpcFirst: true
    legacyWebSocketFallback: true
  socks5:
    required: true
    allowAnonymousLocalhost: false
  clientExposure:
    defaultMode: vpn-tun
    localProxyExports: advanced-only
    lanSharing: forbidden
    unauthenticatedLocalProxy: forbidden

network:
  egressIsolation:
    required: true
    mode: dedicated-egress-ip
    ingressPublicIPs: []
    egressPublicIPs: []
    forbidIngressIpAsEgress: true
    requireTransitEgressPublicIP: true
    clientLeakMitigation: egress-ip-only
    enforcement:
      mode: operator-managed
      managedBy: /etc/tracegate/private/egress-isolation
      snat: required
      ingressPublicIpOutbound: forbidden
    nodeAnnotations:
      enabled: false
      ingressPublicIP: tracegate.io/ingress-public-ip
      egressPublicIP: tracegate.io/egress-public-ip

experimentalProfiles:
  enabled: false
  directTransitObfuscation:
    enabled: false
    defaultLayer: restls
    variants: []
    restls:
      enabled: false
      mode: candidate-only
      profileSource: external-secret
  tuicV5:
    enabled: false
    directEnabled: false
    chainEnabled: false
    productionReplacementAllowed: false
    variants:
      - V9-TUICv5-QUIC-Direct
      - V9-TUICv5-QUIC-Chain

gateway:
  enabled: true
  stateStorage:
    # hostPath remains for legacy installations. New production with
    # architecture.podRuntimeOnly=true must use existing PVCs.
    mode: hostPath
    existingClaims:
      entry: ""
      transit: ""
  strategy: RollingUpdate
  allowRecreateStrategy: false
  progressDeadlineSeconds: 600
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1
  hostNetwork: true
  # Pod-level seccomp profile applied to every gateway data-plane container.
  # RuntimeDefault constrains the syscall surface (defense in depth) while still
  # permitting the NET_ADMIN/NET_RAW networking the data plane needs. Set to ""
  # to omit the profile, or to "Unconfined" only for short-lived debugging.
  seccompProfileType: RuntimeDefault
  shareProcessNamespace: true
  dnsPolicy: ClusterFirstWithHostNet
  terminationGracePeriodSeconds: 60
  trafficShaping:
    entry:
      enabled: true
      runtimeSidecar: true
      interface: eth0
      maxMbit: 65
      burstKbit: 2048
      applyEgress: true
      applyIngressPolicing: true
      cleanupOnExit: false
      failClosed: true
    chainClient:
      enabled: true
      maxMbit: 10
      requireDeclaredHysteriaTx: true
    hysteria:
      ignoreClientBandwidth: true
      entryChainIgnoreClientBandwidth: false
  nodeEncryption:
    enabled: true
    required: true
    runtimeInitValidation: true
    markerFile: .tracegate-encrypted
    markerValue: tracegate-encrypted-runtime-v1
    requireDeviceMapperSource: true
    nodeAnnotations:
      enabled: true
      encryptedRuntime: tracegate.io/encrypted-runtime
      expectedValue: "true"
  pdb:
    enabled: true
    minAvailable: 1
  probes:
    enabled: true
    startup:
      periodSeconds: 5
      failureThreshold: 60
      timeoutSeconds: 2
    readiness:
      periodSeconds: 10
      failureThreshold: 3
      timeoutSeconds: 2
    liveness:
      periodSeconds: 15
      failureThreshold: 4
      timeoutSeconds: 2
  privatePreflight:
    enabled: true
    forbidPlaceholders: true
  entrySmall:
    enabled: false
    profile: 1g-1vcpu
    memoryBudgetMi: 900
    cpuLimitBudgetMillis: 1000
    forbidWireGuard: true
    forbidExperimental: true
    rollout:
      strategy: Recreate
      allowRecreateStrategy: true
      maxUnavailable: 0
      maxSurge: 0
    containerResources:
      agent:
        requests:
          cpu: 10m
          memory: 24Mi
        limits:
          cpu: 70m
          memory: 64Mi
      haproxy:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 100m
          memory: 48Mi
      nginx:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 70m
          memory: 48Mi
      xray:
        requests:
          cpu: 40m
          memory: 64Mi
        limits:
          cpu: 180m
          memory: 160Mi
      hysteria:
        requests:
          cpu: 40m
          memory: 64Mi
        limits:
          cpu: 180m
          memory: 160Mi
      singbox:
        requests:
          cpu: 20m
          memory: 48Mi
        limits:
          cpu: 130m
          memory: 96Mi
      wstunnel:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 70m
          memory: 48Mi
      zapret2:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 80m
          memory: 64Mi
      shadowsocks:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 80m
          memory: 96Mi
      shadowtls:
        requests:
          cpu: 5m
          memory: 16Mi
        limits:
          cpu: 40m
          memory: 64Mi
      entryTrafficShaper:
        requests:
          cpu: 5m
          memory: 16Mi
        limits:
          cpu: 20m
          memory: 32Mi
  containerResources:
    agent: {}
    haproxy: {}
    nginx: {}
    xray: {}
    hysteria: {}
    entryTrafficShaper:
      requests:
        cpu: 5m
        memory: 16Mi
      limits:
        cpu: 30m
        memory: 48Mi
    zapret2:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi
    wireguard: {}
    wireguardSync: {}
    wstunnel: {}
    shadowtls: {}
    shadowsocks: {}
    mtproto: {}
    mtprotoOfficial: {}
    singbox: {}
  # Optional static REALITY SNI demux table. Each group becomes a dedicated
  # loopback Xray inbound, and HAProxy routes clients there by ClientHello SNI.
  # Keep this table stable: adding/removing rows is structural and requires a
  # one-time gateway reload, while user issuance only changes inbound clients.
  realityMultiInboundGroups: []
  hysteria:
    # Optional SNI used in issued Hysteria client profiles. Keep empty to use
    # the node TLS hostname. Setting this requires the Hysteria certificate to
    # cover the configured name because server-side sniGuard is dns-san.
    clientServerNameEntry: ""
    clientServerNameTransit: ""
    # Keep long-lived application streams alive across quiet periods. QUIC
    # receive/send buffers are configured separately on every gateway host by
    # deploy/k3s/host-sysctl/90-tracegate-quic.conf.
    quic:
      maxIdleTimeout: 2m
      disablePathMTUDiscovery: false
    udpIdleTimeout: 5m
  agent:
    port: 8070
    dryRun: false
    corsOrigins: []
    dataHostPathPrefix: /var/lib/tracegate
    reloadCommands:
      xray: "sh -lc 'pkill -HUP xray || true'"
      haproxy: "sh -lc 'pkill -USR2 haproxy || true'"
      nginx: "sh -lc 'nginx -s reload || true'"
      obfuscation: "sh -lc 'true'"
      fronting: "sh -lc 'true'"
      mtproto: "sh -lc 'true'"
      profiles: "sh -lc 'tracegate-k3s-private-reload --component profiles --role \"${AGENT_ROLE}\" --private-runtime-root /var/lib/tracegate/private --runtime-contract /var/lib/tracegate/runtime/runtime-contract.json'"
      linkCrypto: "sh -lc 'tracegate-k3s-private-reload --component link-crypto --role \"${AGENT_ROLE}\" --private-runtime-root /var/lib/tracegate/private --runtime-contract /var/lib/tracegate/runtime/runtime-contract.json'"
  images:
    haproxy:
      repository: haproxy
      tag: "2.9-alpine"
      pullPolicy: IfNotPresent
    nginx:
      repository: nginx
      tag: "1.25-alpine"
      pullPolicy: IfNotPresent
    xray:
      repository: ghcr.io/xtls/xray-core
      tag: "latest"
      pullPolicy: IfNotPresent
    hysteria:
      repository: tobyxdd/hysteria
      tag: "latest"
      pullPolicy: IfNotPresent
    zapret2:
      repository: ghcr.io/bol-van/zapret
      tag: "latest"
      pullPolicy: IfNotPresent
    wstunnel:
      repository: ghcr.io/erebe/wstunnel
      tag: "latest"
      pullPolicy: IfNotPresent
    wireguard:
      repository: lscr.io/linuxserver/wireguard
      tag: "latest"
      pullPolicy: IfNotPresent
    shadowtls:
      repository: ghcr.io/ihciah/shadow-tls
      tag: "latest"
      pullPolicy: IfNotPresent
    shadowsocks:
      repository: ghcr.io/shadowsocks/ssserver-rust
      tag: "latest"
      pullPolicy: IfNotPresent
    singbox:
      repository: ghcr.io/sagernet/sing-box
      tag: "latest"
      pullPolicy: IfNotPresent
    mtproto:
      repository: nineseconds/mtg
      tag: "latest"
      digest: sha256:c082586a19886e4822f92aa8c1949a771df3519053d64b1b5505a9a280a3929d
      pullPolicy: IfNotPresent
    mtprotoOfficial:
      repository: mtproxy/mtproxy
      tag: "latest"
      # The upstream Docker image is mutable and substantially older than the
      # source repository. Keep the known production image reproducible until
      # Tracegate publishes and validates its own maintained MTProxy image.
      digest: sha256:03c4b67c093fd88f840ef10b6a4a989d25da01a9edb2daab960fbf442769a2c4
      pullPolicy: IfNotPresent
  roles:
    entry:
      enabled: true
      canonicalServer: entry
      role: ENTRY
      nodeSelector:
        tracegate.io/role: entry
      tolerations: []
      affinity: {}
      ports:
        publicTcp: 443
        publicTcpExtraBinds: []
        publicUdp: 443
        reality: 2443
        realityEncrypted: 2444
        httpsAdapter: 10443
        vlessWs: 10000
        vlessWsEncrypted: 10002
        vlessGrpc: 10001
        vlessGrpcEncrypted: 10003
        xrayApi: 8080
      tls:
        serverName: entry.example.com
        existingSecretName: tracegate-entry-tls
      reality:
        dest: yandex.ru:443
        serverNames:
          - yandex.ru
        shortIds:
          - "0123456789abcdef"
        privateKeySecret:
          name: ""
          key: private-key
      routing:
        chainToTransit: true
      hysteria:
        listenHost: ""
      resources: {}
    transit:
      enabled: true
      canonicalServer: transit
      role: TRANSIT
      nodeSelector:
        tracegate.io/role: transit
      tolerations: []
      affinity: {}
      ports:
        publicHttp: 80
        publicTcp: 443
        publicTcpExtraBinds: []
        publicUdp: 443
        reality: 2443
        realityEncrypted: 2444
        httpsAdapter: 10443
        vlessWs: 10000
        vlessWsEncrypted: 10002
        vlessGrpc: 10001
        vlessGrpcEncrypted: 10003
        xrayApi: 8080
        mtproto: 9443
      tls:
        serverName: transit.example.com
        existingSecretName: tracegate-transit-tls
      reality:
        dest: www.rbc.ru:443
        serverNames:
          - www.rbc.ru
        shortIds:
          - "fedcba9876543210"
        privateKeySecret:
          name: ""
          key: private-key
      routing:
        chainToTransit: false
      hysteria:
        listenHost: ""
      resources: {}

interconnect:
  # Shared Entry -> Endpoint client-traffic backhaul. XHTTP/REALITY remains the
  # primary carrier; Hysteria2/Salamander is an independent fail-closed fallback.
  endpointBackhaul:
    enabled: false
    primary: vless-reality-xhttp
    secondary: hysteria2-salamander
    selection:
      strategy: roundRobin
      stickyScope: connection
      maxParallelDials: 1
    health:
      payloadProbeRequired: true
      probeUrl: https://rbc.ru/
      probeInterval: 30s
    hysteria2:
      enabled: false
      endpointHost: ""
      endpointPort: 443
      serverName: ""
      entrySocksPort: 11086
      allowedSources: []
      fastOpen: false
      lazy: false
      tls:
        insecure: false
      quic:
        maxIdleTimeout: 30s
        keepAlivePeriod: 10s
        disablePathMTUDiscovery: false
      congestion:
        type: bbr
        profile: conservative
  emergencyXrayChain:
    enabled: false
    socksPort: 11082
    # Optional Entry -> Endpoint dial target for the emergency Xray chain.
    # Empty means topology.servers.endpoint.publicIp, then defaultTransitHost.
    endpointHost: ""
    endpointPort: 443
    # Keep the Endpoint Xray listener local by default. Private overlays may expose
    # this on a restricted interconnect port when public TLS demux is unhealthy.
    endpointListenHost: "127.0.0.1"
    serverName: rbc.ru
    # Optional connect-level SNI shard pool. Each row creates a dedicated
    # Endpoint REALITY inbound and Entry XHTTP outbound in the same Xray
    # processes. Keep destinations and SNI values aligned.
    shards: []
    xhttp:
      clientMode: stream-one
      serverMode: auto
      xmux:
        maxConnections: 1
        cMaxReuseTimes: "32-64"
        hMaxRequestTimes: "256-384"
        hMaxReusableSecs: "600-900"
        hKeepAlivePeriod: 45
    # Optional source allowlist for the Endpoint-side chain bridge SNI.
    # When set, the Endpoint TLS mux rejects this SNI unless the source matches.
    allowedSources: []
    failover:
      enabled: false
      # Entry-local TCP gate. Xray dials this listener; HAProxy sends traffic to
      # primaryHost unless it is down, then to fallbackHost as a backup server.
      localPort: 11083
      primaryHost: ""
      primaryPort: 443
      fallbackHost: ""
      fallbackPort: 443
  entryTransit:
    enabled: true
    primary: shadowsocks2022
    fallback: none
    # Maximum-stealth TCP carrier: sing-box Shadowsocks-2022 AEAD + ShadowTLS v3
    # inside the mandatory WSS outer tunnel.
    innerCarrier: shadowsocks2022
    chainBridgeOwner: link-crypto
    xrayBackhaul: false
    generation: 1
    remotePort: 443
    outerCarrier:
      enabled: true
      mode: wss
      protocol: websocket-tls
      serverName: www.rbc.ru
      publicPort: 443
      publicPath: /cdn-cgi/tracegate-link
      clientLocalPort: 14081
      serverLocalPort: 14082
      verifyTls: true
      spkiPinning:
        required: true
        profileFile: /etc/tracegate/private/link-crypto/outer-wss-spki.env
      admission:
        required: true
        mode: hmac-sha256-generation-bound
        header: Sec-WebSocket-Protocol
        profileFile: /etc/tracegate/private/link-crypto/outer-wss-admission.env
      tcpShapingProfileFile: /etc/tracegate/private/link-crypto/tcp-shaping.env
      promotionPreflightProfileFile: /etc/tracegate/private/link-crypto/promotion-preflight.env
    scope:
      - V1
      - V3
    routerEntry:
      enabled: false
    routerTransit:
      enabled: false
    udp:
      enabled: true
      carrier: hysteria2
      transport: udp-quic
      remotePort: 4443
      entryPort: 14481
      transitPort: 14482
      routerEntryPort: 14483
      routerTransitPort: 14484
      salamanderRequired: true
      pairedObfs:
        enabled: false
        backend: udp2raw
        mode: udp2raw-faketcp
        requiresBothSides: true
        failClosed: true
        noHostWideInterception: true
        noNfqueue: true
      hardening:
        enabled: true
        failClosed: true
        requirePrivateAuth: true
        rejectAnonymous: true
        antiReplay:
          enabled: true
          windowPackets: 4096
        antiAmplification:
          enabled: true
          maxUnvalidatedBytes: 1200
        rateLimit:
          enabled: true
          handshakePerMinute: 120
          newSessionPerMinute: 60
        mtu:
          mode: clamp
          maxPacketSize: 1252
        keyRotation:
          enabled: true
          strategy: generation-drain
          maxAgeSeconds: 3600
          overlapSeconds: 120
        sourceValidation:
          enabled: true
          mode: profile-bound-remote
  shadowsocks2022:
    enabled: true
    localSocks:
      bindHost: 127.0.0.1
      entryPort: 10881
      transitPort: 10882
      routerEntryPort: 10883
      routerTransitPort: 10884
      auth: required
    profileSource: external-secret
  zapret2:
    enabled: true
    nfqueue: false
    hostWideInterception: false
    scope: scoped-egress
    applyTo:
      - mtproto
    cpuBudget:
      entryMaxPercent: 10
      transitMaxPercent: 10
  restls:
    enabled: false
    mode: candidate-only

wireguard:
  enabled: false
  variant: V0
  clientCidr: 10.70.0.0/16
  wstunnel:
    enabled: true
    mode: wireguard-over-websocket
    publicPath: /wgws
    localWireguardPort: 51820
    websocketPort: 51821

shadowsocks2022:
  enabled: false
  method: 2022-blake3-aes-128-gcm
  listenPort: 18443
  variants:
    direct: V3
    chain: V3
  shadowtls:
    enabled: true
    version: 3
    # ShadowTLS handshake fronts. These MUST stay distinct from the active
    # Reality serverNames pool (the HAProxy SNI demux routes by SNI, and the
    # chart fails closed on a collision) and MUST NOT appear in
    # mtproto.stealth.forbiddenTlsDomains. Operators should repoint these to a
    # reachable, TLS 1.3-verified domain that is outside the Reality lease pool.
    serverNameEntry: 2gis.ru
    serverNameTransit: 2gis.ru
    listenPort: 14443

mtproto:
  enabled: true
  runtime: mtg
  # tls = MTG FakeTLS/domain-fronting. raw/random_padding = official MTProxy without FakeTLS/SNI.
  transport: tls
  domain: ""
  # FakeTLS SNI. Keep it distinct from the public address hostname and
  # validate DNS/TLS reachability from target networks before production use.
  tlsDomain: 2gis.ru
  publicPort: 443
  backendPort: 9443
  tolerateTimeSkewness: 5m
  egress:
    mode: socks5-only
    socksPort: 11084
    domainFrontingHost: ""
    domainFrontingPort: 443
    shadowtls:
      enabled: false
      serverName: avito.ru
      endpointHost: ""
      endpointPort: 443
      serverListenPort: 14444
      endpointSocksPort: 11085
      allowedSources: []
  fallback:
    enabled: false
    mode: failover
    prefer: official
    officialBackendPort: 9444
    officialStatsPort: 2398
    officialWorkers: 1
    # Keep empty for mtproxy/mtproxy in hostNetwork. Passing --address 127.0.0.1
    # also binds official MTProxy outbound DC connections to loopback.
    officialBindAddress: ""
    officialExternalIp: ""
    officialInternalIp: ""
    officialArgs: ""
  route:
    mode: endpoint-direct
    # Used by no-SNI MTProto transports on shared tcp/443 demux.
    inspectDelay: 5s
    entry:
      upstreamHost: ""
      tunnelPort: 11087
      # Optional overrides for entry-transit-endpoint:
      # tlsUpstreamHost/publicUpstreamHost split tcp/443 and mtproto.publicPort.
      # tlsFallbackHost/publicFallbackHost split or disable per-port backups.
    endpoint:
      allowedProxySources: []
  stealth:
    requireWhitelistedTlsDomain: true
    forbiddenTlsDomains:
      - old-forbidden.tracegate-sni.ru
      - old-mtproto-a.tracegate-sni.ru
    validatedTlsDomains:
      - 2gis.ru
  obfuscationProfile: mtproto-extra
  stabilityClass: aggressive-obfuscation
