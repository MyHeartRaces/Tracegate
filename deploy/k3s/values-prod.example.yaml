# Copy this file to an ignored values file, for example:
#   deploy/k3s/values-prod.yaml
#
# Keep real tokens, keys, domains, public addresses, private profiles,
# WireGuard keys and MTProto secrets outside this repository.

namespace:
  name: tracegate

global:
  image:
    repository: ghcr.io/your-org/tracegate
    tag: "3.0.0"
  publicBaseUrl: "https://tracegate.example.com"

architecture:
  mode: entry-endpoint
  deploymentPhase: full
  podRuntimeOnly: true
  ingressRotation:
    enabled: false
  entryIngress:
    enabled: false
  endpointIngress:
    enabled: true
    serviceFacing:
      publicIp: 198.51.100.20
      hostname: status.example.net
    shards:
      - {id: endpoint-a, publicIp: 198.51.100.21, hostnameTemplate: "{token}.a.example.net", state: active}
      - {id: endpoint-b, publicIp: 198.51.100.22, hostnameTemplate: "{token}.b.example.net", state: active}
      - {id: endpoint-c, publicIp: 198.51.100.23, hostnameTemplate: "{token}.c.example.net", state: active}
    alias:
      tokenLength: 20
    exclusiveSniPairs:
      enabled: true
      pool:
        - front.sni-01.test
        - front.sni-02.test
        - front.sni-03.test
        - front.sni-04.test
        - front.sni-05.test
        - front.sni-06.test
        - front.sni-07.test
        - front.sni-08.test
        - front.sni-09.test
        - front.sni-10.test
    firewall:
      required: true
    channel:
      tcp:
        bindShardIpsOnly: true
        maxConnections: 20000
        maxConnectionsPerSource: 8
        newConnectionsPer10Seconds: 12
        inspectDelay: 5s
        connectTimeout: 5s
        clientTimeout: 5m
        serverTimeout: 5m
        tunnelTimeout: 1h
      udp:
        serviceIpRejectRequired: true
  universalEntry:
    enabled: true
    publicHost: edge.example.net
    provider: cloudflare
    transport: grpc-tls-h2
    originFirewall:
      required: true
      denyDirectAccess: true
      allowDirectTlsAdapterSni: false
      allowedSourceCidrs: [173.245.48.0/20]
    clientPolicy:
      multiplexSingleTls: true
      maxParallelHandshakes: 1
      reconnectBaseSeconds: 5
      reconnectMaxSeconds: 120
      jitter: true
    backhaul:
      requireMultiTransportPool: true
      failClosed: true
      endpointEgressOnly: true

topology:
  servers:
    endpoint:
      displayName: Endpoint
      publicIp: 198.51.100.21
      kubernetesNodeName: tracegate-endpoint
      nodeSelector:
        tracegate.io/role: endpoint
    entry:
      displayName: Entry
      publicIp: 203.0.113.10
      kubernetesNodeName: tracegate-entry
      nodeSelector:
        tracegate.io/role: entry

controlPlane:
  auth:
    existingSecretName: tracegate-control-plane-auth
  database:
    externalUrlSecret:
      name: tracegate-database-url
      key: url
  env:
    defaultEntryHost: edge.example.net
    defaultEndpointHost: endpoint.example.net
    mtprotoDomain: proto.example.net
    grafanaPublicBaseUrl: https://grafana.example.net
    grafanaHost: grafana.example.net
    enabledClientProfiles:
      - reality
      - hysteria
      - entry
      - backup-grpc
      - backup-ws
      - backup-shadowtls
      - backup-wgws

privateProfiles:
  required: true
  existingSecretName: tracegate-private-profiles
  defaultMode: 256

decoy:
  hostPath: ""
  existingConfigMap: tracegate-decoy

network:
  egressIsolation:
    ingressPublicIPs: [198.51.100.21, 198.51.100.22, 198.51.100.23, 203.0.113.10]
    egressPublicIPs: [198.51.100.20]
    nodeAnnotations:
      enabled: true
      ingressPublicIP: tracegate.io/ingress-public-ip
      egressPublicIP: tracegate.io/egress-public-ip

gateway:
  hysteria:
    obfs:
      type: gecko
      gecko:
        minPacketSize: 512
        maxPacketSize: 1200
  realityMultiInboundGroups:
    - {id: sni-102, port: 2501, dest: front.sni-01.test, snis: [front.sni-01.test]}
    - {id: sni-103, port: 2502, dest: front.sni-02.test, snis: [front.sni-02.test]}
    - {id: sni-108, port: 2503, dest: front.sni-03.test, snis: [front.sni-03.test]}
    - {id: sni-109, port: 2504, dest: front.sni-04.test, snis: [front.sni-04.test]}
    - {id: sni-110, port: 2505, dest: front.sni-05.test, snis: [front.sni-05.test]}
    - {id: sni-111, port: 2506, dest: front.sni-06.test, snis: [front.sni-06.test]}
    - {id: sni-112, port: 2507, dest: front.sni-07.test, snis: [front.sni-07.test]}
    - {id: sni-113, port: 2508, dest: front.sni-08.test, snis: [front.sni-08.test]}
    - {id: sni-115, port: 2509, dest: front.sni-09.test, snis: [front.sni-09.test]}
    - {id: sni-116, port: 2510, dest: front.sni-10.test, snis: [front.sni-10.test]}
  stateStorage:
    mode: pvc
    existingClaims:
      entry: tracegate-entry-state
      endpoint: tracegate-endpoint-state
  nodeEncryption:
    enabled: false
    required: false
    runtimeInitValidation: false
    markerFile: ""
    markerValue: ""
    requireDeviceMapperSource: false
    nodeAnnotations:
      enabled: false
      encryptedRuntime: ""
      expectedValue: ""
  agent:
    corsOrigins:
      - https://tracegate.example.com
      - https://edge.example.net
      - https://endpoint.example.net
  pdb:
    enabled: true
    minAvailable: 1
  probes:
    enabled: true
  privatePreflight:
    enabled: true
    forbidPlaceholders: true
  images:
    mtproto:
      repository: ghcr.io/your-org/tracegate
      digest: sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
  roles:
    entry:
      enabled: true
      canonicalServer: entry
      nodeSelector:
        tracegate.io/role: entry
      tls:
        serverName: edge.example.net
        existingSecretName: tracegate-entry-tls
      reality:
        dest: yandex.ru:443
        serverNames:
          - yandex.ru
        privateKeySecret:
          name: tracegate-entry-reality
          key: private-key
        shortIds:
          - "0123456789abcdef"
    endpoint:
      enabled: true
      canonicalServer: endpoint
      nodeSelector:
        tracegate.io/role: endpoint
      tls:
        serverName: endpoint.example.net
        existingSecretName: tracegate-endpoint-tls
      reality:
        dest: www.rbc.ru:443
        serverNames:
          - www.rbc.ru
        privateKeySecret:
          name: tracegate-endpoint-reality
          key: private-key
        shortIds:
          - "fedcba9876543210"

interconnect:
  endpointBackhaul:
    enabled: true
    primary: shadowsocks2022-shadowtls-v3
    secondary: hysteria2-gecko
    selection:
      strategy: roundRobin
      stickyScope: connection
      maxParallelDials: 1
    health:
      payloadProbeRequired: true
      probeUrl: https://rbc.ru/
      probeInterval: 30s
    shadowtls:
      enabled: true
      endpointHost: 198.51.100.21
      endpointPort: 443
      serverName: 2gis.ru
      entryLocalPort: 11088
    hysteria2:
      enabled: true
      endpointHost: 198.51.100.21
      endpointPort: 443
      serverName: endpoint.example.net
      entrySocksPort: 11086
      allowedSources: [203.0.113.10]
      fastOpen: false
      lazy: false
      quic:
        disablePathMTUDiscovery: false
      congestion:
        type: bbr
        profile: conservative
      gecko:
        minPacketSize: 512
        maxPacketSize: 1200
  emergencyXrayChain:
    enabled: false
    shards: []
  shadowsocks2022:
    enabled: false
  zapret2:
    enabled: false

experimentalProfiles:
  enabled: false

wireguard:
  enabled: true
  wstunnel:
    enabled: true
    mode: wireguard-over-websocket

shadowsocks2022:
  enabled: true
  shadowtls:
    serverNameEndpoint: 2gis.ru

mtproto:
  enabled: true
  runtime: mtg
  domain: proto.example.net
  tlsDomain: 2gis.ru
  publicPort: 443
  fallback:
    enabled: false
  stealth:
    requireWhitelistedTlsDomain: true
    forbiddenTlsDomains: [old-forbidden.tracegate-sni.ru, old-mtproto-a.tracegate-sni.ru]
    validatedTlsDomains: [2gis.ru]
  route:
    mode: entry-endpoint-tunnel
    entry:
      tunnelPort: 11087
