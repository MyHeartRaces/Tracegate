# Public-safe first phase for the new production topology. Deploy and validate
# Endpoint before provisioning Entry. Keep real addresses, domains, claims,
# secrets and image digests in an ignored private overlay.

architecture:
  mode: entry-endpoint
  deploymentPhase: endpoint-first
  podRuntimeOnly: true
  ingressRotation:
    enabled: false
  universalEntry:
    enabled: false
  entryIngress:
    enabled: false
  endpointIngress:
    enabled: true
    serviceFacing:
      publicIp: 198.51.100.20
      hostname: status.example.net
    shards:
      - {id: endpoint-a, publicIp: 198.51.100.21, hostnameTemplate: "{token}.a.example.net", state: active}
      - {id: endpoint-b, publicIp: 198.51.100.22, hostnameTemplate: "{token}.b.example.net", state: active}
      - {id: endpoint-c, publicIp: 198.51.100.23, hostnameTemplate: "{token}.c.example.net", state: active}
    alias:
      tokenLength: 20
    exclusiveSniPairs:
      enabled: true
      pool:
        - partners.lemanapro.ru
        - goya.rutube.ru
        - ssp.rutube.ru
        - public-api.reviews.2gis.com
        - api.photo.2gis.com
        - styles.api.2gis.com
        - api.reviews.2gis.com
        - api.evotor.ru
        - api.max.ru
        - cdn.newyear.mail.ru
        - static.dl.mail.ru
        - static.lemanapro.ru
        - api.dobro.ru
        - market.rzd.ru
        - api.events.plus.yandex.net
    firewall:
      required: true
    channel:
      tcp:
        bindShardIpsOnly: true
        maxConnections: 20000
        maxConnectionsPerSource: 8
        newConnectionsPer10Seconds: 12
        inspectDelay: 5s
        connectTimeout: 5s
        clientTimeout: 5m
        serverTimeout: 5m
        tunnelTimeout: 1h
      udp:
        serviceIpRejectRequired: true

topology:
  servers:
    endpoint:
      publicIp: 198.51.100.21
      kubernetesNodeName: tracegate-endpoint
      nodeSelector: {tracegate.io/role: endpoint}
    transit:
      publicIp: ""
      kubernetesNodeName: ""
    entry:
      publicIp: ""
      kubernetesNodeName: ""

controlPlane:
  env:
    enabledClientProfiles:
      - reality
      - hysteria
      - backup-grpc
      - backup-ws
      - backup-shadowtls
      - backup-wgws

network:
  egressIsolation:
    ingressPublicIPs: [198.51.100.21, 198.51.100.22, 198.51.100.23]
    egressPublicIPs: [198.51.100.20]

decoy:
  hostPath: ""
  existingConfigMap: tracegate-decoy

gateway:
  realityMultiInboundGroups:
    - {id: sni-101, port: 2501, dest: partners.lemanapro.ru, snis: [partners.lemanapro.ru]}
    - {id: sni-102, port: 2502, dest: goya.rutube.ru, snis: [goya.rutube.ru]}
    - {id: sni-103, port: 2503, dest: ssp.rutube.ru, snis: [ssp.rutube.ru]}
    - {id: sni-104, port: 2504, dest: public-api.reviews.2gis.com, snis: [public-api.reviews.2gis.com]}
    - {id: sni-105, port: 2505, dest: api.photo.2gis.com, snis: [api.photo.2gis.com]}
    - {id: sni-106, port: 2506, dest: styles.api.2gis.com, snis: [styles.api.2gis.com]}
    - {id: sni-107, port: 2507, dest: api.reviews.2gis.com, snis: [api.reviews.2gis.com]}
    - {id: sni-108, port: 2508, dest: api.evotor.ru, snis: [api.evotor.ru]}
    - {id: sni-109, port: 2509, dest: api.max.ru, snis: [api.max.ru]}
    - {id: sni-110, port: 2510, dest: cdn.newyear.mail.ru, snis: [cdn.newyear.mail.ru]}
    - {id: sni-111, port: 2511, dest: static.dl.mail.ru, snis: [static.dl.mail.ru]}
    - {id: sni-112, port: 2512, dest: static.lemanapro.ru, snis: [static.lemanapro.ru]}
    - {id: sni-113, port: 2513, dest: api.dobro.ru, snis: [api.dobro.ru]}
    - {id: sni-114, port: 2514, dest: market.rzd.ru, snis: [market.rzd.ru]}
    - {id: sni-115, port: 2515, dest: api.events.plus.yandex.net, snis: [api.events.plus.yandex.net]}
  stateStorage:
    mode: pvc
    existingClaims:
      entry: ""
      transit: tracegate-endpoint-state
  nodeEncryption:
    enabled: false
    required: false
    runtimeInitValidation: false
    markerFile: ""
    markerValue: ""
    requireDeviceMapperSource: false
    nodeAnnotations:
      enabled: false
      encryptedRuntime: ""
      expectedValue: ""
  roles:
    entry:
      enabled: false
    transit:
      enabled: true
      canonicalServer: endpoint
      nodeSelector: {tracegate.io/role: endpoint}

naiveproxy:
  enabled: false

transitRouter:
  enabled: false

experimentalProfiles:
  enabled: false

interconnect:
  endpointBackhaul:
    enabled: false
  emergencyXrayChain:
    enabled: false
  entryTransit:
    enabled: false
    routerEntry: {enabled: false}
    routerTransit: {enabled: false}
  mieru:
    enabled: false
  zapret2:
    enabled: false

wireguard:
  enabled: true
  wstunnel:
    enabled: true
    mode: wireguard-over-websocket

shadowsocks2022:
  enabled: true

mtproto:
  enabled: true
  runtime: telemt
  domain: proto.example.net
  tlsDomain: ctlog2024.mail.ru
  fallback:
    enabled: false
  stealth:
    requireWhitelistedTlsDomain: true
    forbiddenTlsDomains: [yandex.ru, splitter.wb.ru]
    validatedTlsDomains: [ctlog2024.mail.ru]
  route:
    mode: entry-endpoint-tunnel
    entry:
      tunnelPort: 11087
