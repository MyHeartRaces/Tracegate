# Apply this public-safe delta to a private production overlay for a new
# two-node installation. Keep real hosts, addresses and credentials private.

architecture:
  mode: entry-endpoint
  ingressRotation:
    enabled: true
    strategy: revision-sticky
    entryHosts: []
    endpointHosts: []
    minimumPoolSize: 2
    overlapSeconds: 600
    requireDistinctPublicIPs: true
    requireDistinctAsns: true
    rotateEndpointEgress: false
  entryIngress:
    enabled: true
    serviceFacing:
      publicIp: 203.0.113.10
      hostname: status.example.net
    shards:
      - id: shard-a
        publicIp: 203.0.113.11
        hostnameTemplate: "{token}.a.example.net"
        mtprotoHost: mt-a.example.net
        state: active
      - id: shard-b
        publicIp: 203.0.113.12
        hostnameTemplate: "{token}.b.example.net"
        mtprotoHost: mt-b.example.net
        state: active
      - id: shard-c
        publicIp: 203.0.113.13
        hostnameTemplate: "{token}.c.example.net"
        mtprotoHost: mt-c.example.net
        state: active
    alias:
      tokenLength: 20
    exclusiveSniPairs:
      enabled: true
      pool:
        - partners.lemanapro.ru
        - goya.rutube.ru
        - ssp.rutube.ru
        - public-api.reviews.2gis.com
        - api.photo.2gis.com
        - styles.api.2gis.com
        - api.reviews.2gis.com
        - api.evotor.ru
        - api.max.ru
        - cdn.newyear.mail.ru
        - static.dl.mail.ru
        - static.lemanapro.ru
        - api.dobro.ru
        - market.rzd.ru
        - api.events.plus.yandex.net
    firewall:
      required: true
    channel:
      tcp:
        bindShardIpsOnly: true
        maxConnections: 20000
        maxConnectionsPerSource: 8
        newConnectionsPer10Seconds: 12
        inspectDelay: 5s
        connectTimeout: 5s
        clientTimeout: 5m
        serverTimeout: 5m
        tunnelTimeout: 1h
      udp:
        serviceIpRejectRequired: true

topology:
  servers:
    # The internal gateway.roles.transit compatibility name still maps here.
    endpoint:
      displayName: Endpoint
      publicIp: 198.51.100.20
      kubernetesNodeName: tracegate-endpoint
      nodeSelector:
        tracegate.io/role: endpoint
    transit:
      publicIp: ""
      kubernetesNodeName: ""
    entry:
      displayName: Entry
      publicIp: 203.0.113.11
      kubernetesNodeName: tracegate-entry
      nodeSelector:
        tracegate.io/role: entry

gateway:
  realityMultiInboundGroups:
    - {id: sni-101, port: 2501, dest: partners.lemanapro.ru, snis: [partners.lemanapro.ru]}
    - {id: sni-102, port: 2502, dest: goya.rutube.ru, snis: [goya.rutube.ru]}
    - {id: sni-103, port: 2503, dest: ssp.rutube.ru, snis: [ssp.rutube.ru]}
    - {id: sni-104, port: 2504, dest: public-api.reviews.2gis.com, snis: [public-api.reviews.2gis.com]}
    - {id: sni-105, port: 2505, dest: api.photo.2gis.com, snis: [api.photo.2gis.com]}
    - {id: sni-106, port: 2506, dest: styles.api.2gis.com, snis: [styles.api.2gis.com]}
    - {id: sni-107, port: 2507, dest: api.reviews.2gis.com, snis: [api.reviews.2gis.com]}
    - {id: sni-108, port: 2508, dest: api.evotor.ru, snis: [api.evotor.ru]}
    - {id: sni-109, port: 2509, dest: api.max.ru, snis: [api.max.ru]}
    - {id: sni-110, port: 2510, dest: cdn.newyear.mail.ru, snis: [cdn.newyear.mail.ru]}
    - {id: sni-111, port: 2511, dest: static.dl.mail.ru, snis: [static.dl.mail.ru]}
    - {id: sni-112, port: 2512, dest: static.lemanapro.ru, snis: [static.lemanapro.ru]}
    - {id: sni-113, port: 2513, dest: api.dobro.ru, snis: [api.dobro.ru]}
    - {id: sni-114, port: 2514, dest: market.rzd.ru, snis: [market.rzd.ru]}
    - {id: sni-115, port: 2515, dest: api.events.plus.yandex.net, snis: [api.events.plus.yandex.net]}
  nodeEncryption:
    enabled: false
    required: false
    runtimeInitValidation: false
    markerFile: ""
    markerValue: ""
    requireDeviceMapperSource: false
    nodeAnnotations:
      enabled: false
      encryptedRuntime: ""
      expectedValue: ""
  roles:
    transit:
      enabled: true
      canonicalServer: endpoint
      nodeSelector:
        tracegate.io/role: endpoint

naiveproxy:
  canonicalServer: endpoint
  nodeSelector:
    tracegate.io/role: endpoint

transitRouter:
  enabled: false

interconnect:
  endpointBackhaul:
    enabled: true
    primary: vless-reality-xhttp
    secondary: hysteria2-salamander
    selection:
      strategy: roundRobin
      stickyScope: connection
      maxParallelDials: 1
    health:
      payloadProbeRequired: true
      probeUrl: https://api.dobro.ru/
      probeInterval: 30s
    hysteria2:
      enabled: true
      endpointHost: 198.51.100.20
      endpointPort: 443
      serverName: endpoint.example.net
      entrySocksPort: 11086
      allowedSources:
        - 203.0.113.11
        - 203.0.113.12
        - 203.0.113.13
  emergencyXrayChain:
    enabled: true
    endpointHost: 198.51.100.20
    endpointPort: 443
    allowedSources:
      - 203.0.113.11
      - 203.0.113.12
      - 203.0.113.13
    shards:
      - id: lemanapro
        serverName: partners.lemanapro.ru
        dest: partners.lemanapro.ru:443
        endpointListenPort: 2451
        path: /api/v1/backhaul/lemanapro
      - id: 2gis-reviews
        serverName: public-api.reviews.2gis.com
        dest: public-api.reviews.2gis.com:443
        endpointListenPort: 2452
        path: /api/v1/backhaul/2gis-reviews
  entryTransit:
    enabled: false
    routerEntry:
      enabled: false
    routerTransit:
      enabled: false

mtproto:
  runtime: telemt
  domain: proto.example.net
  tlsDomain: ctlog2024.mail.ru
  fallback:
    enabled: false
  stealth:
    requireWhitelistedTlsDomain: true
    forbiddenTlsDomains: [yandex.ru, splitter.wb.ru]
    validatedTlsDomains: [ctlog2024.mail.ru]
  route:
    mode: entry-endpoint-tunnel
    entry:
      tunnelPort: 11087
