# Apply this public-safe delta to a private production overlay for a new
# two-node installation. Keep real hosts, addresses and credentials private.

architecture:
  mode: entry-endpoint
  ingressRotation:
    enabled: true
    strategy: revision-sticky
    entryHosts: []
    endpointHosts: []
    minimumPoolSize: 2
    overlapSeconds: 600
    requireDistinctPublicIPs: true
    requireDistinctAsns: true
    rotateEndpointEgress: false
  entryIngress:
    enabled: true
    serviceFacing:
      publicIp: 203.0.113.10
      hostname: status.example.net
    shards:
      - id: shard-a
        publicIp: 203.0.113.11
        hostnameTemplate: "{token}.a.example.net"
        mtprotoHost: mt-a.example.net
        state: active
      - id: shard-b
        publicIp: 203.0.113.12
        hostnameTemplate: "{token}.b.example.net"
        mtprotoHost: mt-b.example.net
        state: active
      - id: shard-c
        publicIp: 203.0.113.13
        hostnameTemplate: "{token}.c.example.net"
        mtprotoHost: mt-c.example.net
        state: active
    alias:
      tokenLength: 20
    firewall:
      required: true
    channel:
      tcp:
        bindShardIpsOnly: true
        maxConnections: 20000
        maxConnectionsPerSource: 8
        newConnectionsPer10Seconds: 12
        inspectDelay: 5s
        connectTimeout: 5s
        clientTimeout: 5m
        serverTimeout: 5m
        tunnelTimeout: 1h
      udp:
        serviceIpRejectRequired: true

topology:
  servers:
    # The internal gateway.roles.transit compatibility name still maps here.
    endpoint:
      displayName: Endpoint
      publicIp: 198.51.100.20
      kubernetesNodeName: tracegate-endpoint
      nodeSelector:
        tracegate.io/role: endpoint
    transit:
      publicIp: ""
      kubernetesNodeName: ""
    entry:
      displayName: Entry
      publicIp: 203.0.113.11
      kubernetesNodeName: tracegate-entry
      nodeSelector:
        tracegate.io/role: entry

gateway:
  nodeEncryption:
    enabled: false
    required: false
    runtimeInitValidation: false
    markerFile: ""
    markerValue: ""
    requireDeviceMapperSource: false
    nodeAnnotations:
      enabled: false
      encryptedRuntime: ""
      expectedValue: ""
  roles:
    transit:
      enabled: true
      canonicalServer: endpoint
      nodeSelector:
        tracegate.io/role: endpoint

transitRouter:
  enabled: false

interconnect:
  entryTransit:
    enabled: false
    routerEntry:
      enabled: false
    routerTransit:
      enabled: false

mtproto:
  runtime: mtg
  fallback:
    enabled: false
  route:
    mode: entry-local-endpoint-egress
